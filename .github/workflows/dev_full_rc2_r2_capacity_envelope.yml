name: dev-full-rc2-r2-capacity-envelope

on:
  workflow_dispatch:
    inputs:
      aws_region:
        description: "AWS region"
        required: true
        default: "eu-west-2"
        type: string
      aws_role_to_assume:
        description: "OIDC role ARN used by GitHub Actions"
        required: true
        type: string
      platform_run_id:
        description: "Pinned platform run id"
        required: true
        type: string
      scenario_run_id:
        description: "Pinned scenario run id"
        required: true
        type: string
      rc2_r2_execution_id:
        description: "Optional fixed RC2.R2 execution id"
        required: false
        default: ""
        type: string
      evidence_bucket:
        description: "S3 evidence bucket"
        required: true
        default: "fraud-platform-dev-full-evidence"
        type: string
      apigw_ig_stage_name:
        description: "API Gateway stage name"
        required: true
        default: "v1"
        type: string
      ig_rate_limit_rps:
        description: "Target IG rate limit (RPS)"
        required: true
        default: "3000"
        type: string
      ig_rate_limit_burst:
        description: "Target IG burst limit"
        required: true
        default: "6000"
        type: string
      lambda_ig_memory_mb:
        description: "Target IG lambda memory size (MB)"
        required: true
        default: "2048"
        type: string
      lambda_ig_reserved_concurrency:
        description: "Target IG lambda reserved concurrency"
        required: true
        default: "1000"
        type: string
      lambda_ig_timeout_seconds:
        description: "Target IG lambda timeout seconds"
        required: true
        default: "30"
        type: string
      lambda_ig_kafka_request_timeout_ms:
        description: "Target IG lambda Kafka publish timeout (ms)"
        required: true
        default: "1500"
        type: string
      lambda_ig_policy_activation_audit_mode:
        description: "Target IG policy-activation audit mode"
        required: true
        default: "store_only"
        type: string
      lambda_ig_package_s3_bucket:
        description: "Optional remote Lambda package bucket to preserve corrected IG bundle"
        required: false
        default: ""
        type: string
      lambda_ig_package_s3_key:
        description: "Optional remote Lambda package key to preserve corrected IG bundle"
        required: false
        default: ""
        type: string
      lambda_ig_package_sha256_base64:
        description: "Optional remote Lambda package sha256 (base64) to preserve corrected IG bundle"
        required: false
        default: ""
        type: string
      eks_nodegroup_instance_types_json:
        description: "JSON list of nodegroup instance types"
        required: true
        default: "[\"t3.xlarge\"]"
        type: string
      eks_nodegroup_desired_size:
        description: "Target nodegroup desired size"
        required: true
        default: "4"
        type: string
      eks_nodegroup_min_size:
        description: "Target nodegroup min size"
        required: true
        default: "2"
        type: string
      eks_nodegroup_max_size:
        description: "Target nodegroup max size"
        required: true
        default: "8"
        type: string

permissions:
  contents: read
  id-token: write

concurrency:
  group: dev-full-rc2-r2-capacity-envelope-${{ github.ref_name }}
  cancel-in-progress: false

jobs:
  run_rc2_r2_capacity_envelope:
    name: Run RC2.R2 capacity-envelope remediation gate
    runs-on: ubuntu-latest
    env:
      TF_DIR: infra/terraform/dev_full/runtime
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Reject static AWS credential posture
        shell: bash
        run: |
          set -euo pipefail
          if [[ -n "${AWS_ACCESS_KEY_ID:-}" || -n "${AWS_SECRET_ACCESS_KEY:-}" ]]; then
            echo "Static AWS credentials are forbidden; use OIDC role assumption."
            exit 1
          fi

      - name: Configure AWS credentials via OIDC
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-region: ${{ inputs.aws_region }}
          role-to-assume: ${{ inputs.aws_role_to_assume }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_wrapper: false

      - name: Resolve RC2.R2 execution id
        id: run_meta
        shell: bash
        run: |
          set -euo pipefail
          EXEC_ID="${{ inputs.rc2_r2_execution_id }}"
          if [[ -z "${EXEC_ID}" ]]; then
            EXEC_ID="rc2_r2_capacity_envelope_$(date -u +'%Y%m%dT%H%M%SZ')"
          fi
          RUN_DIR="runs/dev_substrate/dev_full/cert/runtime/rc2_r2/${EXEC_ID}"
          mkdir -p "${RUN_DIR}"
          echo "execution_id=${EXEC_ID}" >> "$GITHUB_OUTPUT"
          echo "run_dir=${RUN_DIR}" >> "$GITHUB_OUTPUT"

      - name: Terraform init and validate
        shell: bash
        run: |
          set -euo pipefail
          terraform -chdir="${TF_DIR}" init -reconfigure -backend-config=backend.hcl.example
          terraform -chdir="${TF_DIR}" validate
          terraform -chdir="${TF_DIR}" output -json > "${{ steps.run_meta.outputs.run_dir }}/terraform_outputs_pre.json"

      - name: Capture pre-change runtime envelope
        shell: bash
        env:
          RUN_DIR: ${{ steps.run_meta.outputs.run_dir }}
          APIGW_IG_STAGE_NAME: ${{ inputs.apigw_ig_stage_name }}
          PLATFORM_RUN_ID: ${{ inputs.platform_run_id }}
          SCENARIO_RUN_ID: ${{ inputs.scenario_run_id }}
          EXECUTION_ID: ${{ steps.run_meta.outputs.execution_id }}
        run: |
          set -euo pipefail
          python - <<'PY'
          import json
          import os
          from datetime import datetime, timezone
          from pathlib import Path

          import boto3
          from botocore.exceptions import ClientError

          run_dir = Path(os.environ["RUN_DIR"])
          outputs = json.loads((run_dir / "terraform_outputs_pre.json").read_text(encoding="utf-8"))
          apigw_id = str(outputs.get("apigw_ig_api_id", {}).get("value", "")).strip()
          lambda_name = str(outputs.get("lambda_ig_handler_name", {}).get("value", "")).strip()
          cluster_arn = str(outputs.get("eks_cluster_arn", {}).get("value", "")).strip()
          nodegroup_name = str(outputs.get("eks_nodegroup_m6f_name", {}).get("value", "")).strip()
          cluster_name = cluster_arn.split("cluster/", 1)[1] if "cluster/" in cluster_arn else ""

          apigw = boto3.client("apigatewayv2")
          lam = boto3.client("lambda")
          eks = boto3.client("eks")

          stage_name = os.environ["APIGW_IG_STAGE_NAME"]

          def safe_call(fn, *, error_code: str):
              try:
                  return fn(), None
              except ClientError as exc:
                  err = exc.response.get("Error", {})
                  return None, {
                      "code": error_code,
                      "error_type": err.get("Code", exc.__class__.__name__),
                      "message": str(exc),
                  }

          iam_read_errors = []

          stage, stage_err = safe_call(
              lambda: apigw.get_stage(ApiId=apigw_id, StageName=stage_name) if apigw_id else {},
              error_code="RC2R2-BIAM-APIGW-GET",
          )
          if stage_err:
              iam_read_errors.append(stage_err)
          route = stage.get("DefaultRouteSettings", {}) if isinstance(stage, dict) else {}

          lambda_cfg, lambda_cfg_err = safe_call(
              lambda: lam.get_function_configuration(FunctionName=lambda_name) if lambda_name else {},
              error_code="RC2R2-BIAM-LAMBDA-CONFIG",
          )
          if lambda_cfg_err:
              iam_read_errors.append(lambda_cfg_err)
          lambda_concurrency, lambda_conc_err = safe_call(
              lambda: lam.get_function_concurrency(FunctionName=lambda_name) if lambda_name else {},
              error_code="RC2R2-BIAM-LAMBDA-CONCURRENCY",
          )
          if lambda_conc_err:
              iam_read_errors.append(lambda_conc_err)
          nodegroup, nodegroup_err = safe_call(
              lambda: (
                  eks.describe_nodegroup(clusterName=cluster_name, nodegroupName=nodegroup_name).get("nodegroup", {})
                  if cluster_name and nodegroup_name
                  else {}
              ),
              error_code="RC2R2-BIAM-EKS-NODEGROUP",
          )
          if nodegroup_err:
              iam_read_errors.append(nodegroup_err)
          scaling = nodegroup.get("scalingConfig", {}) if isinstance(nodegroup, dict) else {}

          pre = {
              "captured_at_utc": datetime.now(timezone.utc).strftime("%Y-%m-%dT%H:%M:%SZ"),
              "phase": "RC2.R2",
              "execution_id": os.environ["EXECUTION_ID"],
              "platform_run_id": os.environ["PLATFORM_RUN_ID"],
              "scenario_run_id": os.environ["SCENARIO_RUN_ID"],
              "iam_read_errors": iam_read_errors,
              "apigw": {
                  "api_id": apigw_id,
                  "stage_name": stage_name,
                  "throttling_rate_limit": route.get("ThrottlingRateLimit"),
                  "throttling_burst_limit": route.get("ThrottlingBurstLimit"),
              },
              "lambda": {
                  "function_name": lambda_name,
                  "memory_size": lambda_cfg.get("MemorySize"),
                  "timeout_seconds": lambda_cfg.get("Timeout"),
                  "reserved_concurrency": lambda_concurrency.get("ReservedConcurrentExecutions"),
              },
              "eks_m6f_nodegroup": {
                  "cluster_name": cluster_name,
                  "nodegroup_name": nodegroup_name,
                  "instance_types": nodegroup.get("instanceTypes"),
                  "scaling_config": scaling,
                  "status": nodegroup.get("status"),
              },
          }
          (run_dir / "rc2_r2_capacity_pre_snapshot.json").write_text(
              json.dumps(pre, indent=2, ensure_ascii=True) + "\n",
              encoding="utf-8",
          )
          PY

      - name: Apply RC2.R2 capacity envelope uplift (managed terraform)
        shell: bash
        env:
          RUN_DIR: ${{ steps.run_meta.outputs.run_dir }}
          IG_RATE_LIMIT_RPS: ${{ inputs.ig_rate_limit_rps }}
          IG_RATE_LIMIT_BURST: ${{ inputs.ig_rate_limit_burst }}
          LAMBDA_IG_MEMORY_MB: ${{ inputs.lambda_ig_memory_mb }}
          LAMBDA_IG_RESERVED_CONCURRENCY: ${{ inputs.lambda_ig_reserved_concurrency }}
          LAMBDA_IG_TIMEOUT_SECONDS: ${{ inputs.lambda_ig_timeout_seconds }}
          LAMBDA_IG_KAFKA_REQUEST_TIMEOUT_MS: ${{ inputs.lambda_ig_kafka_request_timeout_ms }}
          LAMBDA_IG_POLICY_ACTIVATION_AUDIT_MODE: ${{ inputs.lambda_ig_policy_activation_audit_mode }}
          LAMBDA_IG_PACKAGE_S3_BUCKET: ${{ inputs.lambda_ig_package_s3_bucket }}
          LAMBDA_IG_PACKAGE_S3_KEY: ${{ inputs.lambda_ig_package_s3_key }}
          LAMBDA_IG_PACKAGE_SHA256_BASE64: ${{ inputs.lambda_ig_package_sha256_base64 }}
          EKS_NODEGROUP_INSTANCE_TYPES_JSON: ${{ inputs.eks_nodegroup_instance_types_json }}
          EKS_NODEGROUP_DESIRED_SIZE: ${{ inputs.eks_nodegroup_desired_size }}
          EKS_NODEGROUP_MIN_SIZE: ${{ inputs.eks_nodegroup_min_size }}
          EKS_NODEGROUP_MAX_SIZE: ${{ inputs.eks_nodegroup_max_size }}
        run: |
          set -euo pipefail
          python - <<'PY'
          import json
          import os
          from pathlib import Path

          run_dir = Path(os.environ["RUN_DIR"])
          instance_types = json.loads(os.environ["EKS_NODEGROUP_INSTANCE_TYPES_JSON"])
          if not isinstance(instance_types, list) or not all(isinstance(v, str) for v in instance_types):
              raise SystemExit("EKS_NODEGROUP_INSTANCE_TYPES_JSON must decode to a JSON string list.")

          payload = {
              "ig_rate_limit_rps": int(os.environ["IG_RATE_LIMIT_RPS"]),
              "ig_rate_limit_burst": int(os.environ["IG_RATE_LIMIT_BURST"]),
              "lambda_ig_memory_size_mb": int(os.environ["LAMBDA_IG_MEMORY_MB"]),
              "lambda_ig_reserved_concurrency": int(os.environ["LAMBDA_IG_RESERVED_CONCURRENCY"]),
              "lambda_ig_timeout_seconds": int(os.environ["LAMBDA_IG_TIMEOUT_SECONDS"]),
              "lambda_ig_kafka_request_timeout_ms": int(os.environ["LAMBDA_IG_KAFKA_REQUEST_TIMEOUT_MS"]),
              "lambda_ig_policy_activation_audit_mode": os.environ["LAMBDA_IG_POLICY_ACTIVATION_AUDIT_MODE"],
              "eks_nodegroup_instance_types": instance_types,
              "eks_nodegroup_desired_size": int(os.environ["EKS_NODEGROUP_DESIRED_SIZE"]),
              "eks_nodegroup_min_size": int(os.environ["EKS_NODEGROUP_MIN_SIZE"]),
              "eks_nodegroup_max_size": int(os.environ["EKS_NODEGROUP_MAX_SIZE"]),
          }
          if (
              os.environ["LAMBDA_IG_PACKAGE_S3_BUCKET"]
              and os.environ["LAMBDA_IG_PACKAGE_S3_KEY"]
              and os.environ["LAMBDA_IG_PACKAGE_SHA256_BASE64"]
          ):
              payload["lambda_ig_package_s3_bucket"] = os.environ["LAMBDA_IG_PACKAGE_S3_BUCKET"]
              payload["lambda_ig_package_s3_key"] = os.environ["LAMBDA_IG_PACKAGE_S3_KEY"]
              payload["lambda_ig_package_sha256_base64"] = os.environ["LAMBDA_IG_PACKAGE_SHA256_BASE64"]

          tfvars_path = run_dir / "rc2_r2_capacity_uplift.auto.tfvars.json"
          tfvars_path.write_text(json.dumps(payload, indent=2, ensure_ascii=True) + "\n", encoding="utf-8")
          print(tfvars_path.resolve())
          PY
          TFVARS_PATH="$(python - <<'PY'
          import os
          from pathlib import Path
          print((Path(os.environ["RUN_DIR"]) / "rc2_r2_capacity_uplift.auto.tfvars.json").resolve())
          PY
          )"
          terraform -chdir="${TF_DIR}" apply -input=false -auto-approve \
            -target=aws_apigatewayv2_stage.ig_v1 \
            -target=aws_lambda_function.ig_handler \
            -target=aws_eks_node_group.m6f_workers \
            -var-file="${TFVARS_PATH}"
          terraform -chdir="${TF_DIR}" output -json > "${{ steps.run_meta.outputs.run_dir }}/terraform_outputs_post.json"

      - name: Build RC2.R2 gate artifacts and publish with readback
        shell: bash
        env:
          RUN_DIR: ${{ steps.run_meta.outputs.run_dir }}
          EXECUTION_ID: ${{ steps.run_meta.outputs.execution_id }}
          PLATFORM_RUN_ID: ${{ inputs.platform_run_id }}
          SCENARIO_RUN_ID: ${{ inputs.scenario_run_id }}
          APIGW_IG_STAGE_NAME: ${{ inputs.apigw_ig_stage_name }}
          EVIDENCE_BUCKET: ${{ inputs.evidence_bucket }}
          EXPECTED_IG_RATE_LIMIT_RPS: ${{ inputs.ig_rate_limit_rps }}
          EXPECTED_IG_RATE_LIMIT_BURST: ${{ inputs.ig_rate_limit_burst }}
          EXPECTED_LAMBDA_MEMORY_MB: ${{ inputs.lambda_ig_memory_mb }}
          EXPECTED_LAMBDA_RESERVED_CONCURRENCY: ${{ inputs.lambda_ig_reserved_concurrency }}
          EXPECTED_LAMBDA_TIMEOUT_SECONDS: ${{ inputs.lambda_ig_timeout_seconds }}
          EXPECTED_LAMBDA_KAFKA_REQUEST_TIMEOUT_MS: ${{ inputs.lambda_ig_kafka_request_timeout_ms }}
          EXPECTED_POLICY_ACTIVATION_AUDIT_MODE: ${{ inputs.lambda_ig_policy_activation_audit_mode }}
          EXPECTED_NODEGROUP_DESIRED: ${{ inputs.eks_nodegroup_desired_size }}
          EXPECTED_NODEGROUP_MIN: ${{ inputs.eks_nodegroup_min_size }}
          EXPECTED_NODEGROUP_MAX: ${{ inputs.eks_nodegroup_max_size }}
        run: |
          set -euo pipefail
          python - <<'PY'
          import hashlib
          import json
          import os
          from datetime import datetime, timezone
          from pathlib import Path

          import boto3
          from botocore.exceptions import ClientError

          run_dir = Path(os.environ["RUN_DIR"])
          exec_id = os.environ["EXECUTION_ID"]
          platform_run_id = os.environ["PLATFORM_RUN_ID"]
          scenario_run_id = os.environ["SCENARIO_RUN_ID"]
          bucket = os.environ["EVIDENCE_BUCKET"]
          stage_name = os.environ["APIGW_IG_STAGE_NAME"]
          expected_rate = float(os.environ["EXPECTED_IG_RATE_LIMIT_RPS"])
          expected_burst = int(float(os.environ["EXPECTED_IG_RATE_LIMIT_BURST"]))
          expected_lambda_memory = int(float(os.environ["EXPECTED_LAMBDA_MEMORY_MB"]))
          expected_lambda_reserved = int(float(os.environ["EXPECTED_LAMBDA_RESERVED_CONCURRENCY"]))
          expected_lambda_timeout = int(float(os.environ["EXPECTED_LAMBDA_TIMEOUT_SECONDS"]))
          expected_lambda_kafka_timeout = int(float(os.environ["EXPECTED_LAMBDA_KAFKA_REQUEST_TIMEOUT_MS"]))
          expected_policy_activation_audit_mode = os.environ["EXPECTED_POLICY_ACTIVATION_AUDIT_MODE"]
          expected_desired = int(os.environ["EXPECTED_NODEGROUP_DESIRED"])
          expected_min = int(os.environ["EXPECTED_NODEGROUP_MIN"])
          expected_max = int(os.environ["EXPECTED_NODEGROUP_MAX"])

          def load_json(path: Path) -> dict:
              return json.loads(path.read_text(encoding="utf-8"))

          pre = load_json(run_dir / "rc2_r2_capacity_pre_snapshot.json")
          outputs_post = load_json(run_dir / "terraform_outputs_post.json")

          apigw_id = str(outputs_post.get("apigw_ig_api_id", {}).get("value", "")).strip()
          lambda_name = str(outputs_post.get("lambda_ig_handler_name", {}).get("value", "")).strip()
          cluster_arn = str(outputs_post.get("eks_cluster_arn", {}).get("value", "")).strip()
          nodegroup_name = str(outputs_post.get("eks_nodegroup_m6f_name", {}).get("value", "")).strip()
          cluster_name = cluster_arn.split("cluster/", 1)[1] if "cluster/" in cluster_arn else ""

          apigw = boto3.client("apigatewayv2")
          lam = boto3.client("lambda")
          eks = boto3.client("eks")
          s3 = boto3.client("s3")

          def safe_call(fn, *, error_code: str):
              try:
                  return fn(), None
              except ClientError as exc:
                  err = exc.response.get("Error", {})
                  return None, {
                      "code": error_code,
                      "error_type": err.get("Code", exc.__class__.__name__),
                      "message": str(exc),
                  }

          iam_read_errors = []
          stage, stage_err = safe_call(
              lambda: apigw.get_stage(ApiId=apigw_id, StageName=stage_name) if apigw_id else {},
              error_code="RC2R2-BIAM-APIGW-GET",
          )
          if stage_err:
              iam_read_errors.append(stage_err)
          route = stage.get("DefaultRouteSettings", {}) if isinstance(stage, dict) else {}
          lambda_cfg, lambda_cfg_err = safe_call(
              lambda: lam.get_function_configuration(FunctionName=lambda_name) if lambda_name else {},
              error_code="RC2R2-BIAM-LAMBDA-CONFIG",
          )
          if lambda_cfg_err:
              iam_read_errors.append(lambda_cfg_err)
          lambda_concurrency, lambda_conc_err = safe_call(
              lambda: lam.get_function_concurrency(FunctionName=lambda_name) if lambda_name else {},
              error_code="RC2R2-BIAM-LAMBDA-CONCURRENCY",
          )
          if lambda_conc_err:
              iam_read_errors.append(lambda_conc_err)
          nodegroup, nodegroup_err = safe_call(
              lambda: (
                  eks.describe_nodegroup(clusterName=cluster_name, nodegroupName=nodegroup_name).get("nodegroup", {})
                  if cluster_name and nodegroup_name
                  else {}
              ),
              error_code="RC2R2-BIAM-EKS-NODEGROUP",
          )
          if nodegroup_err:
              iam_read_errors.append(nodegroup_err)
          scaling = nodegroup.get("scalingConfig", {}) if isinstance(nodegroup, dict) else {}

          post = {
              "captured_at_utc": datetime.now(timezone.utc).strftime("%Y-%m-%dT%H:%M:%SZ"),
              "phase": "RC2.R2",
              "execution_id": exec_id,
              "platform_run_id": platform_run_id,
              "scenario_run_id": scenario_run_id,
              "iam_read_errors": iam_read_errors,
              "apigw": {
                  "api_id": apigw_id,
                  "stage_name": stage_name,
                  "throttling_rate_limit": route.get("ThrottlingRateLimit"),
                  "throttling_burst_limit": route.get("ThrottlingBurstLimit"),
              },
              "lambda": {
                  "function_name": lambda_name,
                  "memory_size": lambda_cfg.get("MemorySize"),
                  "timeout_seconds": lambda_cfg.get("Timeout"),
                  "reserved_concurrency": lambda_concurrency.get("ReservedConcurrentExecutions"),
                  "environment": (
                      lambda_cfg.get("Environment", {}).get("Variables", {})
                      if isinstance(lambda_cfg.get("Environment"), dict)
                      else {}
                  ),
              },
              "eks_m6f_nodegroup": {
                  "cluster_name": cluster_name,
                  "nodegroup_name": nodegroup_name,
                  "instance_types": nodegroup.get("instanceTypes"),
                  "scaling_config": scaling,
                  "status": nodegroup.get("status"),
              },
          }

          blockers: list[dict] = []
          for err in iam_read_errors:
              blockers.append({
                  "code": "RC2R2-BIAM",
                  "message": f"{err['code']}:{err['error_type']}",
              })
          rate_live = post["apigw"].get("throttling_rate_limit")
          burst_live = post["apigw"].get("throttling_burst_limit")
          if rate_live is None or float(rate_live) < expected_rate:
              blockers.append({"code": "RC2R2-B1", "message": f"APIGW throttle rate below target ({rate_live} < {expected_rate})."})
          if burst_live is None or int(burst_live) < expected_burst:
              blockers.append({"code": "RC2R2-B1", "message": f"APIGW throttle burst below target ({burst_live} < {expected_burst})."})

          lambda_memory_live = post["lambda"].get("memory_size")
          lambda_timeout_live = post["lambda"].get("timeout_seconds")
          lambda_reserved_live = post["lambda"].get("reserved_concurrency")
          lambda_env_live = post["lambda"].get("environment", {})
          if lambda_memory_live is None or int(lambda_memory_live) < expected_lambda_memory:
              blockers.append({
                  "code": "RC2R2-B1",
                  "message": f"Lambda memory below target ({lambda_memory_live} < {expected_lambda_memory}).",
              })
          if lambda_timeout_live is None or int(lambda_timeout_live) < expected_lambda_timeout:
              blockers.append({
                  "code": "RC2R2-B1",
                  "message": f"Lambda timeout below target ({lambda_timeout_live} < {expected_lambda_timeout}).",
              })
          if lambda_reserved_live is None or int(lambda_reserved_live) < expected_lambda_reserved:
              blockers.append({
                  "code": "RC2R2-B1",
                  "message": f"Lambda reserved concurrency below target ({lambda_reserved_live} < {expected_lambda_reserved}).",
              })
          kafka_timeout_live = lambda_env_live.get("KAFKA_REQUEST_TIMEOUT_MS")
          if kafka_timeout_live is None or int(kafka_timeout_live) != expected_lambda_kafka_timeout:
              blockers.append({
                  "code": "RC2R2-B1",
                  "message": (
                      "Lambda Kafka request timeout drift "
                      f"({kafka_timeout_live} != {expected_lambda_kafka_timeout})."
                  ),
              })
          audit_mode_live = lambda_env_live.get("IG_POLICY_ACTIVATION_AUDIT_MODE")
          if audit_mode_live != expected_policy_activation_audit_mode:
              blockers.append({
                  "code": "RC2R2-B1",
                  "message": (
                      "Lambda policy-activation audit mode drift "
                      f"({audit_mode_live} != {expected_policy_activation_audit_mode})."
                  ),
              })

          desired_live = int(scaling.get("desiredSize", -1))
          min_live = int(scaling.get("minSize", -1))
          max_live = int(scaling.get("maxSize", -1))
          if desired_live < expected_desired or min_live < expected_min or max_live < expected_max:
              blockers.append({
                  "code": "RC2R2-B2",
                  "message": (
                      "EKS nodegroup scaling below target "
                      f"(live desired/min/max={desired_live}/{min_live}/{max_live}, "
                      f"expected>={expected_desired}/{expected_min}/{expected_max})."
                  ),
              })

          scale_down_plan = {
              "captured_at_utc": datetime.now(timezone.utc).strftime("%Y-%m-%dT%H:%M:%SZ"),
              "phase": "RC2.R2",
              "execution_id": exec_id,
              "post_cert_trigger": "after RC2 remediation campaign closure or explicit stop",
              "target_restore_knobs": {
                  "ig_rate_limit_rps": pre.get("apigw", {}).get("throttling_rate_limit"),
                  "ig_rate_limit_burst": pre.get("apigw", {}).get("throttling_burst_limit"),
                  "eks_nodegroup_desired_size": pre.get("eks_m6f_nodegroup", {}).get("scaling_config", {}).get("desiredSize"),
                  "eks_nodegroup_min_size": pre.get("eks_m6f_nodegroup", {}).get("scaling_config", {}).get("minSize"),
                  "eks_nodegroup_max_size": pre.get("eks_m6f_nodegroup", {}).get("scaling_config", {}).get("maxSize"),
              },
              "execution_posture": "MANAGED_WORKFLOW_ONLY",
          }

          envelope_snapshot = {
              "captured_at_utc": datetime.now(timezone.utc).strftime("%Y-%m-%dT%H:%M:%SZ"),
              "phase": "RC2.R2",
              "execution_id": exec_id,
              "platform_run_id": platform_run_id,
              "scenario_run_id": scenario_run_id,
              "pre_change": pre,
              "post_change": post,
              "expected_targets": {
                  "ig_rate_limit_rps": expected_rate,
                  "ig_rate_limit_burst": expected_burst,
                  "lambda_ig_memory_mb": expected_lambda_memory,
                  "lambda_ig_reserved_concurrency": expected_lambda_reserved,
                  "lambda_ig_timeout_seconds": expected_lambda_timeout,
                  "lambda_ig_kafka_request_timeout_ms": expected_lambda_kafka_timeout,
                  "lambda_ig_policy_activation_audit_mode": expected_policy_activation_audit_mode,
                  "eks_nodegroup_desired_size": expected_desired,
                  "eks_nodegroup_min_size": expected_min,
                  "eks_nodegroup_max_size": expected_max,
              },
          }

          overall_pass = len(blockers) == 0
          summary = {
              "captured_at_utc": datetime.now(timezone.utc).strftime("%Y-%m-%dT%H:%M:%SZ"),
              "phase": "RC2.R2",
              "execution_id": exec_id,
              "platform_run_id": platform_run_id,
              "scenario_run_id": scenario_run_id,
              "overall_pass": overall_pass,
              "blocker_count": len(blockers),
              "next_gate": "READY_FOR_RC2_R5" if overall_pass else "HOLD_REMEDIATE",
          }
          blocker_register = {
              "captured_at_utc": summary["captured_at_utc"],
              "phase": "RC2.R2",
              "execution_id": exec_id,
              "platform_run_id": platform_run_id,
              "scenario_run_id": scenario_run_id,
              "blocker_count": len(blockers),
              "blockers": blockers,
          }
          change_receipt = {
              "captured_at_utc": summary["captured_at_utc"],
              "phase": "RC2.R2",
              "execution_id": exec_id,
              "platform_run_id": platform_run_id,
              "scenario_run_id": scenario_run_id,
              "change_set": envelope_snapshot["expected_targets"],
              "verification_ref": f"s3://{bucket}/evidence/dev_full/cert/runtime/{exec_id}/rc2_r2_capacity_envelope_snapshot.json",
              "execution_posture": "MANAGED_WORKFLOW_TERRAFORM_APPLY_ONLY",
          }

          files = {
              "rc2_r2_capacity_envelope_snapshot.json": envelope_snapshot,
              "rc2_r2_capacity_change_receipt.json": change_receipt,
              "rc2_r2_scale_down_plan.json": scale_down_plan,
              "rc2_r2_blocker_register.json": blocker_register,
              "rc2_r2_execution_summary.json": summary,
          }
          prefix = f"evidence/dev_full/cert/runtime/{exec_id}/"
          publication_rows = []

          for name, payload in files.items():
              path = run_dir / name
              data = (json.dumps(payload, indent=2, ensure_ascii=True) + "\n").encode("utf-8")
              path.write_bytes(data)
              key = f"{prefix}{name}"
              s3.put_object(Bucket=bucket, Key=key, Body=data, ContentType="application/json")
              rb = s3.get_object(Bucket=bucket, Key=key)["Body"].read()
              publication_rows.append({
                  "artifact": name,
                  "s3_key": key,
                  "sha256_local": hashlib.sha256(data).hexdigest(),
                  "sha256_readback": hashlib.sha256(rb).hexdigest(),
                  "readback_ok": hashlib.sha256(data).hexdigest() == hashlib.sha256(rb).hexdigest(),
              })

          publication_ok = all(bool(r["readback_ok"]) for r in publication_rows)
          publication = {
              "captured_at_utc": datetime.now(timezone.utc).strftime("%Y-%m-%dT%H:%M:%SZ"),
              "phase": "RC2.R2",
              "execution_id": exec_id,
              "artifact_rows": publication_rows,
              "overall_readback_ok": publication_ok,
          }
          pub_path = run_dir / "rc2_r2_publication_receipt.json"
          pub_data = (json.dumps(publication, indent=2, ensure_ascii=True) + "\n").encode("utf-8")
          pub_path.write_bytes(pub_data)
          pub_key = f"{prefix}rc2_r2_publication_receipt.json"
          s3.put_object(Bucket=bucket, Key=pub_key, Body=pub_data, ContentType="application/json")

          if not publication_ok:
              raise SystemExit("RC2.R2 fail-closed: publication readback mismatch detected.")
          if not overall_pass:
              raise SystemExit("RC2.R2 fail-closed: capacity envelope gate is HOLD_REMEDIATE.")
          PY
