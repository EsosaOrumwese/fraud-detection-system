name: dev-full-rc2-profile-load

on:
  workflow_dispatch:
    inputs:
      aws_region:
        description: AWS region
        required: true
        default: eu-west-2
        type: string
      aws_role_to_assume:
        description: OIDC role ARN
        required: true
        type: string
      evidence_bucket:
        description: S3 evidence bucket
        required: true
        default: fraud-platform-dev-full-evidence
        type: string
      ig_api_key_ssm_path:
        description: SSM path for IG API key
        required: true
        default: /fraud-platform/dev_full/ig/api_key
        type: string
      ig_base_url:
        description: IG base URL
        required: true
        default: https://ehwznd2uw7.execute-api.eu-west-2.amazonaws.com/v1
        type: string
      ig_ingest_path:
        description: IG ingest path
        required: true
        default: /ingest/push
        type: string
      ig_idempotency_table:
        description: IG idempotency table
        required: true
        default: fraud-platform-dev-full-ig-idempotency
        type: string
      platform_run_id:
        description: platform_run_id for this profile run
        required: true
        type: string
      scenario_run_id:
        description: scenario_run_id for this profile run
        required: true
        type: string
      profile_id:
        description: RC2 profile
        required: true
        default: steady
        type: choice
        options:
          - steady
          - burst
          - soak
          - replay_window
      event_count:
        description: Number of ingress events to attempt
        required: true
        default: "120000"
        type: string
      workers:
        description: Concurrent sender workers
        required: true
        default: "64"
        type: string
      sleep_seconds:
        description: Per-request sleep in worker
        required: true
        default: "0.0"
        type: string
      request_timeout_seconds:
        description: HTTP timeout per request
        required: true
        default: "10"
        type: string
      enforce_profile_gate:
        description: Fail workflow if profile floor not met
        required: true
        default: "false"
        type: choice
        options:
          - "true"
          - "false"
      rc2_profile_execution_id:
        description: Optional fixed execution id
        required: false
        default: ""
        type: string

permissions:
  contents: read
  id-token: write

concurrency:
  group: dev-full-rc2-profile-${{ github.ref_name }}-${{ inputs.profile_id }}
  cancel-in-progress: false

jobs:
  run_rc2_profile:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials via OIDC
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-region: ${{ inputs.aws_region }}
          role-to-assume: ${{ inputs.aws_role_to_assume }}

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Resolve execution metadata
        id: run_meta
        shell: bash
        run: |
          set -euo pipefail
          TS="$(date -u +'%Y%m%dT%H%M%SZ')"
          if [[ -n "${{ inputs.rc2_profile_execution_id }}" ]]; then
            EXEC_ID="${{ inputs.rc2_profile_execution_id }}"
          else
            EXEC_ID="rc2_profile_${{ inputs.profile_id }}_${TS}"
          fi
          RUN_DIR="runs/dev_substrate/dev_full/cert/runtime/${EXEC_ID}"
          echo "execution_id=${EXEC_ID}" >> "$GITHUB_OUTPUT"
          echo "run_dir=${RUN_DIR}" >> "$GITHUB_OUTPUT"
          echo "timestamp=${TS}" >> "$GITHUB_OUTPUT"

      - name: Resolve IG API key
        shell: bash
        run: |
          set -euo pipefail
          IG_API_KEY="$(aws ssm get-parameter --name '${{ inputs.ig_api_key_ssm_path }}' --with-decryption --query 'Parameter.Value' --output text)"
          if [[ -z "${IG_API_KEY}" || "${IG_API_KEY}" == "None" ]]; then
            echo "Unable to resolve IG API key."
            exit 1
          fi
          echo "::add-mask::${IG_API_KEY}"
          echo "IG_API_KEY=${IG_API_KEY}" >> "$GITHUB_ENV"

      - name: Execute RC2 profile load and publish artifacts
        id: exec
        shell: bash
        env:
          EXECUTION_ID: ${{ steps.run_meta.outputs.execution_id }}
          RUN_DIR: ${{ steps.run_meta.outputs.run_dir }}
          EVIDENCE_BUCKET: ${{ inputs.evidence_bucket }}
          PLATFORM_RUN_ID: ${{ inputs.platform_run_id }}
          SCENARIO_RUN_ID: ${{ inputs.scenario_run_id }}
          PROFILE_ID: ${{ inputs.profile_id }}
          EVENT_COUNT: ${{ inputs.event_count }}
          WORKERS: ${{ inputs.workers }}
          SLEEP_SECONDS: ${{ inputs.sleep_seconds }}
          REQUEST_TIMEOUT_SECONDS: ${{ inputs.request_timeout_seconds }}
          IG_BASE_URL: ${{ inputs.ig_base_url }}
          IG_INGEST_PATH: ${{ inputs.ig_ingest_path }}
          IG_IDEMPOTENCY_TABLE: ${{ inputs.ig_idempotency_table }}
          ENFORCE_PROFILE_GATE: ${{ inputs.enforce_profile_gate }}
        run: |
          set -euo pipefail
          python - <<'PY'
          from __future__ import annotations

          import json
          import math
          import os
          import time
          import urllib.error
          import urllib.request
          from concurrent.futures import ThreadPoolExecutor, as_completed
          from datetime import datetime, timezone
          from pathlib import Path
          from typing import Any

          import boto3

          def now_utc() -> str:
            return datetime.now(timezone.utc).isoformat().replace("+00:00", "Z")

          def pct(values: list[float], p: float) -> float | None:
            if not values:
              return None
            ordered = sorted(values)
            idx = int(math.ceil((p / 100.0) * len(ordered))) - 1
            idx = max(0, min(len(ordered) - 1, idx))
            return float(ordered[idx])

          requirements = {
            "steady": {"target_eps": 500.0, "min_sample_events": 900000, "duration_minutes": 30},
            "burst": {"target_eps": 1500.0, "min_sample_events": 900000, "duration_minutes": 10},
            "soak": {"target_eps": 300.0, "min_sample_events": 6480000, "duration_minutes": 360},
            "replay_window": {"target_eps": None, "min_sample_events": 10000000, "duration_minutes": None},
          }

          execution_id = os.environ["EXECUTION_ID"]
          run_dir = Path(os.environ["RUN_DIR"])
          run_dir.mkdir(parents=True, exist_ok=True)
          evidence_bucket = os.environ["EVIDENCE_BUCKET"]
          platform_run_id = os.environ["PLATFORM_RUN_ID"]
          scenario_run_id = os.environ["SCENARIO_RUN_ID"]
          profile_id = os.environ["PROFILE_ID"]
          event_count = max(1, int(os.environ["EVENT_COUNT"]))
          workers = max(1, int(os.environ["WORKERS"]))
          sleep_seconds = max(0.0, float(os.environ["SLEEP_SECONDS"]))
          timeout_seconds = max(1, int(os.environ["REQUEST_TIMEOUT_SECONDS"]))
          enforce_gate = os.environ["ENFORCE_PROFILE_GATE"].strip().lower() == "true"

          if profile_id not in requirements:
            raise SystemExit(f"Unsupported profile_id={profile_id}")

          ig_base_url = os.environ["IG_BASE_URL"].rstrip("/")
          ig_ingest_path = os.environ["IG_INGEST_PATH"]
          if not ig_ingest_path.startswith("/"):
            ig_ingest_path = "/" + ig_ingest_path
          ingest_url = f"{ig_base_url}{ig_ingest_path}"
          ig_api_key = os.environ["IG_API_KEY"]
          ig_idempotency_table = os.environ["IG_IDEMPOTENCY_TABLE"]

          req = requirements[profile_id]
          started_epoch = int(time.time())
          durations_ms: list[float] = []
          status_counts: dict[str, int] = {}
          admitted = 0
          failed = 0
          failure_samples: list[str] = []

          def post_one(idx: int) -> tuple[bool, str, float]:
            lane_ref = f"rc2_profile:{profile_id}"
            event_id = f"rc2_profile:{profile_id}:{platform_run_id}:{started_epoch}:{idx}"
            payload = {
              "platform_run_id": platform_run_id,
              "scenario_run_id": scenario_run_id,
              "phase_id": "RC2",
              "event_class": "runtime_cert_rc2_profile",
              "event_id": event_id,
              "runtime_lane": lane_ref,
              "trace_id": event_id,
              "profile_id": profile_id,
            }
            body = json.dumps(payload, separators=(",", ":"), ensure_ascii=True).encode("utf-8")
            request = urllib.request.Request(
              ingest_url,
              data=body,
              method="POST",
              headers={"Content-Type": "application/json", "X-IG-Api-Key": ig_api_key},
            )
            t0 = time.perf_counter()
            try:
              with urllib.request.urlopen(request, timeout=timeout_seconds) as resp:
                code = int(resp.status)
              duration_ms = (time.perf_counter() - t0) * 1000.0
              if sleep_seconds > 0:
                time.sleep(sleep_seconds)
              if code == 202:
                return True, "202", duration_ms
              return False, f"unexpected_status:{code}", duration_ms
            except urllib.error.HTTPError as exc:
              duration_ms = (time.perf_counter() - t0) * 1000.0
              if sleep_seconds > 0:
                time.sleep(sleep_seconds)
              return False, f"http_{exc.code}", duration_ms
            except Exception as exc:  # pragma: no cover
              duration_ms = (time.perf_counter() - t0) * 1000.0
              if sleep_seconds > 0:
                time.sleep(sleep_seconds)
              return False, f"{type(exc).__name__}", duration_ms

          with ThreadPoolExecutor(max_workers=workers) as pool:
            futures = [pool.submit(post_one, idx) for idx in range(event_count)]
            for fut in as_completed(futures):
              ok, reason, dur = fut.result()
              durations_ms.append(dur)
              status_counts[reason] = status_counts.get(reason, 0) + 1
              if ok:
                admitted += 1
              else:
                failed += 1
                if len(failure_samples) < 20:
                  failure_samples.append(reason)

          ddb = boto3.client("dynamodb")
          window_max_epoch = int(time.time())
          epochs: list[int] = []
          params: dict[str, Any] = {
            "TableName": ig_idempotency_table,
            "FilterExpression": "#pr = :rid AND attribute_exists(#ae) AND #ae >= :start_epoch",
            "ProjectionExpression": "#ae",
            "ExpressionAttributeNames": {"#pr": "platform_run_id", "#ae": "admitted_at_epoch"},
            "ExpressionAttributeValues": {
              ":rid": {"S": platform_run_id},
              ":start_epoch": {"N": str(started_epoch)},
            },
          }
          while True:
            page = ddb.scan(**params)
            for item in page.get("Items", []):
              raw = item.get("admitted_at_epoch", {}).get("N")
              if raw is None:
                continue
              try:
                epochs.append(int(raw))
              except Exception:
                continue
            last_key = page.get("LastEvaluatedKey")
            if not last_key:
              break
            params["ExclusiveStartKey"] = last_key

          first_epoch = min(epochs) if epochs else None
          latest_epoch = max(epochs) if epochs else None
          observed_window_seconds = 1
          if first_epoch is not None and latest_epoch is not None and latest_epoch > first_epoch:
            observed_window_seconds = latest_epoch - first_epoch
          elif window_max_epoch > started_epoch:
            observed_window_seconds = window_max_epoch - started_epoch

          sample_size_events = len(epochs) if epochs else admitted
          observed_eps = float(sample_size_events) / float(max(1, observed_window_seconds))
          availability_pct = (float(admitted) / float(max(1, event_count))) * 100.0
          error_rate_pct = (float(failed) / float(max(1, event_count))) * 100.0
          duration_observed_minutes = float(observed_window_seconds) / 60.0

          min_sample = int(req["min_sample_events"])
          target_eps = req["target_eps"]
          sample_pass = sample_size_events >= min_sample
          eps_pass = True if target_eps is None else observed_eps >= float(target_eps)
          duration_pass = True
          if req["duration_minutes"] is not None:
            duration_pass = duration_observed_minutes >= float(req["duration_minutes"])
          profile_pass = sample_pass and eps_pass and duration_pass

          snapshot = {
            "captured_at_utc": now_utc(),
            "phase": "RC2_PROFILE",
            "execution_id": execution_id,
            "platform_run_id": platform_run_id,
            "scenario_run_id": scenario_run_id,
            "profile_id": profile_id,
            "requirements": req,
            "ingest": {
              "ingest_url": ingest_url,
              "attempted": event_count,
              "admitted_http_202": admitted,
              "failed_http": failed,
              "workers": workers,
              "sleep_seconds": sleep_seconds,
              "request_timeout_seconds": timeout_seconds,
              "status_counts": status_counts,
              "failure_samples": failure_samples[:8],
            },
            "admission_window": {
              "started_epoch": started_epoch,
              "window_max_epoch": window_max_epoch,
              "first_admitted_epoch": first_epoch,
              "latest_admitted_epoch": latest_epoch,
              "observed_window_seconds": observed_window_seconds,
              "sample_size_events": sample_size_events,
            },
            "metrics": {
              "observed_events_per_second": observed_eps,
              "duration_observed_minutes": duration_observed_minutes,
              "availability_pct": availability_pct,
              "error_rate_pct": error_rate_pct,
              "latency_ms": {
                "p50": pct(durations_ms, 50.0),
                "p95": pct(durations_ms, 95.0),
                "p99": pct(durations_ms, 99.0),
              },
            },
            "gates": {
              "sample_pass": sample_pass,
              "eps_pass": eps_pass,
              "duration_pass": duration_pass,
              "profile_pass": profile_pass,
            },
          }

          blockers: list[dict[str, str]] = []
          if not sample_pass:
            blockers.append({"code": "RC-B4", "message": f"{profile_id}: sample_size_events {sample_size_events} < {min_sample}"})
          if not eps_pass:
            blockers.append({"code": "RC-B4", "message": f"{profile_id}: observed_eps {observed_eps:.6f} < target_eps {target_eps}"})
          if not duration_pass:
            blockers.append({"code": "RC-B4", "message": f"{profile_id}: duration_minutes {duration_observed_minutes:.4f} < required {req['duration_minutes']}"})

          register = {
            "captured_at_utc": now_utc(),
            "phase": "RC2_PROFILE",
            "execution_id": execution_id,
            "platform_run_id": platform_run_id,
            "scenario_run_id": scenario_run_id,
            "profile_id": profile_id,
            "blocker_count": len(blockers),
            "blockers": blockers,
          }

          summary = {
            "captured_at_utc": now_utc(),
            "phase": "RC2_PROFILE",
            "execution_id": execution_id,
            "platform_run_id": platform_run_id,
            "scenario_run_id": scenario_run_id,
            "profile_id": profile_id,
            "overall_pass": len(blockers) == 0,
            "verdict": "PROFILE_PASS" if len(blockers) == 0 else "HOLD_REMEDIATE",
            "next_gate": "RC2_PROFILE_READY" if len(blockers) == 0 else "RC2_PROFILE_REMEDIATION_REQUIRED",
            "blocker_count": len(blockers),
          }

          local_snapshot = run_dir / "rc2_profile_snapshot.json"
          local_register = run_dir / "rc2_profile_blocker_register.json"
          local_summary = run_dir / "rc2_profile_execution_summary.json"
          local_snapshot.write_text(json.dumps(snapshot, indent=2, ensure_ascii=True) + "\n", encoding="utf-8")
          local_register.write_text(json.dumps(register, indent=2, ensure_ascii=True) + "\n", encoding="utf-8")
          local_summary.write_text(json.dumps(summary, indent=2, ensure_ascii=True) + "\n", encoding="utf-8")

          s3 = boto3.client("s3")
          prefix = f"evidence/dev_full/cert/runtime/{execution_id}"
          for name, payload in {
            "rc2_profile_snapshot.json": snapshot,
            "rc2_profile_blocker_register.json": register,
            "rc2_profile_execution_summary.json": summary,
          }.items():
            key = f"{prefix}/{name}"
            body = (json.dumps(payload, indent=2, ensure_ascii=True) + "\n").encode("utf-8")
            s3.put_object(Bucket=evidence_bucket, Key=key, Body=body, ContentType="application/json")
            s3.head_object(Bucket=evidence_bucket, Key=key)

          print(json.dumps({
            "execution_id": execution_id,
            "profile_id": profile_id,
            "sample_size_events": sample_size_events,
            "observed_eps": observed_eps,
            "overall_pass": summary["overall_pass"],
            "blocker_count": summary["blocker_count"],
            "durable_prefix": f"s3://{evidence_bucket}/{prefix}/",
          }, ensure_ascii=True))

          if enforce_gate and len(blockers) > 0:
            raise SystemExit(1)
          PY

      - name: Upload artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: rc2-profile-${{ inputs.profile_id }}-${{ steps.run_meta.outputs.timestamp }}
          path: ${{ steps.run_meta.outputs.run_dir }}
          if-no-files-found: warn
