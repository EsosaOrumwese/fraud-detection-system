name: dev-full-m1-packaging

on:
  workflow_dispatch:
    inputs:
      platform_run_id:
        description: "Run scope for P(-1) evidence layout"
        required: true
        type: string
      aws_region:
        description: "AWS region for ECR operations"
        required: true
        type: string
      aws_role_to_assume:
        description: "OIDC role ARN used by GitHub Actions"
        required: true
        type: string
      ecr_repo_name:
        description: "ECR repository name (for digest resolution)"
        required: true
        type: string
      ecr_repo_uri:
        description: "ECR repository URI (for build/push tag)"
        required: true
        type: string
      image_build_context_path:
        description: "Docker build context path"
        required: false
        default: "."
        type: string
      image_dockerfile_path:
        description: "Dockerfile path"
        required: false
        default: "Dockerfile"
        type: string
      push_dev_full_latest:
        description: "Also push non-authoritative dev-full-latest convenience tag"
        required: false
        default: false
        type: boolean
      s3_evidence_bucket:
        description: "Optional evidence bucket for direct P(-1) upload"
        required: false
        default: ""
        type: string
      concurrency_group_suffix:
        description: "Concurrency-group suffix (default keeps branch-serialized posture; override for stress windows)"
        required: false
        default: "shared"
        type: string

permissions:
  contents: read
  id-token: write

concurrency:
  group: dev-full-m1-packaging-${{ github.ref_name }}-${{ inputs.concurrency_group_suffix }}
  cancel-in-progress: false

jobs:
  build_and_push:
    name: Build and push immutable platform image (dev_full)
    runs-on: ubuntu-latest
    outputs:
      image_tag: ${{ steps.meta.outputs.image_tag }}
      image_digest: ${{ steps.digest.outputs.image_digest }}
      git_sha: ${{ steps.meta.outputs.git_sha }}
      ci_run_id: ${{ steps.run_meta.outputs.ci_run_id }}
      build_actor: ${{ steps.run_meta.outputs.build_actor }}
      phase_prefix: ${{ steps.evidence.outputs.phase_prefix }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Reject static AWS credential posture
        shell: bash
        run: |
          set -euo pipefail
          if [[ -n "${AWS_ACCESS_KEY_ID:-}" || -n "${AWS_SECRET_ACCESS_KEY:-}" ]]; then
            echo "Static AWS credentials are forbidden; use OIDC role assumption."
            exit 1
          fi

      - name: Configure AWS credentials via OIDC
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-region: ${{ inputs.aws_region }}
          role-to-assume: ${{ inputs.aws_role_to_assume }}

      - name: Login to ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Setup Buildx
        uses: docker/setup-buildx-action@v3
        with:
          install: true

      - name: Compute immutable image metadata
        id: meta
        shell: bash
        run: |
          set -euo pipefail
          GIT_SHA="${GITHUB_SHA}"
          CI_RUN_ID="${GITHUB_RUN_ID}"
          SOURCE_DATE_EPOCH="$(git log -1 --pretty=%ct "${GITHUB_SHA}")"
          IMAGE_TAG="git-${GIT_SHA}-run-${CI_RUN_ID}"
          GIT_SHA_CANONICAL_TAG="git-${GIT_SHA}"
          IMAGE_REF="${{ inputs.ecr_repo_uri }}:${IMAGE_TAG}"
          echo "git_sha=${GIT_SHA}" >> "$GITHUB_OUTPUT"
          echo "source_date_epoch=${SOURCE_DATE_EPOCH}" >> "$GITHUB_OUTPUT"
          echo "image_tag=${IMAGE_TAG}" >> "$GITHUB_OUTPUT"
          echo "git_sha_canonical_tag=${GIT_SHA_CANONICAL_TAG}" >> "$GITHUB_OUTPUT"
          echo "image_ref=${IMAGE_REF}" >> "$GITHUB_OUTPUT"

      - name: Record CI run metadata
        id: run_meta
        shell: bash
        run: |
          set -euo pipefail
          echo "ci_run_id=${GITHUB_RUN_ID}" >> "$GITHUB_OUTPUT"
          echo "build_actor=${GITHUB_ACTOR}" >> "$GITHUB_OUTPUT"

      - name: Stage deterministic build context
        id: stage_context
        shell: bash
        env:
          SOURCE_DATE_EPOCH: ${{ steps.meta.outputs.source_date_epoch }}
          IMAGE_BUILD_CONTEXT_PATH: ${{ inputs.image_build_context_path }}
          IMAGE_DOCKERFILE_PATH: ${{ inputs.image_dockerfile_path }}
        run: |
          set -euo pipefail
          python - <<'PY'
          import os
          import shutil
          import subprocess
          import sys
          from pathlib import Path

          source_date_epoch = int(os.environ["SOURCE_DATE_EPOCH"])
          image_build_context_path = os.environ["IMAGE_BUILD_CONTEXT_PATH"].strip()
          image_dockerfile_path = os.environ["IMAGE_DOCKERFILE_PATH"].strip()
          output_path = Path(os.environ["GITHUB_OUTPUT"])
          repo_root = Path(".").resolve()
          if image_build_context_path != ".":
              raise SystemExit(
                  f"IMAGE_BUILD_CONTEXT_PATH must remain '.' for deterministic M1 lane, got: {image_build_context_path}"
              )

          stage_root = Path(os.environ["RUNNER_TEMP"]) / f"m1-dctx-{os.environ['GITHUB_RUN_ID']}-{os.environ['GITHUB_RUN_ATTEMPT']}"
          if stage_root.exists():
              shutil.rmtree(stage_root)
          stage_root.mkdir(parents=True, exist_ok=True)

          include_paths = [
              image_dockerfile_path,
              "pyproject.toml",
              "requirements/m1-image.lock.txt",
              "src/fraud_detection",
              "config/platform",
              "docs/model_spec/platform/contracts",
              "docs/model_spec/data-engine/interface_pack/engine_outputs.catalogue.yaml",
              "docs/model_spec/data-engine/interface_pack/engine_gates.map.yaml",
              "docs/model_spec/data-engine/interface_pack/contracts/canonical_event_envelope.schema.yaml",
              "docs/model_spec/data-engine/interface_pack/contracts/engine_invocation.schema.yaml",
              "docs/model_spec/data-engine/interface_pack/contracts/engine_output_locator.schema.yaml",
              "docs/model_spec/data-engine/interface_pack/contracts/gate_receipt.schema.yaml",
              "docs/model_spec/data-engine/interface_pack/contracts/instance_proof_receipt.schema.yaml",
              "docs/model_spec/data-engine/interface_pack/contracts/run_receipt.schema.yaml",
              "docs/model_spec/data-engine/layer-1/specs/contracts/1A/schemas.layer1.yaml",
              "docs/model_spec/data-engine/layer-2/specs/contracts/5B",
              "docs/model_spec/data-engine/layer-3/specs/contracts/6B",
          ]

          copied = []
          for rel in include_paths:
              src = (repo_root / rel).resolve()
              if not src.exists():
                  raise SystemExit(f"Required deterministic context path missing: {rel}")
              dst = (stage_root / rel).resolve()
              dst.parent.mkdir(parents=True, exist_ok=True)
              if src.is_dir():
                  shutil.copytree(src, dst, symlinks=True)
              else:
                  shutil.copy2(src, dst)
              copied.append(rel)

          wheelhouse_dir = (stage_root / "requirements" / "wheelhouse").resolve()
          wheelhouse_dir.mkdir(parents=True, exist_ok=True)
          lock_path = (stage_root / "requirements" / "m1-image.lock.txt").resolve()
          subprocess.check_call(
              [
                  sys.executable,
                  "-m",
                  "pip",
                  "download",
                  "--require-hashes",
                  "--no-deps",
                  "--only-binary=:all:",
                  "--dest",
                  str(wheelhouse_dir),
                  "-r",
                  str(lock_path),
              ]
          )

          def normalize_tree(path: Path) -> None:
              entries = [path]
              entries.extend(sorted(path.rglob("*")))
              for item in entries:
                  try:
                      os.utime(item, (source_date_epoch, source_date_epoch), follow_symlinks=False)
                  except Exception:
                      os.utime(item, (source_date_epoch, source_date_epoch))

          normalize_tree(stage_root)

          staged_dockerfile = (stage_root / image_dockerfile_path).resolve()
          if not staged_dockerfile.exists():
              raise SystemExit(f"Staged Dockerfile missing: {staged_dockerfile}")

          output_lines = [
              f"staged_context_path={stage_root}",
              f"staged_dockerfile_path={staged_dockerfile}",
              f"copied_path_count={len(copied)}",
          ]
          with output_path.open("a", encoding="utf-8") as fh:
              for line in output_lines:
                  fh.write(f"{line}\n")
          PY

      - name: Build and push immutable image (deterministic buildx)
        shell: bash
        run: |
          set -euo pipefail
          EXTRA_TAG_ARGS=()
          if [[ "${{ inputs.push_dev_full_latest }}" == "true" ]]; then
            EXTRA_TAG_ARGS+=(--tag "${{ inputs.ecr_repo_uri }}:dev-full-latest")
          fi
          docker buildx build \
            --file "${{ steps.stage_context.outputs.staged_dockerfile_path }}" \
            --platform "linux/amd64" \
            --provenance=false \
            --sbom=false \
            --build-arg "SOURCE_DATE_EPOCH=${{ steps.meta.outputs.source_date_epoch }}" \
            --tag "${{ steps.meta.outputs.image_ref }}" \
            "${EXTRA_TAG_ARGS[@]}" \
            --push \
            "${{ steps.stage_context.outputs.staged_context_path }}"

      - name: Resolve immutable image digest
        id: digest
        shell: bash
        run: |
          set -euo pipefail
          DIGEST="$(aws ecr describe-images \
            --repository-name "${{ inputs.ecr_repo_name }}" \
            --image-ids imageTag="${{ steps.meta.outputs.image_tag }}" \
            --region "${{ inputs.aws_region }}" \
            --query 'imageDetails[0].imageDigest' \
            --output text)"
          if [[ -z "${DIGEST}" || "${DIGEST}" == "None" || "${DIGEST}" == "null" ]]; then
            echo "Unable to resolve immutable digest from ECR."
            exit 1
          fi
          echo "image_digest=${DIGEST}" >> "$GITHUB_OUTPUT"

      - name: Resolve immutable manifest surfaces
        id: manifest
        shell: bash
        run: |
          set -euo pipefail
          MANIFEST_JSON="$(aws ecr batch-get-image \
            --repository-name "${{ inputs.ecr_repo_name }}" \
            --image-ids imageDigest="${{ steps.digest.outputs.image_digest }}" \
            --accepted-media-types "application/vnd.docker.distribution.manifest.v2+json" \
            --region "${{ inputs.aws_region }}" \
            --query 'images[0].imageManifest' \
            --output text)"
          if [[ -z "${MANIFEST_JSON}" || "${MANIFEST_JSON}" == "None" || "${MANIFEST_JSON}" == "null" ]]; then
            echo "Unable to resolve image manifest for immutable digest."
            exit 1
          fi
          export MANIFEST_JSON
          python - <<'PY' >> "$GITHUB_OUTPUT"
          import json
          import os

          manifest = json.loads(os.environ["MANIFEST_JSON"])
          config_digest = str(manifest["config"]["digest"])
          layer_digests = [str(row["digest"]) for row in manifest.get("layers", [])]
          if not config_digest or not layer_digests:
              raise SystemExit("Manifest parsing failed: missing config or layer digests.")
          print(f"config_digest={config_digest}")
          print(
              "layer_digests_json="
              + json.dumps(layer_digests, ensure_ascii=True, separators=(",", ":"))
          )
          PY

      - name: Emit M1.C evidence artifacts (CI-local)
        id: evidence
        shell: bash
        env:
          PLATFORM_RUN_ID: ${{ inputs.platform_run_id }}
          IMAGE_TAG: ${{ steps.meta.outputs.image_tag }}
          GIT_SHA_CANONICAL_TAG: ${{ steps.meta.outputs.git_sha_canonical_tag }}
          IMAGE_DIGEST: ${{ steps.digest.outputs.image_digest }}
          IMAGE_CONFIG_DIGEST: ${{ steps.manifest.outputs.config_digest }}
          IMAGE_LAYER_DIGESTS_JSON: ${{ steps.manifest.outputs.layer_digests_json }}
          GIT_SHA: ${{ steps.meta.outputs.git_sha }}
          BUILD_ACTOR: ${{ steps.run_meta.outputs.build_actor }}
          CI_RUN_ID: ${{ steps.run_meta.outputs.ci_run_id }}
          ECR_REPO_URI: ${{ inputs.ecr_repo_uri }}
          IMAGE_DOCKERFILE_PATH: ${{ inputs.image_dockerfile_path }}
          IMAGE_BUILD_CONTEXT_PATH: ${{ inputs.image_build_context_path }}
          DETERMINISTIC_CONTEXT_STAGING: "true"
          OFFLINE_WHEELHOUSE_INSTALL: "true"
          GITHUB_SERVER_URL: ${{ github.server_url }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          GITHUB_RUN_ID: ${{ github.run_id }}
          GITHUB_REF_NAME: ${{ github.ref_name }}
        run: |
          set -euo pipefail
          WRITTEN_AT_UTC="$(date -u +'%Y-%m-%dT%H:%M:%SZ')"
          PHASE_DIR="evidence/runs/${PLATFORM_RUN_ID}/P(-1)"
          mkdir -p "${PHASE_DIR}"
          export WRITTEN_AT_UTC
          export PHASE_DIR
          python - <<'PY'
          import json
          import os
          import re
          from pathlib import Path

          phase_dir = Path(os.environ["PHASE_DIR"])
          platform_run_id = os.environ["PLATFORM_RUN_ID"]
          image_tag = os.environ["IMAGE_TAG"]
          git_sha_canonical_tag = os.environ["GIT_SHA_CANONICAL_TAG"]
          image_digest = os.environ["IMAGE_DIGEST"]
          image_config_digest = os.environ["IMAGE_CONFIG_DIGEST"]
          image_layer_digests = json.loads(os.environ["IMAGE_LAYER_DIGESTS_JSON"])
          git_sha = os.environ["GIT_SHA"]
          build_actor = os.environ["BUILD_ACTOR"]
          ci_run_id = os.environ["CI_RUN_ID"]
          ecr_repo_uri = os.environ["ECR_REPO_URI"]
          dockerfile_path = os.environ["IMAGE_DOCKERFILE_PATH"]
          build_context_path = os.environ["IMAGE_BUILD_CONTEXT_PATH"]
          deterministic_context_staging = os.environ["DETERMINISTIC_CONTEXT_STAGING"].strip().lower() == "true"
          offline_wheelhouse_install = os.environ["OFFLINE_WHEELHOUSE_INSTALL"].strip().lower() == "true"
          written_at_utc = os.environ["WRITTEN_AT_UTC"]
          run_url = (
              f"{os.environ['GITHUB_SERVER_URL']}/"
              f"{os.environ['GITHUB_REPOSITORY']}/actions/runs/{os.environ['GITHUB_RUN_ID']}"
          )
          branch = os.environ["GITHUB_REF_NAME"]

          packaging_provenance = {
              "phase_id": "P(-1)",
              "platform_run_id": platform_run_id,
              "written_at_utc": written_at_utc,
              "image_tag": image_tag,
              "image_digest": image_digest,
              "git_sha": git_sha,
              "build_driver": "github_actions",
              "image_reference_mode": "immutable_preferred",
              "ecr_repo_uri": ecr_repo_uri,
              "git_sha_canonical_tag": git_sha_canonical_tag,
              "dockerfile_path": dockerfile_path,
              "build_context_path": build_context_path,
              "build_completed_at_utc": written_at_utc,
              "build_actor": build_actor,
              "oci_digest_algo": "sha256",
              "oci_digest_value": image_digest,
              "oci_config_digest": image_config_digest,
              "oci_layer_digests": image_layer_digests,
              "deterministic_context_staging": deterministic_context_staging,
              "offline_wheelhouse_install": offline_wheelhouse_install,
          }

          digest_manifest = {
              "phase_id": "P(-1)",
              "platform_run_id": platform_run_id,
              "written_at_utc": written_at_utc,
              "ecr_repo_uri": ecr_repo_uri,
              "image_tag": image_tag,
              "git_sha_canonical_tag": git_sha_canonical_tag,
              "image_digest": image_digest,
              "oci_digest_algo": "sha256",
              "digest_source": "aws_ecr_describe_images",
              "config_digest": image_config_digest,
              "layer_digests": image_layer_digests,
          }

          release_metadata_receipt = {
              "phase_id": "P(-1)",
              "platform_run_id": platform_run_id,
              "written_at_utc": written_at_utc,
              "git_sha": git_sha,
              "image_tag": image_tag,
              "git_sha_canonical_tag": git_sha_canonical_tag,
              "image_digest": image_digest,
              "build_driver": "github_actions",
              "build_actor": build_actor,
              "ci_run_id": ci_run_id,
              "ci_run_url": run_url,
              "branch_ref": branch,
              "release_verdict": "PASS",
              "release_blocker": "",
          }

          checks = []
          def add_check(check_id: str, passed: bool, detail: str) -> None:
              checks.append(
                  {
                      "check_id": check_id,
                      "status": "PASS" if passed else "FAIL",
                      "detail": detail,
                  }
              )

          add_check(
              "digest_format_sha256",
              bool(re.fullmatch(r"sha256:[0-9a-f]{64}", image_digest or "")),
              f"image_digest={image_digest}",
          )
          add_check(
              "config_digest_format_sha256",
              bool(re.fullmatch(r"sha256:[0-9a-f]{64}", image_config_digest or "")),
              f"image_config_digest={image_config_digest}",
          )
          add_check(
              "layer_digests_format_sha256",
              bool(image_layer_digests)
              and all(re.fullmatch(r"sha256:[0-9a-f]{64}", value or "") for value in image_layer_digests),
              f"layer_digest_count={len(image_layer_digests)}",
          )
          add_check(
              "immutable_tag_pattern",
              bool(re.fullmatch(r"git-[0-9a-f]{40}-run-[0-9]+", image_tag))
              and image_tag == f"git-{git_sha}-run-{ci_run_id}",
              f"image_tag={image_tag}, expected=git-{git_sha}-run-{ci_run_id}",
          )
          add_check(
              "canonical_git_sha_marker",
              git_sha_canonical_tag == f"git-{git_sha}",
              f"git_sha_canonical_tag={git_sha_canonical_tag}, git_sha={git_sha}",
          )
          add_check(
              "oci_anchor_match",
              packaging_provenance["oci_digest_value"] == image_digest,
              "oci digest anchor mirrors resolved image digest",
          )
          add_check(
              "build_driver_pinned",
              packaging_provenance["build_driver"] == "github_actions",
              f"build_driver={packaging_provenance['build_driver']}",
          )
          add_check(
              "required_fields_present",
              all(
                  packaging_provenance.get(k)
                  for k in (
                      "phase_id",
                      "platform_run_id",
                      "written_at_utc",
                      "image_tag",
                      "image_digest",
                      "git_sha",
                      "build_driver",
                      "image_reference_mode",
                      "ecr_repo_uri",
                      "git_sha_canonical_tag",
                      "dockerfile_path",
                      "build_context_path",
                      "build_completed_at_utc",
                      "build_actor",
                  )
              ),
              "all required provenance fields non-empty",
          )

          overall_pass = all(c["status"] == "PASS" for c in checks)
          provenance_consistency = {
              "phase_id": "P(-1)",
              "platform_run_id": platform_run_id,
              "written_at_utc": written_at_utc,
              "overall_pass": overall_pass,
              "checks": checks,
              "linkage_guard_note": (
                  "P(-1) provenance generated; P1 run-pin equality checks execute when run.json/run_header surfaces are materialized."
              ),
          }

          build_command_surface_receipt = {
              "phase_id": "P(-1)",
              "platform_run_id": platform_run_id,
              "written_at_utc": written_at_utc,
              "selected_build_driver": "github_actions",
              "command_family_id": "github_actions_v0",
              "immutable_tag": image_tag,
              "resolved_digest": image_digest,
              "build_actor": build_actor,
              "ci_run_id": ci_run_id,
              "verdict": "PASS" if overall_pass else "FAIL",
              "failure_reason": "" if overall_pass else "PROVENANCE_CONSISTENCY_CHECK_FAILED",
          }

          ci_outputs = {
              "image_tag": image_tag,
              "image_digest": image_digest,
              "git_sha": git_sha,
              "ci_run_id": ci_run_id,
              "build_actor": build_actor,
          }

          files = {
              "packaging_provenance.json": packaging_provenance,
              "image_digest_manifest.json": digest_manifest,
              "release_metadata_receipt.json": release_metadata_receipt,
              "provenance_consistency_checks.json": provenance_consistency,
              "build_command_surface_receipt.json": build_command_surface_receipt,
              "ci_m1_outputs.json": ci_outputs,
          }
          for name, payload in files.items():
              (phase_dir / name).write_text(json.dumps(payload, indent=2), encoding="utf-8")
          PY
          echo "phase_prefix=evidence/runs/${PLATFORM_RUN_ID}/P(-1)" >> "$GITHUB_OUTPUT"

      - name: Optional direct upload to S3 evidence bucket
        if: ${{ inputs.s3_evidence_bucket != '' }}
        shell: bash
        run: |
          set -euo pipefail
          if aws s3api head-bucket --bucket "${{ inputs.s3_evidence_bucket }}" --region "${{ inputs.aws_region }}" > /dev/null 2>&1; then
            aws s3 cp \
              "evidence/runs/${{ inputs.platform_run_id }}/P(-1)/" \
              "s3://${{ inputs.s3_evidence_bucket }}/evidence/runs/${{ inputs.platform_run_id }}/P(-1)/" \
              --recursive
          else
            echo "::warning::Skipping direct S3 evidence upload because bucket '${{ inputs.s3_evidence_bucket }}' is not readable from this workflow role."
          fi

      - name: Upload CI evidence artifact pack
        uses: actions/upload-artifact@v4
        with:
          name: dev-full-m1-p-1-packaging-ci-evidence
          path: evidence/runs/${{ inputs.platform_run_id }}/P(-1)/
          if-no-files-found: error
