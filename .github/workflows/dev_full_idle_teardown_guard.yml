name: dev-full-idle-teardown-guard

on:
  workflow_dispatch:
    inputs:
      aws_region:
        description: "AWS region for ECS/SSM/evidence operations"
        required: true
        default: "eu-west-2"
        type: string
      aws_role_to_assume:
        description: "OIDC role ARN used by GitHub Actions"
        required: true
        type: string
      ecs_cluster_name:
        description: "ECS cluster name"
        required: true
        default: "fraud-platform-dev-full"
        type: string
      service_name_prefixes:
        description: "Comma-separated ECS service name prefixes to guard"
        required: true
        default: "fraud-platform-dev-full"
        type: string
      heartbeat_param_path:
        description: "SSM heartbeat parameter path"
        required: true
        default: "/fraud-platform/dev_full/demo/manual/heartbeat"
        type: string
      idle_ttl_minutes:
        description: "Idle threshold in minutes"
        required: true
        default: "90"
        type: string
      enforcement_mode:
        description: "Idle-breach enforcement mode"
        required: true
        default: "observe_only"
        type: choice
        options:
          - observe_only
          - stop_services
          - dispatch_m13_teardown
      m13_workflow_file:
        description: "Workflow file used when enforcement_mode=dispatch_m13_teardown"
        required: true
        default: "dev_full_m13_managed.yml"
        type: string
      m13_workflow_ref:
        description: "Git ref for M13 workflow dispatch (empty = current ref)"
        required: false
        default: ""
        type: string
      m13_upstream_m12j_execution:
        description: "Upstream M12.J execution id for M13 dispatch mode"
        required: false
        default: ""
        type: string
      m13_upstream_m13e_execution:
        description: "Upstream M13.E execution id for M13 dispatch mode"
        required: false
        default: ""
        type: string
      m13_teardown_override:
        description: "Teardown action override for M13.F dispatch mode"
        required: true
        default: "scale_to_zero_or_destroy"
        type: choice
        options:
          - inherit_from_handles
          - scale_to_zero_or_destroy
          - scale_to_zero_then_destroy_idle_window
      m13_evidence_bucket:
        description: "Evidence bucket input used when dispatching M13 workflow"
        required: true
        default: "fraud-platform-dev-full-evidence"
        type: string
      evidence_bucket:
        description: "Durable evidence bucket for idle guard snapshots"
        required: true
        default: "fraud-platform-dev-full-evidence"
        type: string
      evidence_prefix:
        description: "Evidence key prefix for idle guard snapshots"
        required: true
        default: "evidence/dev_full/run_control"
        type: string
      upload_evidence_to_s3:
        description: "Upload idle guard snapshot JSON to S3"
        required: true
        default: true
        type: boolean
  schedule:
    - cron: "*/30 * * * *"

permissions:
  actions: write
  contents: read
  id-token: write

concurrency:
  group: dev-full-idle-teardown-guard-${{ github.ref_name }}
  cancel-in-progress: false

jobs:
  enforce_idle_guard:
    name: Enforce dev_full idle guard
    runs-on: ubuntu-latest
    env:
      RESOLVED_AWS_REGION: ${{ github.event.inputs.aws_region || vars.DEV_FULL_AWS_REGION || 'eu-west-2' }}
      RESOLVED_AWS_ROLE: ${{ github.event.inputs.aws_role_to_assume || vars.DEV_FULL_AWS_ROLE_TO_ASSUME }}
      RESOLVED_ECS_CLUSTER: ${{ github.event.inputs.ecs_cluster_name || vars.DEV_FULL_ECS_CLUSTER_NAME || 'fraud-platform-dev-full' }}
      RESOLVED_SERVICE_PREFIXES: ${{ github.event.inputs.service_name_prefixes || vars.DEV_FULL_SERVICE_NAME_PREFIXES || 'fraud-platform-dev-full' }}
      RESOLVED_HEARTBEAT_PARAM: ${{ github.event.inputs.heartbeat_param_path || vars.DEV_FULL_HEARTBEAT_PARAM_PATH || '/fraud-platform/dev_full/demo/manual/heartbeat' }}
      RESOLVED_IDLE_TTL_MINUTES: ${{ github.event.inputs.idle_ttl_minutes || vars.DEV_FULL_IDLE_TTL_MINUTES || '90' }}
      RESOLVED_ENFORCEMENT_MODE: ${{ github.event.inputs.enforcement_mode || vars.DEV_FULL_IDLE_GUARD_MODE || 'observe_only' }}
      RESOLVED_M13_WORKFLOW_FILE: ${{ github.event.inputs.m13_workflow_file || vars.DEV_FULL_IDLE_M13_WORKFLOW_FILE || 'dev_full_m13_managed.yml' }}
      RESOLVED_M13_WORKFLOW_REF: ${{ github.event.inputs.m13_workflow_ref || vars.DEV_FULL_IDLE_M13_WORKFLOW_REF || github.ref_name }}
      RESOLVED_M13_UPSTREAM_M12J_EXECUTION: ${{ github.event.inputs.m13_upstream_m12j_execution || vars.DEV_FULL_M13_UPSTREAM_M12J_EXECUTION || '' }}
      RESOLVED_M13_UPSTREAM_M13E_EXECUTION: ${{ github.event.inputs.m13_upstream_m13e_execution || vars.DEV_FULL_M13_UPSTREAM_M13E_EXECUTION || '' }}
      RESOLVED_M13_TEARDOWN_OVERRIDE: ${{ github.event.inputs.m13_teardown_override || vars.DEV_FULL_M13_TEARDOWN_OVERRIDE || 'scale_to_zero_or_destroy' }}
      RESOLVED_M13_EVIDENCE_BUCKET: ${{ github.event.inputs.m13_evidence_bucket || vars.DEV_FULL_M13_EVIDENCE_BUCKET || 'fraud-platform-dev-full-evidence' }}
      RESOLVED_EVIDENCE_BUCKET: ${{ github.event.inputs.evidence_bucket || vars.DEV_FULL_EVIDENCE_BUCKET || 'fraud-platform-dev-full-evidence' }}
      RESOLVED_EVIDENCE_PREFIX: ${{ github.event.inputs.evidence_prefix || vars.DEV_FULL_EVIDENCE_PREFIX || 'evidence/dev_full/run_control' }}
      RESOLVED_UPLOAD_EVIDENCE: ${{ github.event_name == 'schedule' || github.event.inputs.upload_evidence_to_s3 }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Reject static AWS credential posture
        shell: bash
        run: |
          set -euo pipefail
          if [[ -n "${AWS_ACCESS_KEY_ID:-}" || -n "${AWS_SECRET_ACCESS_KEY:-}" ]]; then
            echo "Static AWS credentials are forbidden; use OIDC role assumption."
            exit 1
          fi

      - name: Validate required resolved config
        shell: bash
        run: |
          set -euo pipefail
          if [[ -z "${RESOLVED_AWS_ROLE}" ]]; then
            echo "RESOLVED_AWS_ROLE is empty. Set workflow input or repo variable DEV_FULL_AWS_ROLE_TO_ASSUME."
            exit 1
          fi

      - name: Configure AWS credentials via OIDC
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-region: ${{ env.RESOLVED_AWS_REGION }}
          role-to-assume: ${{ env.RESOLVED_AWS_ROLE }}

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Compute execution metadata
        id: run_meta
        shell: bash
        run: |
          set -euo pipefail
          TS="$(date -u +'%Y%m%dT%H%M%SZ')"
          EXECUTION_ID="idle_guard_${TS}"
          OUTPUT_DIR="runs/dev_substrate/dev_full/idle_guard/${TS}"
          OUTPUT_PATH="${OUTPUT_DIR}/dev_full_idle_teardown_guard_snapshot.json"
          S3_URI="s3://${RESOLVED_EVIDENCE_BUCKET}/${RESOLVED_EVIDENCE_PREFIX}/${EXECUTION_ID}/dev_full_idle_teardown_guard_snapshot.json"
          mkdir -p "${OUTPUT_DIR}"
          echo "timestamp=${TS}" >> "$GITHUB_OUTPUT"
          echo "execution_id=${EXECUTION_ID}" >> "$GITHUB_OUTPUT"
          echo "output_path=${OUTPUT_PATH}" >> "$GITHUB_OUTPUT"
          echo "evidence_s3_uri=${S3_URI}" >> "$GITHUB_OUTPUT"

      - name: Evaluate idle posture and enforce guard
        id: guard
        shell: bash
        env:
          SNAPSHOT_PATH: ${{ steps.run_meta.outputs.output_path }}
          EXECUTION_ID: ${{ steps.run_meta.outputs.execution_id }}
          EVIDENCE_S3_URI: ${{ steps.run_meta.outputs.evidence_s3_uri }}
          AWS_REGION: ${{ env.RESOLVED_AWS_REGION }}
          AWS_ROLE_TO_ASSUME: ${{ env.RESOLVED_AWS_ROLE }}
          ECS_CLUSTER_NAME: ${{ env.RESOLVED_ECS_CLUSTER }}
          SERVICE_NAME_PREFIXES: ${{ env.RESOLVED_SERVICE_PREFIXES }}
          HEARTBEAT_PARAM_PATH: ${{ env.RESOLVED_HEARTBEAT_PARAM }}
          IDLE_TTL_MINUTES: ${{ env.RESOLVED_IDLE_TTL_MINUTES }}
          ENFORCEMENT_MODE: ${{ env.RESOLVED_ENFORCEMENT_MODE }}
          M13_WORKFLOW_FILE: ${{ env.RESOLVED_M13_WORKFLOW_FILE }}
          M13_WORKFLOW_REF: ${{ env.RESOLVED_M13_WORKFLOW_REF }}
          M13_UPSTREAM_M12J_EXECUTION: ${{ env.RESOLVED_M13_UPSTREAM_M12J_EXECUTION }}
          M13_UPSTREAM_M13E_EXECUTION: ${{ env.RESOLVED_M13_UPSTREAM_M13E_EXECUTION }}
          M13_TEARDOWN_OVERRIDE: ${{ env.RESOLVED_M13_TEARDOWN_OVERRIDE }}
          M13_EVIDENCE_BUCKET: ${{ env.RESOLVED_M13_EVIDENCE_BUCKET }}
          GITHUB_TOKEN: ${{ github.token }}
          GITHUB_REF_NAME: ${{ github.ref_name }}
        run: |
          set -euo pipefail
          python - <<'PY'
          import json
          import os
          import subprocess
          import urllib.request
          from datetime import UTC, datetime

          blockers = []

          def aws_json(args, blocker_code):
            cmd = ["aws"] + args + ["--output", "json"]
            proc = subprocess.run(cmd, capture_output=True, text=True)
            if proc.returncode != 0:
              blockers.append(blocker_code)
              return {}
            if not proc.stdout.strip():
              return {}
            try:
              return json.loads(proc.stdout)
            except json.JSONDecodeError:
              blockers.append(f"{blocker_code}_JSON_INVALID")
              return {}

          def safe_aws_json(args):
            cmd = ["aws"] + args + ["--output", "json"]
            proc = subprocess.run(cmd, capture_output=True, text=True)
            if proc.returncode != 0:
              return None, proc.stderr.strip()
            if not proc.stdout.strip():
              return {}, ""
            return json.loads(proc.stdout), ""

          now = datetime.now(UTC)
          actions = []
          cluster = os.environ["ECS_CLUSTER_NAME"]
          prefixes_raw = os.environ["SERVICE_NAME_PREFIXES"]
          heartbeat_path = os.environ["HEARTBEAT_PARAM_PATH"]
          mode = os.environ["ENFORCEMENT_MODE"]
          ttl_raw = os.environ["IDLE_TTL_MINUTES"]

          prefixes = [p.strip() for p in prefixes_raw.split(",") if p.strip()]
          if not prefixes:
            blockers.append("SERVICE_PREFIXES_EMPTY")

          try:
            ttl_minutes = int(ttl_raw)
          except ValueError:
            ttl_minutes = -1
          if ttl_minutes <= 0:
            blockers.append("INVALID_IDLE_TTL")

          service_arns = aws_json(["ecs", "list-services", "--cluster", cluster], "ECS_LIST_FAILED").get("serviceArns", [])
          service_names = []
          for arn in service_arns:
            service_name = arn.rsplit("/", 1)[-1]
            if any(service_name.startswith(prefix) for prefix in prefixes):
              service_names.append(service_name)

          services = []
          failures = []
          for i in range(0, len(service_names), 10):
            chunk = service_names[i : i + 10]
            payload = aws_json(["ecs", "describe-services", "--cluster", cluster, "--services", *chunk], "ECS_DESCRIBE_FAILED")
            services.extend(payload.get("services", []))
            failures.extend(payload.get("failures", []))
          if failures:
            blockers.append("ECS_DESCRIBE_FAILURE")

          active_services = []
          for svc in services:
            desired = int(svc.get("desiredCount", 0))
            running = int(svc.get("runningCount", 0))
            if desired > 0 or running > 0:
              active_services.append(
                {
                  "service_name": svc.get("serviceName"),
                  "service_arn": svc.get("serviceArn"),
                  "desired_count": desired,
                  "running_count": running,
                }
              )

          heartbeat_payload = {}
          heartbeat_error = ""
          param_payload, err = safe_aws_json(["ssm", "get-parameter", "--name", heartbeat_path])
          if err:
            blockers.append("HEARTBEAT_READ_FAILED")
            heartbeat_error = err
          else:
            raw = param_payload.get("Parameter", {}).get("Value", "")
            try:
              heartbeat_payload = json.loads(raw) if raw else {}
            except json.JSONDecodeError:
              blockers.append("HEARTBEAT_JSON_INVALID")

          hb_time_raw = (
            heartbeat_payload.get("updated_at_utc")
            or heartbeat_payload.get("last_activity_utc")
            or heartbeat_payload.get("captured_at_utc")
            or ""
          )
          idle_minutes = None
          if hb_time_raw:
            try:
              hb_dt = datetime.fromisoformat(hb_time_raw.replace("Z", "+00:00"))
              idle_minutes = int((now - hb_dt).total_seconds() // 60)
            except ValueError:
              blockers.append("HEARTBEAT_TIME_INVALID")
          else:
            blockers.append("HEARTBEAT_TIME_MISSING")

          active_run_lock = bool(
            heartbeat_payload.get("run_active")
            or heartbeat_payload.get("run_in_progress")
            or heartbeat_payload.get("active_run")
            or heartbeat_payload.get("teardown_lock")
          )

          idle_breach = idle_minutes is not None and ttl_minutes > 0 and idle_minutes >= ttl_minutes
          if idle_breach and len(active_services) > 0 and active_run_lock and mode in {"stop_services", "dispatch_m13_teardown"}:
            blockers.append("ACTIVE_RUN_LOCKED")
          enforced = {"mode": mode, "triggered": False, "result": "none", "details": []}

          if mode not in {"observe_only", "stop_services", "dispatch_m13_teardown"}:
            blockers.append("INVALID_ENFORCEMENT_MODE")

          if idle_breach and len(active_services) > 0 and mode in {"stop_services", "dispatch_m13_teardown"} and not active_run_lock:
            enforced["triggered"] = True
            if mode == "stop_services":
              for row in active_services:
                proc = subprocess.run(
                  [
                    "aws", "ecs", "update-service",
                    "--cluster", cluster,
                    "--service", row["service_name"],
                    "--desired-count", "0",
                  ],
                  capture_output=True,
                  text=True,
                )
                item = {
                  "service_name": row["service_name"],
                  "rc": proc.returncode,
                  "stderr": proc.stderr.strip(),
                }
                enforced["details"].append(item)
                if proc.returncode != 0:
                  blockers.append("IDLE_STOP_SERVICE_UPDATE_FAILED")
              if "IDLE_STOP_SERVICE_UPDATE_FAILED" not in blockers:
                enforced["result"] = "stopped_services"
                actions.append("stop_services")
            elif mode == "dispatch_m13_teardown":
              upstream_m12j = os.environ.get("M13_UPSTREAM_M12J_EXECUTION", "").strip()
              upstream_m13e = os.environ.get("M13_UPSTREAM_M13E_EXECUTION", "").strip()
              if not upstream_m12j or not upstream_m13e:
                blockers.append("IDLE_M13_UPSTREAM_INPUT_MISSING")
              else:
                payload = {
                  "ref": os.environ.get("M13_WORKFLOW_REF", "") or os.environ.get("GITHUB_REF_NAME", ""),
                  "inputs": {
                    "aws_region": os.environ["AWS_REGION"],
                    "aws_role_to_assume": os.environ["AWS_ROLE_TO_ASSUME"],
                    "evidence_bucket": os.environ["M13_EVIDENCE_BUCKET"],
                    "m13_subphase": "F",
                    "execution_mode": "teardown_execution_closure",
                    "upstream_m12j_execution": upstream_m12j,
                    "upstream_m13e_execution": upstream_m13e,
                    "teardown_non_essential_override": os.environ.get("M13_TEARDOWN_OVERRIDE", "scale_to_zero_or_destroy"),
                  },
                }
                url = (
                  f"{os.environ.get('GITHUB_API_URL', 'https://api.github.com')}"
                  f"/repos/{os.environ['GITHUB_REPOSITORY']}/actions/workflows/{os.environ['M13_WORKFLOW_FILE']}/dispatches"
                )
                req = urllib.request.Request(
                  url,
                  method="POST",
                  headers={
                    "Authorization": f"Bearer {os.environ['GITHUB_TOKEN']}",
                    "Accept": "application/vnd.github+json",
                    "Content-Type": "application/json",
                  },
                  data=json.dumps(payload).encode("utf-8"),
                )
                try:
                  with urllib.request.urlopen(req, timeout=30):
                    pass
                  enforced["result"] = "m13_teardown_dispatched"
                  enforced["details"].append(
                    {
                      "workflow_file": os.environ["M13_WORKFLOW_FILE"],
                      "upstream_m12j_execution": upstream_m12j,
                      "upstream_m13e_execution": upstream_m13e,
                    }
                  )
                  actions.append("dispatch_m13_teardown_execution")
                except Exception as exc:
                  blockers.append("IDLE_M13_DISPATCH_FAILED")
                  enforced["details"].append({"error": str(exc)})

          if idle_breach and len(active_services) > 0 and mode == "observe_only":
            blockers.append("IDLE_BREACH_OBSERVED_ONLY")

          post_service_rows = []
          if service_names:
            for i in range(0, len(service_names), 10):
              chunk = service_names[i : i + 10]
              payload = aws_json(["ecs", "describe-services", "--cluster", cluster, "--services", *chunk], "ECS_POST_DESCRIBE_FAILED")
              for svc in payload.get("services", []):
                post_service_rows.append(
                  {
                    "service_name": svc.get("serviceName"),
                    "desired_count": int(svc.get("desiredCount", 0)),
                    "running_count": int(svc.get("runningCount", 0)),
                    "pending_count": int(svc.get("pendingCount", 0)),
                  }
                )

          overall_pass = len(blockers) == 0
          snapshot = {
            "phase": "M13",
            "phase_id": "P17",
            "lane": "M13.idle_teardown_guard",
            "execution_id": os.environ["EXECUTION_ID"],
            "captured_at_utc": now.strftime("%Y-%m-%dT%H:%M:%SZ"),
            "ecs_cluster_name": cluster,
            "service_name_prefixes": prefixes,
            "heartbeat_param_path": heartbeat_path,
            "idle_ttl_minutes": ttl_minutes,
            "idle_minutes": idle_minutes,
            "idle_breach": idle_breach,
            "active_run_lock": active_run_lock,
            "enforcement_mode": mode,
            "active_service_count": len(active_services),
            "active_services": active_services,
            "post_service_rows": sorted(post_service_rows, key=lambda x: x["service_name"]),
            "heartbeat_payload": heartbeat_payload,
            "heartbeat_error": heartbeat_error,
            "enforcement": enforced,
            "actions": actions,
            "evidence_s3_uri": os.environ.get("EVIDENCE_S3_URI"),
            "blockers": sorted(set(blockers)),
            "overall_pass": overall_pass,
          }

          out = os.environ["SNAPSHOT_PATH"]
          os.makedirs(os.path.dirname(out), exist_ok=True)
          with open(out, "w", encoding="utf-8") as f:
            json.dump(snapshot, f, indent=2)
            f.write("\n")

          with open(os.environ["GITHUB_OUTPUT"], "a", encoding="utf-8") as f:
            f.write(f"overall_pass={'true' if overall_pass else 'false'}\n")
          PY

      - name: Upload idle guard snapshot to S3
        if: ${{ github.event_name == 'schedule' || env.RESOLVED_UPLOAD_EVIDENCE == 'true' }}
        shell: bash
        run: |
          set -euo pipefail
          aws s3 cp \
            "${{ steps.run_meta.outputs.output_path }}" \
            "${{ steps.run_meta.outputs.evidence_s3_uri }}" \
            --region "${{ env.RESOLVED_AWS_REGION }}"

      - name: Upload workflow artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: dev-full-idle-teardown-guard-${{ steps.run_meta.outputs.timestamp }}
          path: ${{ steps.run_meta.outputs.output_path }}
          if-no-files-found: error

      - name: Enforce fail-closed verdict
        if: ${{ steps.guard.outputs.overall_pass != 'true' }}
        shell: bash
        run: |
          set -euo pipefail
          echo "Idle guard failed closed. See snapshot artifact."
          exit 1
