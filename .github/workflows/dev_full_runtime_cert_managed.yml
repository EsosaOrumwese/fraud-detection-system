              ]
          except Exception as exc:
              msf_probe_error = f"{type(exc).__name__}:{exc}"

          selected = ""
          blockers = []
          decision_reason = ""

          if requested == "EKS_FLINK_OPERATOR":
              selected = "EKS_FLINK_OPERATOR"
              decision_reason = "USER_REQUESTED_FALLBACK_PATH"
          elif requested == "MSF_MANAGED":
              if msf_probe_error:
                  blockers.append(f"PR3.S1.MANAGED.B02_MSF_SURFACE_UNREADABLE:{msf_probe_error}")
                  decision_reason = "EXPLICIT_MSF_REQUEST_BUT_MSF_SURFACE_UNREADABLE"
              elif wsp_apps:
                  selected = "MSF_MANAGED"
                  blockers.append("PR3.S1.MANAGED.B04_MSF_PATH_UNIMPLEMENTED")
