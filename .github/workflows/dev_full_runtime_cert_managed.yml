          EKS_NAMESPACE: fraud-platform-rtdl
          WORKER_IMAGE_URI: 230372904534.dkr.ecr.eu-west-2.amazonaws.com/fraud-platform-dev-full@sha256:49eb6cb0c5e33061fae4d1aaceeac2e44600adb5c4250436be9ac8395ed29cb2
          IG_BASE_URL: https://ehwznd2uw7.execute-api.eu-west-2.amazonaws.com/v1
