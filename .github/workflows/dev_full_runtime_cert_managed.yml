        with:
          version: "latest"

      - name: Install runtime dependencies
        shell: bash
        run: |
          set -euo pipefail
          python -m pip install --upgrade pip
          python -m pip install boto3 botocore

      - name: Resolve IG API key from SSM
        shell: bash
        env:
          SSM_IG_API_KEY_PATH: /fraud-platform/dev_full/ig/api_key
