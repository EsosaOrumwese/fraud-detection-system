            PR3_EID="pr3_20260306T021900Z"
          fi
          EXEC_SAFE="$(echo "${PR3_EID}" | tr '[:upper:]_' '[:lower:]-' | sed -E 's/[^a-z0-9-]//g' | cut -c1-24)"
