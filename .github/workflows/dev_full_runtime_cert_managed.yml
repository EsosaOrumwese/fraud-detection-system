          python - <<'PY'
          import json
          import os
          from datetime import datetime, timezone
          from pathlib import Path

          import boto3

          def now_utc() -> str:
              return datetime.now(timezone.utc).isoformat().replace("+00:00", "Z")

          region = os.environ["AWS_REGION"]
          requested = os.environ["RUNTIME_PATH_REQUESTED"].strip().upper()
          pr3_execution_id = os.environ["PR3_EXECUTION_ID"]
