              "decision_reason": decision_reason,
              "overall_pass": len(blockers) == 0 and selected == "EKS_FLINK_OPERATOR",
              "blocker_ids": blockers,
          }

          out = run_dir / "g3a_s1_managed_runtime_path_selection.json"
          out.write_text(json.dumps(payload, indent=2, ensure_ascii=True) + "\n", encoding="utf-8")
          print(json.dumps(payload, indent=2))
          PY

      - name: Fail closed if runtime-path selection blocked
        shell: bash
        env:
          RUN_DIR: ${{ steps.meta.outputs.run_dir }}
        run: |
          set -euo pipefail
          python - <<'PY'
          import json
          import os
