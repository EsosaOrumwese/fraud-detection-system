                  blockers.append("PR3.S1.MANAGED.B04_MSF_PATH_UNIMPLEMENTED")
                  decision_reason = "AUTO_FOUND_WSP_MANAGED_APP_BUT_NO_CANONICAL_MSF_PRESSURE_IMPL_IN_REPO"
              else:
                  selected = "EKS_FLINK_OPERATOR"
                  decision_reason = "AUTO_SELECTED_FALLBACK_BECAUSE_WSP_MANAGED_APP_UNREADABLE_OR_MISSING"
          else:
              blockers.append(f"PR3.S1.MANAGED.B01_INVALID_RUNTIME_PATH_REQUEST:{requested}")

          payload = {
              "phase": "PR3",
              "state": "S1",
              "generated_at_utc": now_utc(),
              "generated_by": "github-actions",
              "version": "1.0.0",
