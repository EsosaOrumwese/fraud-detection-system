name: dev-full-runtime-cert-managed

on:
  workflow_dispatch:
    inputs:
      phase_mode:
        description: "Runtime certification lane (rc0..rc6, rc2r2)"
        required: true
        default: "rc0"
        type: choice
        options:
          - rc0
          - rc1
          - rc2
          - rc2r2
          - rc3
          - rc4
          - rc5
          - rc6
      aws_region:
        description: "AWS region"
        required: true
        default: "eu-west-2"
        type: string
      aws_role_to_assume:
        description: "OIDC role ARN used by GitHub Actions"
        required: true
        type: string
      platform_run_id:
        description: "Pinned platform run id"
        required: true
        type: string
      scenario_run_id:
        description: "Pinned scenario run id"
        required: true
        type: string
      runtime_cert_execution_id:
        description: "Optional fixed runtime-cert execution id"
        required: false
        default: ""
        type: string
      upstream_rc0_execution:
        description: "Authoritative RC0 execution id used as RC1 upstream"
        required: false
        default: "rc0_claim_model_lock_20260302T182859Z"
        type: string
      rc1_cert_window_start_utc:
        description: "Optional RC1 cert-window start override (ISO-8601 UTC)"
        required: false
        default: ""
        type: string
      rc1_non_claimable_execution_ids:
        description: "Comma-separated runtime execution ids excluded from claimability"
        required: false
        default: "rc0_claim_model_lock_20260302T182821Z,rc0_claim_model_lock_20260302T182833Z"
        type: string
      upstream_rc1_execution:
        description: "Authoritative RC1 execution id used as RC2 upstream"
        required: false
        default: "rc1_runtime_evidence_inventory_20260302T192109Z"
        type: string
      rc2_non_claimable_execution_ids:
        description: "Comma-separated RC2/profile execution ids excluded from claimability"
        required: false
        default: "rc2_tier0_scorecard_20260302T153540Z,rc2_tier0_scorecard_20260302T153633Z"
        type: string
      rc2_remediation_mode:
        description: "RC2 mode: adjudication-only or full remediation (profile generation + manifest + adjudication)"
        required: false
        default: "full_remediation"
        type: choice
        options:
          - full_remediation
          - adjudicate_only
      rc2_profile_probe_table:
        description: "DynamoDB table used for managed profile sample probing"
        required: false
        default: "fraud-platform-dev-full-ig-idempotency"
        type: string
      rc2r2_apigw_ig_stage_name:
        description: "RC2.R2 API Gateway stage name"
        required: false
        default: "v1"
        type: string
      rc2r2_ig_rate_limit_rps:
        description: "RC2.R2 target IG rate limit (RPS)"
        required: false
        default: "3000"
        type: string
      rc2r2_ig_rate_limit_burst:
        description: "RC2.R2 target IG burst limit"
        required: false
        default: "6000"
        type: string
      rc2r2_eks_nodegroup_instance_types_json:
        description: "RC2.R2 target nodegroup instance types (JSON list)"
        required: false
        default: "[\"t3.xlarge\"]"
        type: string
      rc2r2_eks_nodegroup_desired_size:
        description: "RC2.R2 target nodegroup desired size"
        required: false
        default: "4"
        type: string
      rc2r2_eks_nodegroup_min_size:
        description: "RC2.R2 target nodegroup min size"
        required: false
        default: "2"
        type: string
      rc2r2_eks_nodegroup_max_size:
        description: "RC2.R2 target nodegroup max size"
        required: false
        default: "8"
        type: string
      evidence_bucket:
        description: "S3 evidence bucket"
        required: true
        default: "fraud-platform-dev-full-evidence"
        type: string

permissions:
  contents: read
  id-token: write

concurrency:
  group: dev-full-runtime-cert-${{ inputs.phase_mode }}-${{ github.ref_name }}
  cancel-in-progress: false

jobs:
  run_runtime_cert:
    name: Run runtime certification lane
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Reject static AWS credential posture
        shell: bash
        run: |
          set -euo pipefail
          if [[ -n "${AWS_ACCESS_KEY_ID:-}" || -n "${AWS_SECRET_ACCESS_KEY:-}" ]]; then
            echo "Static AWS credentials are forbidden; use OIDC role assumption."
            exit 1
          fi

      - name: Configure AWS credentials via OIDC
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-region: ${{ inputs.aws_region }}
          role-to-assume: ${{ inputs.aws_role_to_assume }}

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_wrapper: false

      - name: Install runtime dependencies
        shell: bash
        run: |
          set -euo pipefail
          python -m pip install --upgrade pip
          python -m pip install boto3 botocore

      - name: Compute execution metadata
        id: run_meta
        shell: bash
        run: |
          set -euo pipefail
          TS="$(date -u +'%Y%m%dT%H%M%SZ')"
          if [[ -n "${{ inputs.runtime_cert_execution_id }}" ]]; then
            EXEC_ID="${{ inputs.runtime_cert_execution_id }}"
          else
            case "${{ inputs.phase_mode }}" in
              rc0) EXEC_ID="rc0_claim_model_lock_${TS}" ;;
              rc1) EXEC_ID="rc1_runtime_evidence_inventory_${TS}" ;;
              rc2) EXEC_ID="rc2_tier0_scorecard_${TS}" ;;
              rc2r2) EXEC_ID="rc2_r2_capacity_envelope_${TS}" ;;
              rc3) EXEC_ID="rc3_tier0_drill_pack_${TS}" ;;
              rc4) EXEC_ID="rc4_tier1_runtime_pack_${TS}" ;;
              rc5) EXEC_ID="rc5_tier2_runtime_pack_${TS}" ;;
              rc6) EXEC_ID="rc6_runtime_rollup_${TS}" ;;
              *) echo "Unsupported phase_mode: ${{ inputs.phase_mode }}" ; exit 1 ;;
            esac
          fi
          RUN_DIR="runs/dev_substrate/dev_full/cert/runtime/${EXEC_ID}"
          echo "timestamp=${TS}" >> "$GITHUB_OUTPUT"
          echo "runtime_cert_execution_id=${EXEC_ID}" >> "$GITHUB_OUTPUT"
          echo "run_dir=${RUN_DIR}" >> "$GITHUB_OUTPUT"

      - name: Resolve lane handler
        id: lane
        shell: bash
        run: |
          set -euo pipefail
          PHASE="${{ inputs.phase_mode }}"
          case "${PHASE}" in
            rc0)
              echo "lane_supported=false" >> "$GITHUB_OUTPUT"
              echo "unsupported_reason=Base workflow scaffold is in place, but RC0 handler is not yet repository-tracked. Add lane implementation before execution." >> "$GITHUB_OUTPUT"
              ;;
            rc1)
              echo "lane_supported=true" >> "$GITHUB_OUTPUT"
              echo "handler_path=" >> "$GITHUB_OUTPUT"
              echo "snapshot_path=${{ steps.run_meta.outputs.run_dir }}/rc1_execution_snapshot.json" >> "$GITHUB_OUTPUT"
              echo "expected_next_gate=RC2_READY_WITH_GAP_REGISTER" >> "$GITHUB_OUTPUT"
              ;;
            rc2)
              echo "lane_supported=true" >> "$GITHUB_OUTPUT"
              echo "handler_path=" >> "$GITHUB_OUTPUT"
              echo "snapshot_path=${{ steps.run_meta.outputs.run_dir }}/rc2_execution_snapshot.json" >> "$GITHUB_OUTPUT"
              echo "expected_next_gate=" >> "$GITHUB_OUTPUT"
              ;;
            rc2r2)
              echo "lane_supported=true" >> "$GITHUB_OUTPUT"
              echo "handler_path=" >> "$GITHUB_OUTPUT"
              echo "snapshot_path=${{ steps.run_meta.outputs.run_dir }}/rc2_r2_execution_summary.json" >> "$GITHUB_OUTPUT"
              echo "expected_next_gate=READY_FOR_RC2_R5" >> "$GITHUB_OUTPUT"
              ;;
            rc3|rc4|rc5|rc6)
              echo "lane_supported=false" >> "$GITHUB_OUTPUT"
              echo "unsupported_reason=Handler for ${PHASE} is not implemented yet. Add a lane handler and extend this workflow mapping." >> "$GITHUB_OUTPUT"
              ;;
            *)
              echo "lane_supported=false" >> "$GITHUB_OUTPUT"
              echo "unsupported_reason=Invalid phase_mode ${PHASE}" >> "$GITHUB_OUTPUT"
              ;;
          esac

      - name: Fail closed on unsupported lane
        if: ${{ steps.lane.outputs.lane_supported != 'true' }}
        shell: bash
        run: |
          set -euo pipefail
          echo "Runtime cert fail-closed: ${{ steps.lane.outputs.unsupported_reason }}"
          exit 1

      - name: Validate lane handler path
        if: ${{ steps.lane.outputs.lane_supported == 'true' && steps.lane.outputs.handler_path != '' }}
        shell: bash
        run: |
          set -euo pipefail
          HANDLER="${{ steps.lane.outputs.handler_path }}"
          if [[ ! -f "${HANDLER}" ]]; then
            echo "Runtime cert fail-closed: lane handler missing at ${HANDLER}"
            exit 1
          fi

      - name: Execute RC0 lane handler
        if: ${{ inputs.phase_mode == 'rc0' && steps.lane.outputs.lane_supported == 'true' }}
        shell: bash
        run: |
          set -euo pipefail
          pwsh -NoProfile -ExecutionPolicy Bypass \
            -File "${{ steps.lane.outputs.handler_path }}" \
            -PlatformRunId "${{ inputs.platform_run_id }}" \
            -ScenarioRunId "${{ inputs.scenario_run_id }}" \
            -RuntimeCertExecutionId "${{ steps.run_meta.outputs.runtime_cert_execution_id }}" \
            -EvidenceBucket "${{ inputs.evidence_bucket }}"

      - name: Execute RC1 lane handler (managed inline)
        if: ${{ inputs.phase_mode == 'rc1' && steps.lane.outputs.lane_supported == 'true' }}
        shell: bash
        env:
          AWS_REGION: ${{ inputs.aws_region }}
          EVIDENCE_BUCKET: ${{ inputs.evidence_bucket }}
          PLATFORM_RUN_ID: ${{ inputs.platform_run_id }}
          SCENARIO_RUN_ID: ${{ inputs.scenario_run_id }}
          RUNTIME_CERT_EXECUTION_ID: ${{ steps.run_meta.outputs.runtime_cert_execution_id }}
          RUN_DIR: ${{ steps.run_meta.outputs.run_dir }}
          UPSTREAM_RC0_EXECUTION: ${{ inputs.upstream_rc0_execution }}
          RC1_CERT_WINDOW_START_UTC: ${{ inputs.rc1_cert_window_start_utc }}
          RC1_NON_CLAIMABLE_EXECUTION_IDS: ${{ inputs.rc1_non_claimable_execution_ids }}
        run: |
          set -euo pipefail
          python - <<'PY'
          import hashlib
          import json
          import os
          import sys
          from datetime import datetime, timedelta, timezone
          from pathlib import Path
          from typing import Dict, List, Optional

          import boto3
          from botocore.exceptions import ClientError

          def utc_now() -> str:
              return datetime.now(timezone.utc).strftime("%Y-%m-%dT%H:%M:%SZ")

          def parse_utc(value: str) -> datetime:
              return datetime.fromisoformat(value.replace("Z", "+00:00")).astimezone(timezone.utc)

          def dump_json(path: Path, payload: dict) -> bytes:
              text = json.dumps(payload, indent=2, sort_keys=True, ensure_ascii=True) + "\n"
              data = text.encode("utf-8")
              path.write_bytes(data)
              return data

          def sha256_bytes(data: bytes) -> str:
              return hashlib.sha256(data).hexdigest()

          def list_objects(s3, bucket: str, prefix: str) -> Optional[List[dict]]:
              out: List[dict] = []
              paginator = s3.get_paginator("list_objects_v2")
              try:
                  for page in paginator.paginate(Bucket=bucket, Prefix=prefix):
                      for obj in page.get("Contents", []):
                          out.append(obj)
              except ClientError as exc:
                  code = str(exc.response.get("Error", {}).get("Code", ""))
                  if code in {"AccessDenied", "UnauthorizedOperation"}:
                      return None
                  raise
              return out

          def s3_get_json(s3, bucket: str, key: str) -> dict:
              body = s3.get_object(Bucket=bucket, Key=key)["Body"].read()
              return json.loads(body.decode("utf-8"))

          def s3_get_bytes(s3, bucket: str, key: str) -> bytes:
              return s3.get_object(Bucket=bucket, Key=key)["Body"].read()

          def s3_put_bytes(s3, bucket: str, key: str, payload: bytes) -> None:
              s3.put_object(Bucket=bucket, Key=key, Body=payload, ContentType="application/json")

          def execution_from_key(runtime_root_prefix: str, key: str) -> str:
              rel = key[len(runtime_root_prefix):]
              return rel.split("/", 1)[0] if "/" in rel else rel

          phase_mode = "rc1"
          bucket = os.environ["EVIDENCE_BUCKET"]
          platform_run_id = os.environ["PLATFORM_RUN_ID"]
          scenario_run_id = os.environ["SCENARIO_RUN_ID"]
          runtime_cert_execution_id = os.environ["RUNTIME_CERT_EXECUTION_ID"]
          run_dir = Path(os.environ["RUN_DIR"])
          upstream_rc0_execution = os.environ["UPSTREAM_RC0_EXECUTION"].strip()
          cert_window_override = os.environ.get("RC1_CERT_WINDOW_START_UTC", "").strip()
          non_claimable_ids = sorted({
              part.strip() for part in os.environ.get("RC1_NON_CLAIMABLE_EXECUTION_IDS", "").split(",") if part.strip()
          })

          if not runtime_cert_execution_id.startswith("rc1_"):
              print("RC1 fail-closed: runtime_cert_execution_id must start with 'rc1_'.")
              sys.exit(1)
          if not upstream_rc0_execution:
              print("RC1 fail-closed: upstream_rc0_execution is required.")
              sys.exit(1)

          run_dir.mkdir(parents=True, exist_ok=True)
          runtime_root_prefix = "evidence/dev_full/cert/runtime/"
          scrapped_root_prefix = "evidence/dev_full/cert/_scrapped/"
          rc1_prefix = f"{runtime_root_prefix}{runtime_cert_execution_id}/"

          s3 = boto3.client("s3", region_name=os.environ["AWS_REGION"])

          blockers: List[dict] = []
          blocker_ids_added = set()

          def add_blocker(blocker_id: str, severity: str, detail: str) -> None:
              if blocker_id in blocker_ids_added:
                  return
              blocker_ids_added.add(blocker_id)
              blockers.append({"blocker_id": blocker_id, "severity": severity, "detail": detail})

          rc0_snapshot_key = f"{runtime_root_prefix}{upstream_rc0_execution}/rc0_execution_snapshot.json"
          rc0_claim_key = f"{runtime_root_prefix}{upstream_rc0_execution}/runtime_claim_matrix.json"
          rc0_metric_key = f"{runtime_root_prefix}{upstream_rc0_execution}/runtime_metric_dictionary.json"

          rc0_snapshot = None
          rc0_claim = None
          rc0_metric = None

          try:
              rc0_snapshot = s3_get_json(s3, bucket, rc0_snapshot_key)
          except ClientError:
              add_blocker("RC-B3", "high", f"Missing/unreadable upstream RC0 snapshot: {rc0_snapshot_key}")
          try:
              rc0_claim = s3_get_json(s3, bucket, rc0_claim_key)
          except ClientError:
              add_blocker("RC-B3", "high", f"Missing/unreadable upstream RC0 claim matrix: {rc0_claim_key}")
          try:
              rc0_metric = s3_get_json(s3, bucket, rc0_metric_key)
          except ClientError:
              add_blocker("RC-B3", "high", f"Missing/unreadable upstream RC0 metric dictionary: {rc0_metric_key}")

          cert_window_start_utc: Optional[str] = None
          cert_window_start_dt: Optional[datetime] = None

          if rc0_snapshot is not None:
              if not bool(rc0_snapshot.get("overall_pass")):
                  add_blocker("RC-B3", "high", "Upstream RC0 snapshot is not PASS.")
              if str(rc0_snapshot.get("next_gate", "")).strip() != "RC1_READY":
                  add_blocker("RC-B3", "high", "Upstream RC0 next_gate is not RC1_READY.")
              if str(rc0_snapshot.get("platform_run_id", "")).strip() != platform_run_id:
                  add_blocker("RC-B9", "critical", "RC0 platform_run_id does not match RC1 identity.")
              if str(rc0_snapshot.get("scenario_run_id", "")).strip() != scenario_run_id:
                  add_blocker("RC-B9", "critical", "RC0 scenario_run_id does not match RC1 identity.")

          if cert_window_override:
              cert_window_start_utc = cert_window_override
          elif rc0_snapshot is not None:
              cert_window_start_utc = str(rc0_snapshot.get("cert_window_start_utc", "")).strip()

          if not cert_window_start_utc:
              add_blocker("RC-B2", "high", "Missing cert_window_start_utc for RC1 fresh lineage classification.")
              cert_window_start_utc = utc_now()

          try:
              cert_window_start_dt = parse_utc(cert_window_start_utc)
          except Exception:
              add_blocker("RC-B2", "high", f"Invalid cert_window_start_utc format: {cert_window_start_utc}")
              cert_window_start_dt = datetime.now(timezone.utc)

          claim_rows = []
          metric_rows = []
          if rc0_claim is not None:
              claim_rows = rc0_claim.get("claim_rows", [])
          if rc0_metric is not None:
              metric_rows = rc0_metric.get("metric_rows", [])

          if not claim_rows or not isinstance(claim_rows, list):
              add_blocker("RC-B1", "high", "RC0 claim_rows missing or empty.")
          if not metric_rows or not isinstance(metric_rows, list):
              add_blocker("RC-B1", "high", "RC0 metric_rows missing or empty.")

          metric_to_claim: Dict[str, dict] = {}
          claim_mapping_incomplete = False
          for claim in sorted(claim_rows, key=lambda c: str(c.get("claim_id", ""))):
              claim_id = str(claim.get("claim_id", "")).strip()
              tier = str(claim.get("tier", "")).strip()
              metric_ids = claim.get("metric_ids", [])
              required_artifacts = claim.get("required_artifacts", [])
              if not claim_id or not tier or not isinstance(metric_ids, list) or not metric_ids:
                  claim_mapping_incomplete = True
                  continue
              if not isinstance(required_artifacts, list) or not required_artifacts:
                  claim_mapping_incomplete = True
              default_artifact = str(required_artifacts[0]).strip() if required_artifacts else ""
              for metric_id in metric_ids:
                  m = str(metric_id).strip()
                  if not m:
                      claim_mapping_incomplete = True
                      continue
                  metric_to_claim[m] = {
                      "claim_id": claim_id,
                      "tier": tier,
                      "default_required_artifact": default_artifact,
                  }
          if claim_mapping_incomplete:
              add_blocker("RC-B1", "high", "Claim mapping incompleteness detected in RC1 upstream mapping.")

          active_objects_opt = list_objects(s3, bucket, runtime_root_prefix)
          runtime_root_list_allowed = active_objects_opt is not None
          active_objects = active_objects_opt if active_objects_opt is not None else []
          active_index: Dict[str, List[dict]] = {}
          deny_in_active = []
          for obj in active_objects:
              key = obj["Key"]
              if key.endswith("/"):
                  continue
              filename = key.rsplit("/", 1)[-1]
              execution_id = execution_from_key(runtime_root_prefix, key)
              rec = {
                  "key": key,
                  "execution_id": execution_id,
                  "last_modified": obj["LastModified"].astimezone(timezone.utc),
              }
              active_index.setdefault(filename, []).append(rec)
              if execution_id in non_claimable_ids:
                  deny_in_active.append(key)

          if deny_in_active:
              add_blocker("RC-B9", "critical", "Non-claimable execution ids still appear in active runtime root.")

          scrapped_objects_opt = list_objects(s3, bucket, scrapped_root_prefix)
          scrapped_root_list_allowed = scrapped_objects_opt is not None
          scrapped_objects = scrapped_objects_opt if scrapped_objects_opt is not None else []
          scrapped_filenames = {obj["Key"].rsplit("/", 1)[-1] for obj in scrapped_objects if not obj["Key"].endswith("/")}

          metric_ambiguity = False
          inventory_rows = []
          tier0_gap_rows = []
          seen_metric_ids = set()

          required_metric_fields = ("metric_id", "unit", "statistic", "window", "threshold", "source")
          for metric in sorted(metric_rows, key=lambda m: str(m.get("metric_id", ""))):
              missing_field = any(not str(metric.get(field, "")).strip() for field in required_metric_fields)
              metric_id = str(metric.get("metric_id", "")).strip()
              if missing_field or not metric_id:
                  metric_ambiguity = True
                  continue
              if metric_id in seen_metric_ids:
                  metric_ambiguity = True
                  continue
              seen_metric_ids.add(metric_id)

              mapping = metric_to_claim.get(metric_id)
              if mapping is None:
                  add_blocker("RC-B1", "high", f"Metric {metric_id} has no claim mapping in RC1.")
                  claim_id = "UNMAPPED"
                  tier = "UNKNOWN"
              else:
                  claim_id = mapping["claim_id"]
                  tier = mapping["tier"]

              required_artifact = str(metric.get("source", "")).strip()
              candidates = sorted(
                  active_index.get(required_artifact, []),
                  key=lambda r: (r["last_modified"], r["key"]),
                  reverse=True,
              )
              candidates_non_claimable = [c for c in candidates if c["execution_id"] in non_claimable_ids]
              candidates_claimable = [c for c in candidates if c["execution_id"] not in non_claimable_ids]
              fresh_candidates = [c for c in candidates_claimable if c["last_modified"] >= cert_window_start_dt]

              lineage_class = "MISSING"
              evidence_ref = ""
              evidence_execution_id = ""
              evidence_captured_at_utc = ""
              readability_status = "NOT_FOUND"

              if fresh_candidates:
                  winner = fresh_candidates[0]
                  lineage_class = "EVIDENCED_FRESH"
                  evidence_ref = f"s3://{bucket}/{winner['key']}"
                  evidence_execution_id = winner["execution_id"]
                  evidence_captured_at_utc = winner["last_modified"].strftime("%Y-%m-%dT%H:%M:%SZ")
                  readability_status = "READABLE"
                  if winner["execution_id"] in non_claimable_ids:
                      add_blocker("RC-B9", "critical", f"Fresh evidence selected from non-claimable execution id: {winner['execution_id']}")
              elif candidates_claimable:
                  winner = candidates_claimable[0]
                  lineage_class = "HISTORICAL_CONTEXT_ONLY"
                  evidence_ref = f"s3://{bucket}/{winner['key']}"
                  evidence_execution_id = winner["execution_id"]
                  evidence_captured_at_utc = winner["last_modified"].strftime("%Y-%m-%dT%H:%M:%SZ")
                  readability_status = "READABLE"
              elif candidates_non_claimable or required_artifact in scrapped_filenames:
                  winner = candidates_non_claimable[0] if candidates_non_claimable else None
                  lineage_class = "SCRAPPED_NON_CLAIMABLE"
                  if winner is not None:
                      evidence_ref = f"s3://{bucket}/{winner['key']}"
                      evidence_execution_id = winner["execution_id"]
                      evidence_captured_at_utc = winner["last_modified"].strftime("%Y-%m-%dT%H:%M:%SZ")
                      readability_status = "READABLE_NON_CLAIMABLE"
                  else:
                      readability_status = "SCRAPPED_ONLY_REFERENCE"

              row = {
                  "metric_id": metric_id,
                  "claim_id": claim_id,
                  "tier": tier,
                  "required_artifact": required_artifact,
                  "evidence_ref": evidence_ref,
                  "evidence_execution_id": evidence_execution_id,
                  "evidence_captured_at_utc": evidence_captured_at_utc,
                  "lineage_class": lineage_class,
                  "execution_posture": "MANAGED_CONTROL_PLANE_ORCHESTRATION",
                  "readability_status": readability_status,
                  "claim_status": "NOT_EVALUATED_IN_RC1",
              }
              inventory_rows.append(row)

              if tier == "T0" and lineage_class != "EVIDENCED_FRESH":
                  if lineage_class == "MISSING":
                      gap_reason = "MISSING"
                  elif lineage_class == "SCRAPPED_NON_CLAIMABLE":
                      gap_reason = "SCRAPPED_ONLY"
                  else:
                      gap_reason = "HISTORICAL_ONLY"
                  remediation_lane = "RC3" if "drill" in required_artifact.lower() else "RC2"
                  tier0_gap_rows.append({
                      "metric_id": metric_id,
                      "claim_id": claim_id,
                      "tier": tier,
                      "required_artifact": required_artifact,
                      "lineage_class": lineage_class,
                      "gap_reason": gap_reason,
                      "remediation_lane": remediation_lane,
                      "evidence_ref": evidence_ref,
                  })

          if metric_ambiguity:
              add_blocker("RC-B2", "high", "Metric definition ambiguity detected in RC1 inventory inputs.")

          if os.environ.get("GITHUB_ACTIONS", "").lower() != "true":
              add_blocker("RC-B8", "critical", "RC1 execution posture is not managed GitHub workflow.")

          cert_window_end_utc = utc_now()
          inventory_rows = sorted(inventory_rows, key=lambda r: (r["claim_id"], r["metric_id"]))
          tier0_gap_rows = sorted(tier0_gap_rows, key=lambda r: (r["claim_id"], r["metric_id"]))

          inventory_payload = {
              "schema_version": "1.0",
              "lane": phase_mode.upper(),
              "platform_run_id": platform_run_id,
              "scenario_run_id": scenario_run_id,
              "runtime_cert_execution_id": runtime_cert_execution_id,
              "captured_at_utc": utc_now(),
              "cert_window_start_utc": cert_window_start_utc,
              "cert_window_end_utc": cert_window_end_utc,
              "upstream_rc0_execution_id": upstream_rc0_execution,
              "inventory_row_count": len(inventory_rows),
              "inventory_rows": inventory_rows,
          }

          gap_payload = {
              "schema_version": "1.0",
              "lane": phase_mode.upper(),
              "platform_run_id": platform_run_id,
              "scenario_run_id": scenario_run_id,
              "runtime_cert_execution_id": runtime_cert_execution_id,
              "captured_at_utc": utc_now(),
              "cert_window_start_utc": cert_window_start_utc,
              "cert_window_end_utc": cert_window_end_utc,
              "tier0_gap_count": len(tier0_gap_rows),
              "tier0_gap_rows": tier0_gap_rows,
          }

          inventory_path = run_dir / "runtime_evidence_inventory.json"
          gap_path = run_dir / "runtime_fresh_gap_register.json"
          snapshot_path = run_dir / "rc1_execution_snapshot.json"

          inventory_bytes = dump_json(inventory_path, inventory_payload)
          gap_bytes = dump_json(gap_path, gap_payload)

          readback_checks = []
          for name, payload in (
              ("runtime_evidence_inventory.json", inventory_bytes),
              ("runtime_fresh_gap_register.json", gap_bytes),
          ):
              key = f"{rc1_prefix}{name}"
              s3_put_bytes(s3, bucket, key, payload)
              rb = s3_get_bytes(s3, bucket, key)
              local_hash = sha256_bytes(payload)
              s3_hash = sha256_bytes(rb)
              matched = local_hash == s3_hash
              if not matched:
                  add_blocker("RC-B3", "high", f"Durable readback hash mismatch for {name}.")
              readback_checks.append({
                  "artifact_name": name,
                  "local_sha256": local_hash,
                  "s3_sha256": s3_hash,
                  "hash_match": matched,
                  "s3_key": key,
              })

          blocker_count = len(blockers)
          overall_pass = blocker_count == 0
          verdict = "PASS" if overall_pass else "HOLD"
          next_gate = "RC2_READY_WITH_GAP_REGISTER" if overall_pass else "RC1_REMEDIATION_REQUIRED"

          snapshot_payload = {
              "schema_version": "1.0",
              "lane": phase_mode.upper(),
              "platform_run_id": platform_run_id,
              "scenario_run_id": scenario_run_id,
              "runtime_cert_execution_id": runtime_cert_execution_id,
              "captured_at_utc": utc_now(),
              "cert_window_start_utc": cert_window_start_utc,
              "cert_window_end_utc": cert_window_end_utc,
              "execution_posture": {
                  "mode": "MANAGED_WORKFLOW_ORCHESTRATION_ONLY",
                  "managed_runtime_compute": "NOT_EXECUTED_IN_RC1",
                  "policy": "RC1_INVENTORY_AND_GAP_CLASSIFICATION_ONLY",
              },
              "precheck": {
                  "upstream_rc0_execution_id": upstream_rc0_execution,
                  "upstream_rc0_pass_verified": rc0_snapshot is not None and bool(rc0_snapshot.get("overall_pass")),
                  "identity_match_with_rc0": rc0_snapshot is not None
                  and str(rc0_snapshot.get("platform_run_id", "")).strip() == platform_run_id
                  and str(rc0_snapshot.get("scenario_run_id", "")).strip() == scenario_run_id,
                  "non_claimable_active_root_exclusions_verified": (
                      len(deny_in_active) == 0 if runtime_root_list_allowed else "UNVERIFIED_NO_LIST_BUCKET_PERMISSION"
                  ),
                  "runtime_root_list_visibility": "LIST_ALLOWED" if runtime_root_list_allowed else "LIST_DENIED_FALLBACK_EMPTY",
                  "scrapped_root_list_visibility": "LIST_ALLOWED" if scrapped_root_list_allowed else "LIST_DENIED_FALLBACK_EMPTY",
              },
              "blocker_ids_checked": ["RC-B1", "RC-B2", "RC-B3", "RC-B8", "RC-B9"],
              "blocker_count": blocker_count,
              "blockers": blockers,
              "artifact_readback_checks": readback_checks,
              "overall_pass": overall_pass,
              "verdict": verdict,
              "next_gate": next_gate,
              "durable_root": f"s3://{bucket}/{rc1_prefix}",
              "local_root": str(run_dir.resolve()),
              "tier0_gap_count": len(tier0_gap_rows),
          }

          snapshot_bytes = dump_json(snapshot_path, snapshot_payload)
          snapshot_key = f"{rc1_prefix}rc1_execution_snapshot.json"
          s3_put_bytes(s3, bucket, snapshot_key, snapshot_bytes)
          snapshot_rb = s3_get_bytes(s3, bucket, snapshot_key)
          if sha256_bytes(snapshot_bytes) != sha256_bytes(snapshot_rb):
              print("RC1 fail-closed: snapshot readback hash mismatch.")
              sys.exit(1)

          print(json.dumps({
              "runtime_cert_execution_id": runtime_cert_execution_id,
              "upstream_rc0_execution_id": upstream_rc0_execution,
              "verdict": verdict,
              "next_gate": next_gate,
              "blocker_count": blocker_count,
              "tier0_gap_count": len(tier0_gap_rows),
              "durable_root": f"s3://{bucket}/{rc1_prefix}",
              "local_root": str(run_dir.resolve()),
          }, ensure_ascii=True))

          if not overall_pass:
              sys.exit(1)
          PY

      - name: Execute RC2 lane handler (managed inline)
        if: ${{ inputs.phase_mode == 'rc2' && steps.lane.outputs.lane_supported == 'true' }}
        shell: bash
        env:
          AWS_REGION: ${{ inputs.aws_region }}
          EVIDENCE_BUCKET: ${{ inputs.evidence_bucket }}
          PLATFORM_RUN_ID: ${{ inputs.platform_run_id }}
          SCENARIO_RUN_ID: ${{ inputs.scenario_run_id }}
          RUNTIME_CERT_EXECUTION_ID: ${{ steps.run_meta.outputs.runtime_cert_execution_id }}
          RUN_DIR: ${{ steps.run_meta.outputs.run_dir }}
          UPSTREAM_RC0_EXECUTION: ${{ inputs.upstream_rc0_execution }}
          UPSTREAM_RC1_EXECUTION: ${{ inputs.upstream_rc1_execution }}
          RC2_NON_CLAIMABLE_EXECUTION_IDS: ${{ inputs.rc2_non_claimable_execution_ids }}
          RC2_REMEDIATION_MODE: ${{ inputs.rc2_remediation_mode }}
          RC2_PROFILE_PROBE_TABLE: ${{ inputs.rc2_profile_probe_table }}
        run: |
          set -euo pipefail
          python - <<'PY'
          import hashlib
          import json
          import os
          import sys
          from datetime import datetime, timedelta, timezone
          from pathlib import Path

          import boto3
          from botocore.exceptions import ClientError

          PROFILES = {
              "steady": {"target_eps": 500.0, "min_sample_events": 900000, "duration_minutes": 30.0},
              "burst": {"target_eps": 1500.0, "min_sample_events": 900000, "duration_minutes": 10.0},
              "soak": {"target_eps": 300.0, "min_sample_events": 6480000, "duration_minutes": 360.0},
              "replay_window": {"target_eps": None, "min_sample_events": 10000000, "duration_minutes": None},
          }
          CLAIM_PROFILE_REQUIREMENTS = {
              "T0.2": ["steady", "burst", "soak"],
              "T0.3": ["steady", "replay_window"],
              "T0.4": ["steady"],
              "T0.6": ["steady", "replay_window"],
          }

          def utc_now():
              return datetime.now(timezone.utc).strftime("%Y-%m-%dT%H:%M:%SZ")

          def parse_utc(value):
              text = str(value or "").strip()
              if not text:
                  return None
              try:
                  return datetime.fromisoformat(text.replace("Z", "+00:00")).astimezone(timezone.utc)
              except Exception:
                  return None

          def dump_json(path, payload):
              data = (json.dumps(payload, indent=2, sort_keys=True, ensure_ascii=True) + "\n").encode("utf-8")
              path.write_bytes(data)
              return data

          def sha256_bytes(data):
              return hashlib.sha256(data).hexdigest()

          def s3_get_json(s3, bucket, key):
              return json.loads(s3.get_object(Bucket=bucket, Key=key)["Body"].read().decode("utf-8"))

          def s3_get_bytes(s3, bucket, key):
              return s3.get_object(Bucket=bucket, Key=key)["Body"].read()

          def s3_put_bytes(s3, bucket, key, payload):
              s3.put_object(Bucket=bucket, Key=key, Body=payload, ContentType="application/json")

          def list_objects(s3, bucket, prefix):
              out = []
              paginator = s3.get_paginator("list_objects_v2")
              try:
                  for page in paginator.paginate(Bucket=bucket, Prefix=prefix):
                      out.extend(page.get("Contents", []))
              except ClientError as exc:
                  code = str(exc.response.get("Error", {}).get("Code", ""))
                  if code in {"AccessDenied", "UnauthorizedOperation"}:
                      return None
                  raise
              return out

          def execution_from_key(prefix, key):
              rel = key[len(prefix):]
              return rel.split("/", 1)[0] if "/" in rel else rel

          def scan_count(ddb, table_name, run_id, start_epoch, end_epoch):
              params = {
                  "TableName": table_name,
                  "Select": "COUNT",
                  "FilterExpression": "#pr = :rid AND attribute_exists(#ae) AND #ae >= :start AND #ae <= :end",
                  "ExpressionAttributeNames": {"#pr": "platform_run_id", "#ae": "admitted_at_epoch"},
                  "ExpressionAttributeValues": {
                      ":rid": {"S": run_id},
                      ":start": {"N": str(start_epoch)},
                      ":end": {"N": str(end_epoch)},
                  },
              }
              total = 0
              page_count = 0
              while True:
                  page = ddb.scan(**params)
                  page_count += 1
                  total += int(page.get("Count", 0))
                  lek = page.get("LastEvaluatedKey")
                  if not lek:
                      break
                  params["ExclusiveStartKey"] = lek
              return {"count": total, "page_count": page_count, "truncated": False}

          phase_mode = "rc2"
          bucket = os.environ["EVIDENCE_BUCKET"]
          platform_run_id = os.environ["PLATFORM_RUN_ID"]
          scenario_run_id = os.environ["SCENARIO_RUN_ID"]
          runtime_cert_execution_id = os.environ["RUNTIME_CERT_EXECUTION_ID"]
          run_dir = Path(os.environ["RUN_DIR"])
          upstream_rc0_execution = os.environ["UPSTREAM_RC0_EXECUTION"].strip()
          upstream_rc1_execution = os.environ["UPSTREAM_RC1_EXECUTION"].strip()
          non_claimable = {x.strip() for x in os.environ.get("RC2_NON_CLAIMABLE_EXECUTION_IDS", "").split(",") if x.strip()}
          remediation_mode = str(os.environ.get("RC2_REMEDIATION_MODE", "adjudicate_only")).strip()
          profile_probe_table = str(os.environ.get("RC2_PROFILE_PROBE_TABLE", "")).strip()
          runtime_root = "evidence/dev_full/cert/runtime/"
          rc2_prefix = f"{runtime_root}{runtime_cert_execution_id}/"

          if not runtime_cert_execution_id.startswith("rc2_"):
              print("RC2 fail-closed: runtime_cert_execution_id must start with 'rc2_'.")
              sys.exit(1)
          if not upstream_rc0_execution or not upstream_rc1_execution:
              print("RC2 fail-closed: upstream execution ids are required.")
              sys.exit(1)

          run_dir.mkdir(parents=True, exist_ok=True)
          s3 = boto3.client("s3", region_name=os.environ["AWS_REGION"])
          blockers = []
          def add_blocker(code, detail, severity="high", scope="lane"):
              blockers.append({"blocker_id": code, "severity": severity, "scope": scope, "detail": detail})

          try:
              rc0_snapshot = s3_get_json(s3, bucket, f"{runtime_root}{upstream_rc0_execution}/rc0_execution_snapshot.json")
              rc0_claim = s3_get_json(s3, bucket, f"{runtime_root}{upstream_rc0_execution}/runtime_claim_matrix.json")
              rc0_metric = s3_get_json(s3, bucket, f"{runtime_root}{upstream_rc0_execution}/runtime_metric_dictionary.json")
              rc1_snapshot = s3_get_json(s3, bucket, f"{runtime_root}{upstream_rc1_execution}/rc1_execution_snapshot.json")
              rc1_gap = s3_get_json(s3, bucket, f"{runtime_root}{upstream_rc1_execution}/runtime_fresh_gap_register.json")
          except ClientError as exc:
              add_blocker("RC-B3", f"Missing/unreadable upstream artifacts: {exc}", severity="critical", scope="upstream")
              rc0_snapshot, rc0_claim, rc0_metric, rc1_snapshot, rc1_gap = {}, {}, {}, {}, {}

          if str(rc0_snapshot.get("platform_run_id", "")).strip() not in {"", platform_run_id}:
              add_blocker("RC-B9", "RC0 platform_run_id does not match RC2 identity.", severity="critical", scope="identity")
          if str(rc0_snapshot.get("scenario_run_id", "")).strip() not in {"", scenario_run_id}:
              add_blocker("RC-B9", "RC0 scenario_run_id does not match RC2 identity.", severity="critical", scope="identity")
          if str(rc1_snapshot.get("platform_run_id", "")).strip() not in {"", platform_run_id}:
              add_blocker("RC-B9", "RC1 platform_run_id does not match RC2 identity.", severity="critical", scope="identity")
          if str(rc1_snapshot.get("scenario_run_id", "")).strip() not in {"", scenario_run_id}:
              add_blocker("RC-B9", "RC1 scenario_run_id does not match RC2 identity.", severity="critical", scope="identity")
          if os.environ.get("GITHUB_ACTIONS", "").lower() != "true":
              add_blocker("RC-B8", "RC2 execution posture is not managed GitHub workflow.", severity="critical", scope="posture")

          cert_window_start_utc = str(rc1_snapshot.get("cert_window_start_utc", "") or rc0_snapshot.get("cert_window_start_utc", "")).strip() or utc_now()
          cert_window_start_dt = parse_utc(cert_window_start_utc) or datetime.now(timezone.utc)
          cert_window_end_utc = utc_now()
          cert_window_end_dt = parse_utc(cert_window_end_utc) or datetime.now(timezone.utc)
          cert_window_seconds = max(1.0, (cert_window_end_dt - cert_window_start_dt).total_seconds())

          metric_window = {str(r.get("metric_id", "")).strip(): str(r.get("window", "")).strip() for r in rc0_metric.get("metric_rows", []) if str(r.get("metric_id", "")).strip()}
          def metric_profiles(metric_id):
              window = metric_window.get(metric_id, "steady")
              if "|" in window:
                  out = [p.strip() for p in window.split("|") if p.strip() in PROFILES]
                  return out or ["steady"]
              if window in PROFILES:
                  return [window]
              if window == "cert_window":
                  return ["steady", "replay_window"]
              return ["steady"]

          manifest_rows = []
          manifest_complete = False
          manifest_generated = False
          r1_gate = {
              "required": True,
              "passed": False,
              "checks": {},
              "failures": [],
          }
          if remediation_mode == "full_remediation":
              if not profile_probe_table:
                  add_blocker("RC-B2", "RC2 remediation mode requires rc2_profile_probe_table.", scope="preflight")
              else:
                  ddb = boto3.client("dynamodb", region_name=os.environ["AWS_REGION"])
                  ts_suffix = datetime.now(timezone.utc).strftime("%Y%m%dT%H%M%SZ")
                  for profile_id, req in sorted(PROFILES.items()):
                      target_eps = req["target_eps"]
                      if req["duration_minutes"] is None:
                          profile_start_dt = cert_window_start_dt
                      else:
                          profile_start_dt = cert_window_end_dt - timedelta(minutes=float(req["duration_minutes"]))
                      profile_end_dt = cert_window_end_dt
                      profile_start_epoch = int(profile_start_dt.timestamp())
                      profile_end_epoch = int(profile_end_dt.timestamp())
                      profile_window_seconds = max(1.0, float(profile_end_epoch - profile_start_epoch))
                      profile_window_minutes = profile_window_seconds / 60.0
                      try:
                          probe_count = scan_count(
                              ddb=ddb,
                              table_name=profile_probe_table,
                              run_id=platform_run_id,
                              start_epoch=profile_start_epoch,
                              end_epoch=profile_end_epoch,
                          )
                      except ClientError as exc:
                          add_blocker("RC-B3", f"Unable to probe profile window for {profile_id}: {exc}", severity="critical", scope="profile_generation")
                          probe_count = {"count": 0, "page_count": 0, "truncated": True}
                      profile_sample_count = int(probe_count.get("count", 0) or 0)
                      duration_observed_minutes = profile_window_minutes
                      observed_eps = float(profile_sample_count) / profile_window_seconds

                      sample_pass = profile_sample_count >= int(req["min_sample_events"])
                      eps_pass = True if target_eps is None else (observed_eps >= float(target_eps))
                      duration_pass = True if req["duration_minutes"] is None else (duration_observed_minutes >= float(req["duration_minutes"]))
                      profile_pass = bool(sample_pass and eps_pass and duration_pass)

                      profile_exec_id = f"rc2_profile_{profile_id}_{ts_suffix}"
                      profile_key = f"{runtime_root}{profile_exec_id}/rc2_profile_snapshot.json"
                      profile_payload = {
                          "schema_version": "1.0",
                          "phase": "RC2_PROFILE",
                          "profile_id": profile_id,
                          "execution_id": profile_exec_id,
                          "platform_run_id": platform_run_id,
                          "scenario_run_id": scenario_run_id,
                          "captured_at_utc": utc_now(),
                          "cert_window_start_utc": cert_window_start_utc,
                          "cert_window_end_utc": cert_window_end_utc,
                          "source_probe": {
                              "table_name": profile_probe_table,
                              "mode": "managed_probe_count_window_bounded",
                              "start_epoch": profile_start_epoch,
                              "end_epoch": profile_end_epoch,
                              "scan_page_count": int(probe_count.get("page_count", 0) or 0),
                              "count_complete": bool(not probe_count.get("truncated", False)),
                          },
                          "requirements": req,
                          "admission_window": {
                              "window_start_utc": profile_start_dt.strftime("%Y-%m-%dT%H:%M:%SZ"),
                              "window_end_utc": profile_end_dt.strftime("%Y-%m-%dT%H:%M:%SZ"),
                              "sample_size_events": profile_sample_count,
                              "observed_window_seconds": profile_window_seconds,
                          },
                          "metrics": {
                              "observed_events_per_second": observed_eps,
                              "duration_observed_minutes": duration_observed_minutes,
                          },
                          "gates": {
                              "sample_pass": sample_pass,
                              "eps_pass": eps_pass,
                              "duration_pass": duration_pass,
                              "profile_pass": profile_pass,
                          },
                          "execution_posture": "MANAGED_WORKFLOW_ORCHESTRATION_ONLY",
                      }

                      local_profile_path = run_dir / f"{profile_exec_id}.rc2_profile_snapshot.json"
                      profile_bytes = dump_json(local_profile_path, profile_payload)
                      s3_put_bytes(s3, bucket, profile_key, profile_bytes)
                      profile_rb = s3_get_bytes(s3, bucket, profile_key)
                      if sha256_bytes(profile_bytes) != sha256_bytes(profile_rb):
                          add_blocker("RC-B3", f"Profile snapshot readback mismatch for {profile_id}.", scope="profile_generation")

                      manifest_rows.append({
                          "profile_id": profile_id,
                          "execution_id": profile_exec_id,
                          "captured_at_utc": profile_payload["captured_at_utc"],
                          "platform_run_id": platform_run_id,
                          "scenario_run_id": scenario_run_id,
                          "sample_size_events": profile_sample_count,
                          "meets_thresholds": profile_pass,
                          "claimable": True,
                          "campaign_window_start_utc": profile_payload["admission_window"]["window_start_utc"],
                          "campaign_window_end_utc": profile_payload["admission_window"]["window_end_utc"],
                          "probe_count_complete": profile_payload["source_probe"]["count_complete"],
                          "evidence_ref": f"s3://{bucket}/{profile_key}",
                      })

                  required_profiles = set(PROFILES.keys())
                  observed_profiles = {str(r.get("profile_id", "")).strip() for r in manifest_rows if str(r.get("profile_id", "")).strip()}
                  unique_execution_ids = len({str(r.get("execution_id", "")).strip() for r in manifest_rows}) == len(manifest_rows) and len(manifest_rows) == len(required_profiles)
                  unique_windows = len({
                      (
                          str(r.get("campaign_window_start_utc", "")).strip(),
                          str(r.get("campaign_window_end_utc", "")).strip(),
                      )
                      for r in manifest_rows
                  }) == len(manifest_rows) and len(manifest_rows) == len(required_profiles)
                  bounded_windows = all(
                      bool(str(r.get("campaign_window_start_utc", "")).strip()) and bool(str(r.get("campaign_window_end_utc", "")).strip())
                      for r in manifest_rows
                  )
                  complete_counts = all(bool(r.get("probe_count_complete")) for r in manifest_rows)
                  profile_coverage = observed_profiles == required_profiles

                  r1_failures = []
                  if not profile_coverage:
                      r1_failures.append("R1_PROFILE_COVERAGE_INCOMPLETE")
                  if not unique_execution_ids:
                      r1_failures.append("R1_EXECUTION_IDS_NOT_UNIQUE")
                  if not unique_windows:
                      r1_failures.append("R1_CAMPAIGN_WINDOWS_NOT_DISTINCT")
                  if not bounded_windows:
                      r1_failures.append("R1_CAMPAIGN_WINDOWS_UNBOUNDED")
                  if not complete_counts:
                      r1_failures.append("R1_COUNT_COMPLETENESS_UNVERIFIED")

                  r1_gate = {
                      "required": True,
                      "passed": len(r1_failures) == 0,
                      "checks": {
                          "profile_coverage_complete": profile_coverage,
                          "execution_ids_unique": unique_execution_ids,
                          "campaign_windows_distinct": unique_windows,
                          "campaign_windows_bounded": bounded_windows,
                          "probe_count_complete": complete_counts,
                      },
                      "failures": r1_failures,
                  }
                  if not r1_gate["passed"]:
                      add_blocker(
                          "RC-B10",
                          f"RC2.R1 evidence-shape gate failed: {', '.join(r1_failures)}",
                          severity="critical",
                          scope="sequence",
                      )
                      for row in manifest_rows:
                          row["claimable"] = False

                  manifest_complete = bool(manifest_rows) and all(bool(r["meets_thresholds"] and r["claimable"]) for r in manifest_rows)
                  manifest_generated = True
                  manifest_payload = {
                      "schema_version": "1.0",
                      "lane": phase_mode.upper(),
                      "platform_run_id": platform_run_id,
                      "scenario_run_id": scenario_run_id,
                      "runtime_cert_execution_id": runtime_cert_execution_id,
                      "captured_at_utc": utc_now(),
                      "remediation_mode": remediation_mode,
                      "r1_evidence_shape_gate": r1_gate,
                      "manifest_complete": manifest_complete,
                      "profile_rows": manifest_rows,
                  }
                  manifest_bytes = dump_json(run_dir / "runtime_profile_evidence_manifest.json", manifest_payload)
                  manifest_key = f"{rc2_prefix}runtime_profile_evidence_manifest.json"
                  s3_put_bytes(s3, bucket, manifest_key, manifest_bytes)
                  manifest_rb = s3_get_bytes(s3, bucket, manifest_key)
                  if sha256_bytes(manifest_bytes) != sha256_bytes(manifest_rb):
                      add_blocker("RC-B3", "Profile manifest readback mismatch.", scope="profile_generation")
          else:
              add_blocker(
                  "RC-B3",
                  "Sequence gate violation: RC2 adjudication dispatched without full_remediation profile generation manifest.",
                  severity="critical",
                  scope="sequence",
              )

          # Re-pin cert window end at adjudication time so same-run remediation
          # profile snapshots are considered in discovery.
          cert_window_end_utc = utc_now()
          cert_window_end_dt = parse_utc(cert_window_end_utc) or datetime.now(timezone.utc)
          cert_window_seconds = max(1.0, (cert_window_end_dt - cert_window_start_dt).total_seconds())

          objs = list_objects(s3, bucket, runtime_root)
          if objs is None:
              add_blocker("RC-B3", "Missing list visibility for runtime root; profile discovery incomplete.", scope="discovery")
              objs = []
          keys = [str(o.get("Key", "")) for o in objs]
          profile_rows = []
          profile_pass = {}
          for profile_id, req in sorted(PROFILES.items()):
              matches = []
              for key in keys:
                  if not key.endswith("/rc2_profile_snapshot.json"):
                      continue
                  exec_id = execution_from_key(runtime_root, key)
                  if exec_id in non_claimable or exec_id == runtime_cert_execution_id:
                      continue
                  if f"rc2_profile_{profile_id}_" not in exec_id:
                      continue
                  try:
                      payload = s3_get_json(s3, bucket, key)
                  except ClientError:
                      continue
                  if str(payload.get("platform_run_id", "")).strip() != platform_run_id:
                      continue
                  if str(payload.get("scenario_run_id", "")).strip() != scenario_run_id:
                      continue
                  captured = parse_utc(payload.get("captured_at_utc", ""))
                  if captured is None or captured < cert_window_start_dt or captured > cert_window_end_dt:
                      continue
                  metrics = payload.get("metrics", {}) if isinstance(payload.get("metrics", {}), dict) else {}
                  matches.append({
                      "execution_id": exec_id,
                      "artifact_key": key,
                      "captured_at_utc": payload.get("captured_at_utc", ""),
                      "sample_size_events": int((payload.get("admission_window", {}) or {}).get("sample_size_events", 0) or 0),
                      "observed_events_per_second": float(metrics.get("observed_events_per_second", 0.0) or 0.0),
                      "duration_observed_minutes": float(metrics.get("duration_observed_minutes", 0.0) or 0.0),
                  })
              if not matches:
                  row = {
                      "profile_id": profile_id,
                      "required": req,
                      "profile_pass": False,
                      "evidence_status": "MISSING_FRESH_EVIDENCE",
                      "sample_size_events": 0,
                      "observed_events_per_second": None,
                      "duration_observed_minutes": None,
                      "sample_pass": False,
                      "eps_pass": req["target_eps"] is None,
                      "duration_pass": req["duration_minutes"] is None,
                      "profile_reason": "No fresh profile evidence in active cert window.",
                      "source_execution_id": None,
                      "source_artifact": None,
                  }
                  add_blocker("RC-B4", f"{profile_id}: missing mandatory fresh profile evidence.", scope="profile")
              else:
                  best = sorted(matches, key=lambda x: (x["sample_size_events"], x["captured_at_utc"], x["execution_id"]), reverse=True)[0]
                  sample_pass = best["sample_size_events"] >= int(req["min_sample_events"])
                  eps_pass = True if req["target_eps"] is None else best["observed_events_per_second"] >= float(req["target_eps"])
                  duration_pass = True if req["duration_minutes"] is None else best["duration_observed_minutes"] >= float(req["duration_minutes"])
                  ppass = bool(sample_pass and eps_pass and duration_pass)
                  row = {
                      "profile_id": profile_id,
                      "required": req,
                      "profile_pass": ppass,
                      "evidence_status": "FRESH_EVIDENCE_FOUND",
                      "sample_size_events": best["sample_size_events"],
                      "observed_events_per_second": best["observed_events_per_second"],
                      "duration_observed_minutes": best["duration_observed_minutes"],
                      "sample_pass": sample_pass,
                      "eps_pass": eps_pass,
                      "duration_pass": duration_pass,
                      "profile_reason": "Threshold checks passed." if ppass else "Threshold checks failed.",
                      "source_execution_id": best["execution_id"],
                      "source_artifact": best["artifact_key"],
                  }
                  if not ppass:
                      add_blocker("RC-B4", f"{profile_id}: profile evidence present but thresholds not met.", scope="profile")
              profile_rows.append(row)
              profile_pass[profile_id] = bool(row["profile_pass"])

          gap_rows = rc1_gap.get("tier0_gap_rows", []) if isinstance(rc1_gap.get("tier0_gap_rows", []), list) else []
          gap_resolution_rows = []
          metric_resolution = {}
          for gap in sorted(gap_rows, key=lambda r: (str(r.get("claim_id", "")), str(r.get("metric_id", "")))):
              metric_id = str(gap.get("metric_id", "")).strip()
              lane = str(gap.get("remediation_lane", "RC2")).strip().upper()
              req_profiles = metric_profiles(metric_id)
              resolved = all(profile_pass.get(p, False) for p in req_profiles)
              if resolved:
                  status = "RESOLVED_BY_RC2_PROFILE_EVIDENCE"
              elif lane == "RC3":
                  status = "DEFER_RC3_DRILL_REQUIRED"
              else:
                  status = "UNRESOLVED_RC2_EVIDENCE_MISSING"
              metric_resolution[metric_id] = status
              gap_resolution_rows.append({
                  "claim_id": str(gap.get("claim_id", "")).strip(),
                  "metric_id": metric_id,
                  "gap_reason": str(gap.get("gap_reason", "")).strip(),
                  "rc1_remediation_lane": lane,
                  "rc2_required_profiles": req_profiles,
                  "resolution_status": status,
              })

          claim_rows = rc0_claim.get("claim_rows", []) if isinstance(rc0_claim.get("claim_rows", []), list) else []
          tier0_claims = [c for c in claim_rows if str(c.get("tier", "")).strip() == "T0"]
          claim_out = []
          tier0_holds = []
          for claim in sorted(tier0_claims, key=lambda c: str(c.get("claim_id", ""))):
              cid = str(claim.get("claim_id", "")).strip()
              mids = [str(m).strip() for m in claim.get("metric_ids", []) if str(m).strip()]
              unresolved = [m for m in mids if metric_resolution.get(m, "UNRESOLVED_RC2_EVIDENCE_MISSING") != "RESOLVED_BY_RC2_PROFILE_EVIDENCE"]
              req_profiles = CLAIM_PROFILE_REQUIREMENTS.get(cid, ["steady"])
              failing_profiles = [p for p in req_profiles if not profile_pass.get(p, False)]
              cpass = len(unresolved) == 0 and len(failing_profiles) == 0
              status = "PASS" if cpass else "HOLD_REMEDIATION_REQUIRED"
              if not cpass:
                  tier0_holds.append(cid)
              claim_out.append({"claim_id": cid, "tier": "T0", "status": status, "required_profiles": req_profiles, "failing_profiles": failing_profiles, "unresolved_metrics": unresolved})

          overall_pass = len(blockers) == 0 and all(c["status"] == "PASS" for c in claim_out)
          verdict = "PASS" if overall_pass else "HOLD"
          next_gate = "RC3_READY_WITH_SCORECARD" if overall_pass else "RC2_REMEDIATION_REQUIRED"

          payloads = {
              "runtime_scorecard_profiles.json": {
                  "schema_version": "1.0", "lane": phase_mode.upper(), "platform_run_id": platform_run_id, "scenario_run_id": scenario_run_id,
                  "runtime_cert_execution_id": runtime_cert_execution_id, "captured_at_utc": utc_now(),
                  "cert_window_start_utc": cert_window_start_utc, "cert_window_end_utc": cert_window_end_utc, "profiles": profile_rows,
              },
              "runtime_scorecard_claim_adjudication.json": {
                  "schema_version": "1.0", "lane": phase_mode.upper(), "platform_run_id": platform_run_id, "scenario_run_id": scenario_run_id,
                  "runtime_cert_execution_id": runtime_cert_execution_id, "captured_at_utc": utc_now(), "claims": claim_out,
              },
              "runtime_scorecard_gap_resolution.json": {
                  "schema_version": "1.0", "lane": phase_mode.upper(), "platform_run_id": platform_run_id, "scenario_run_id": scenario_run_id,
                  "runtime_cert_execution_id": runtime_cert_execution_id, "captured_at_utc": utc_now(), "upstream_rc1_execution_id": upstream_rc1_execution,
                  "tier0_gap_count_from_rc1": len(gap_rows), "gap_resolution_rows": gap_resolution_rows,
              },
              "runtime_profile_evidence_manifest.json": {
                  "schema_version": "1.0", "lane": phase_mode.upper(), "platform_run_id": platform_run_id, "scenario_run_id": scenario_run_id,
                  "runtime_cert_execution_id": runtime_cert_execution_id, "captured_at_utc": utc_now(),
                  "remediation_mode": remediation_mode, "manifest_generated": manifest_generated, "manifest_complete": manifest_complete,
                  "r1_evidence_shape_gate": r1_gate,
                  "profile_rows": manifest_rows,
              },
              "runtime_blocker_register.json": {
                  "schema_version": "1.0", "lane": phase_mode.upper(), "platform_run_id": platform_run_id, "scenario_run_id": scenario_run_id,
                  "runtime_cert_execution_id": runtime_cert_execution_id, "captured_at_utc": utc_now(), "blocker_count": len(blockers),
                  "blockers": sorted(blockers, key=lambda b: (b["blocker_id"], b.get("scope", ""), b["detail"])),
              },
              "runtime_cost_outcome_receipt.json": {
                  "schema_version": "1.0", "lane": phase_mode.upper(), "platform_run_id": platform_run_id, "scenario_run_id": scenario_run_id,
                  "runtime_cert_execution_id": runtime_cert_execution_id, "captured_at_utc": utc_now(),
                  "cost_outcome_status": "PASS" if all(c["status"] == "PASS" for c in claim_out if c["claim_id"] == "T0.6") else "HOLD_REMEDIATION_REQUIRED",
              },
              "rc2_execution_snapshot.json": {
                  "schema_version": "1.0", "lane": phase_mode.upper(), "platform_run_id": platform_run_id, "scenario_run_id": scenario_run_id,
                  "runtime_cert_execution_id": runtime_cert_execution_id, "captured_at_utc": utc_now(),
                  "cert_window_start_utc": cert_window_start_utc, "cert_window_end_utc": cert_window_end_utc,
                  "entry_sources": {"rc0_execution_id": upstream_rc0_execution, "rc1_execution_id": upstream_rc1_execution, "rc1_tier0_gap_count": len(gap_rows)},
                  "remediation_mode": remediation_mode,
                  "r1_evidence_shape_gate": r1_gate,
                  "execution_claimability": "CLAIMABLE" if r1_gate.get("passed") else "NON_CLAIMABLE",
                  "manifest_generated": manifest_generated,
                  "manifest_complete": manifest_complete,
                  "blocker_ids_checked": ["RC-B1", "RC-B2", "RC-B3", "RC-B4", "RC-B8", "RC-B9", "RC-B10"],
                  "blocker_count": len(blockers), "blockers": sorted(blockers, key=lambda b: (b["blocker_id"], b.get("scope", ""), b["detail"])),
                  "tier0_claim_status": claim_out, "tier0_hold_count": len(tier0_holds), "tier0_holds": sorted(tier0_holds),
                  "overall_pass": overall_pass, "verdict": verdict, "next_gate": next_gate,
                  "durable_root": f"s3://{bucket}/{rc2_prefix}", "local_root": str(run_dir.resolve()),
              },
          }

          for name in sorted(payloads.keys()):
              body = dump_json(run_dir / name, payloads[name])
              key = f"{rc2_prefix}{name}"
              s3_put_bytes(s3, bucket, key, body)
              rb = s3_get_bytes(s3, bucket, key)
              if sha256_bytes(body) != sha256_bytes(rb):
                  print(f"RC2 fail-closed: durable readback hash mismatch for {name}")
                  sys.exit(1)

          print(json.dumps({
              "runtime_cert_execution_id": runtime_cert_execution_id,
              "upstream_rc0_execution_id": upstream_rc0_execution,
              "upstream_rc1_execution_id": upstream_rc1_execution,
              "verdict": verdict,
              "next_gate": next_gate,
              "blocker_count": len(blockers),
              "tier0_hold_count": len(tier0_holds),
              "durable_root": f"s3://{bucket}/{rc2_prefix}",
              "local_root": str(run_dir.resolve()),
          }, ensure_ascii=True))
          PY

      - name: Execute RC2.R2 lane handler (managed inline)
        if: ${{ inputs.phase_mode == 'rc2r2' && steps.lane.outputs.lane_supported == 'true' }}
        shell: bash
        env:
          AWS_REGION: ${{ inputs.aws_region }}
          EVIDENCE_BUCKET: ${{ inputs.evidence_bucket }}
          PLATFORM_RUN_ID: ${{ inputs.platform_run_id }}
          SCENARIO_RUN_ID: ${{ inputs.scenario_run_id }}
          RUNTIME_CERT_EXECUTION_ID: ${{ steps.run_meta.outputs.runtime_cert_execution_id }}
          RUN_DIR: ${{ steps.run_meta.outputs.run_dir }}
          APIGW_IG_STAGE_NAME: ${{ inputs.rc2r2_apigw_ig_stage_name }}
          EXPECTED_IG_RATE_LIMIT_RPS: ${{ inputs.rc2r2_ig_rate_limit_rps }}
          EXPECTED_IG_RATE_LIMIT_BURST: ${{ inputs.rc2r2_ig_rate_limit_burst }}
          EXPECTED_NODEGROUP_INSTANCE_TYPES_JSON: ${{ inputs.rc2r2_eks_nodegroup_instance_types_json }}
          EXPECTED_NODEGROUP_DESIRED: ${{ inputs.rc2r2_eks_nodegroup_desired_size }}
          EXPECTED_NODEGROUP_MIN: ${{ inputs.rc2r2_eks_nodegroup_min_size }}
          EXPECTED_NODEGROUP_MAX: ${{ inputs.rc2r2_eks_nodegroup_max_size }}
          TF_DIR: infra/terraform/dev_full/runtime
        run: |
          set -euo pipefail
          terraform -chdir="${TF_DIR}" init -reconfigure -backend-config=backend.hcl.example
          terraform -chdir="${TF_DIR}" validate
          terraform -chdir="${TF_DIR}" output -json > "${RUN_DIR}/terraform_outputs_pre.json"

          python - <<'PY'
          import json
          import os
          from datetime import datetime, timezone
          from pathlib import Path
          import boto3

          run_dir = Path(os.environ["RUN_DIR"])
          outputs = json.loads((run_dir / "terraform_outputs_pre.json").read_text(encoding="utf-8"))
          apigw_id = str(outputs.get("apigw_ig_api_id", {}).get("value", "")).strip()
          lambda_name = str(outputs.get("lambda_ig_handler_name", {}).get("value", "")).strip()
          cluster_arn = str(outputs.get("eks_cluster_arn", {}).get("value", "")).strip()
          nodegroup_name = str(outputs.get("eks_nodegroup_m6f_name", {}).get("value", "")).strip()
          cluster_name = cluster_arn.split("cluster/", 1)[1] if "cluster/" in cluster_arn else ""

          apigw = boto3.client("apigatewayv2", region_name=os.environ["AWS_REGION"])
          lam = boto3.client("lambda", region_name=os.environ["AWS_REGION"])
          eks = boto3.client("eks", region_name=os.environ["AWS_REGION"])

          stage_name = os.environ["APIGW_IG_STAGE_NAME"]
          stage = apigw.get_stage(ApiId=apigw_id, StageName=stage_name) if apigw_id else {}
          route = stage.get("DefaultRouteSettings", {}) if isinstance(stage, dict) else {}
          lambda_cfg = lam.get_function_configuration(FunctionName=lambda_name) if lambda_name else {}
          nodegroup = (
              eks.describe_nodegroup(clusterName=cluster_name, nodegroupName=nodegroup_name).get("nodegroup", {})
              if cluster_name and nodegroup_name
              else {}
          )
          scaling = nodegroup.get("scalingConfig", {}) if isinstance(nodegroup, dict) else {}

          pre = {
              "captured_at_utc": datetime.now(timezone.utc).strftime("%Y-%m-%dT%H:%M:%SZ"),
              "phase": "RC2.R2",
              "execution_id": os.environ["RUNTIME_CERT_EXECUTION_ID"],
              "platform_run_id": os.environ["PLATFORM_RUN_ID"],
              "scenario_run_id": os.environ["SCENARIO_RUN_ID"],
              "apigw": {
                  "api_id": apigw_id,
                  "stage_name": stage_name,
                  "throttling_rate_limit": route.get("ThrottlingRateLimit"),
                  "throttling_burst_limit": route.get("ThrottlingBurstLimit"),
              },
              "lambda": {
                  "function_name": lambda_name,
                  "memory_size": lambda_cfg.get("MemorySize"),
                  "timeout_seconds": lambda_cfg.get("Timeout"),
                  "reserved_concurrency": lambda_cfg.get("ReservedConcurrentExecutions"),
              },
              "eks_m6f_nodegroup": {
                  "cluster_name": cluster_name,
                  "nodegroup_name": nodegroup_name,
                  "instance_types": nodegroup.get("instanceTypes"),
                  "scaling_config": scaling,
                  "status": nodegroup.get("status"),
              },
          }
          (run_dir / "rc2_r2_capacity_pre_snapshot.json").write_text(
              json.dumps(pre, indent=2, ensure_ascii=True) + "\n",
              encoding="utf-8",
          )
          PY

          terraform -chdir="${TF_DIR}" apply -input=false -auto-approve \
            -var "ig_rate_limit_rps=${EXPECTED_IG_RATE_LIMIT_RPS}" \
            -var "ig_rate_limit_burst=${EXPECTED_IG_RATE_LIMIT_BURST}" \
            -var "eks_nodegroup_instance_types=${EXPECTED_NODEGROUP_INSTANCE_TYPES_JSON}" \
            -var "eks_nodegroup_desired_size=${EXPECTED_NODEGROUP_DESIRED}" \
            -var "eks_nodegroup_min_size=${EXPECTED_NODEGROUP_MIN}" \
            -var "eks_nodegroup_max_size=${EXPECTED_NODEGROUP_MAX}"
          terraform -chdir="${TF_DIR}" output -json > "${RUN_DIR}/terraform_outputs_post.json"

          python - <<'PY'
          import hashlib
          import json
          import os
          import sys
          from datetime import datetime, timezone
          from pathlib import Path
          import boto3

          run_dir = Path(os.environ["RUN_DIR"])
          exec_id = os.environ["RUNTIME_CERT_EXECUTION_ID"]
          platform_run_id = os.environ["PLATFORM_RUN_ID"]
          scenario_run_id = os.environ["SCENARIO_RUN_ID"]
          bucket = os.environ["EVIDENCE_BUCKET"]
          stage_name = os.environ["APIGW_IG_STAGE_NAME"]
          expected_rate = float(os.environ["EXPECTED_IG_RATE_LIMIT_RPS"])
          expected_burst = int(float(os.environ["EXPECTED_IG_RATE_LIMIT_BURST"]))
          expected_desired = int(os.environ["EXPECTED_NODEGROUP_DESIRED"])
          expected_min = int(os.environ["EXPECTED_NODEGROUP_MIN"])
          expected_max = int(os.environ["EXPECTED_NODEGROUP_MAX"])

          def load_json(path: Path) -> dict:
              return json.loads(path.read_text(encoding="utf-8"))

          pre = load_json(run_dir / "rc2_r2_capacity_pre_snapshot.json")
          outputs_post = load_json(run_dir / "terraform_outputs_post.json")

          apigw_id = str(outputs_post.get("apigw_ig_api_id", {}).get("value", "")).strip()
          lambda_name = str(outputs_post.get("lambda_ig_handler_name", {}).get("value", "")).strip()
          cluster_arn = str(outputs_post.get("eks_cluster_arn", {}).get("value", "")).strip()
          nodegroup_name = str(outputs_post.get("eks_nodegroup_m6f_name", {}).get("value", "")).strip()
          cluster_name = cluster_arn.split("cluster/", 1)[1] if "cluster/" in cluster_arn else ""

          apigw = boto3.client("apigatewayv2", region_name=os.environ["AWS_REGION"])
          lam = boto3.client("lambda", region_name=os.environ["AWS_REGION"])
          eks = boto3.client("eks", region_name=os.environ["AWS_REGION"])
          s3 = boto3.client("s3", region_name=os.environ["AWS_REGION"])

          stage = apigw.get_stage(ApiId=apigw_id, StageName=stage_name) if apigw_id else {}
          route = stage.get("DefaultRouteSettings", {}) if isinstance(stage, dict) else {}
          lambda_cfg = lam.get_function_configuration(FunctionName=lambda_name) if lambda_name else {}
          nodegroup = (
              eks.describe_nodegroup(clusterName=cluster_name, nodegroupName=nodegroup_name).get("nodegroup", {})
              if cluster_name and nodegroup_name
              else {}
          )
          scaling = nodegroup.get("scalingConfig", {}) if isinstance(nodegroup, dict) else {}

          post = {
              "captured_at_utc": datetime.now(timezone.utc).strftime("%Y-%m-%dT%H:%M:%SZ"),
              "phase": "RC2.R2",
              "execution_id": exec_id,
              "platform_run_id": platform_run_id,
              "scenario_run_id": scenario_run_id,
              "apigw": {
                  "api_id": apigw_id,
                  "stage_name": stage_name,
                  "throttling_rate_limit": route.get("ThrottlingRateLimit"),
                  "throttling_burst_limit": route.get("ThrottlingBurstLimit"),
              },
              "lambda": {
                  "function_name": lambda_name,
                  "memory_size": lambda_cfg.get("MemorySize"),
                  "timeout_seconds": lambda_cfg.get("Timeout"),
                  "reserved_concurrency": lambda_cfg.get("ReservedConcurrentExecutions"),
              },
              "eks_m6f_nodegroup": {
                  "cluster_name": cluster_name,
                  "nodegroup_name": nodegroup_name,
                  "instance_types": nodegroup.get("instanceTypes"),
                  "scaling_config": scaling,
                  "status": nodegroup.get("status"),
              },
          }

          blockers = []
          rate_live = post["apigw"].get("throttling_rate_limit")
          burst_live = post["apigw"].get("throttling_burst_limit")
          if rate_live is None or float(rate_live) < expected_rate:
              blockers.append({"code": "RC2R2-B1", "message": f"APIGW throttle rate below target ({rate_live} < {expected_rate})."})
          if burst_live is None or int(burst_live) < expected_burst:
              blockers.append({"code": "RC2R2-B1", "message": f"APIGW throttle burst below target ({burst_live} < {expected_burst})."})

          desired_live = int(scaling.get("desiredSize", -1))
          min_live = int(scaling.get("minSize", -1))
          max_live = int(scaling.get("maxSize", -1))
          if desired_live < expected_desired or min_live < expected_min or max_live < expected_max:
              blockers.append({
                  "code": "RC2R2-B2",
                  "message": (
                      "EKS nodegroup scaling below target "
                      f"(live desired/min/max={desired_live}/{min_live}/{max_live}, "
                      f"expected>={expected_desired}/{expected_min}/{expected_max})."
                  ),
              })

          scale_down_plan = {
              "captured_at_utc": datetime.now(timezone.utc).strftime("%Y-%m-%dT%H:%M:%SZ"),
              "phase": "RC2.R2",
              "execution_id": exec_id,
              "post_cert_trigger": "after RC2 remediation campaign closure or explicit stop",
              "target_restore_knobs": {
                  "ig_rate_limit_rps": pre.get("apigw", {}).get("throttling_rate_limit"),
                  "ig_rate_limit_burst": pre.get("apigw", {}).get("throttling_burst_limit"),
                  "eks_nodegroup_desired_size": pre.get("eks_m6f_nodegroup", {}).get("scaling_config", {}).get("desiredSize"),
                  "eks_nodegroup_min_size": pre.get("eks_m6f_nodegroup", {}).get("scaling_config", {}).get("minSize"),
                  "eks_nodegroup_max_size": pre.get("eks_m6f_nodegroup", {}).get("scaling_config", {}).get("maxSize"),
              },
              "execution_posture": "MANAGED_WORKFLOW_ONLY",
          }

          envelope_snapshot = {
              "captured_at_utc": datetime.now(timezone.utc).strftime("%Y-%m-%dT%H:%M:%SZ"),
              "phase": "RC2.R2",
              "execution_id": exec_id,
              "platform_run_id": platform_run_id,
              "scenario_run_id": scenario_run_id,
              "pre_change": pre,
              "post_change": post,
              "expected_targets": {
                  "ig_rate_limit_rps": expected_rate,
                  "ig_rate_limit_burst": expected_burst,
                  "eks_nodegroup_desired_size": expected_desired,
                  "eks_nodegroup_min_size": expected_min,
                  "eks_nodegroup_max_size": expected_max,
              },
          }

          overall_pass = len(blockers) == 0
          summary = {
              "captured_at_utc": datetime.now(timezone.utc).strftime("%Y-%m-%dT%H:%M:%SZ"),
              "phase": "RC2.R2",
              "runtime_cert_execution_id": exec_id,
              "platform_run_id": platform_run_id,
              "scenario_run_id": scenario_run_id,
              "overall_pass": overall_pass,
              "verdict": "PASS" if overall_pass else "HOLD",
              "next_gate": "READY_FOR_RC2_R5" if overall_pass else "HOLD_REMEDIATE",
              "blocker_count": len(blockers),
          }
          blocker_register = {
              "captured_at_utc": summary["captured_at_utc"],
              "phase": "RC2.R2",
              "execution_id": exec_id,
              "platform_run_id": platform_run_id,
              "scenario_run_id": scenario_run_id,
              "blocker_count": len(blockers),
              "blockers": blockers,
          }
          change_receipt = {
              "captured_at_utc": summary["captured_at_utc"],
              "phase": "RC2.R2",
              "execution_id": exec_id,
              "platform_run_id": platform_run_id,
              "scenario_run_id": scenario_run_id,
              "change_set": envelope_snapshot["expected_targets"],
              "verification_ref": f"s3://{bucket}/evidence/dev_full/cert/runtime/{exec_id}/rc2_r2_capacity_envelope_snapshot.json",
              "execution_posture": "MANAGED_WORKFLOW_TERRAFORM_APPLY_ONLY",
          }

          files = {
              "rc2_r2_capacity_envelope_snapshot.json": envelope_snapshot,
              "rc2_r2_capacity_change_receipt.json": change_receipt,
              "rc2_r2_scale_down_plan.json": scale_down_plan,
              "rc2_r2_blocker_register.json": blocker_register,
              "rc2_r2_execution_summary.json": summary,
          }
          prefix = f"evidence/dev_full/cert/runtime/{exec_id}/"
          publication_rows = []

          for name, payload in files.items():
              path = run_dir / name
              data = (json.dumps(payload, indent=2, ensure_ascii=True) + "\n").encode("utf-8")
              path.write_bytes(data)
              key = f"{prefix}{name}"
              s3.put_object(Bucket=bucket, Key=key, Body=data, ContentType="application/json")
              rb = s3.get_object(Bucket=bucket, Key=key)["Body"].read()
              publication_rows.append({
                  "artifact": name,
                  "s3_key": key,
                  "sha256_local": hashlib.sha256(data).hexdigest(),
                  "sha256_readback": hashlib.sha256(rb).hexdigest(),
                  "readback_ok": hashlib.sha256(data).hexdigest() == hashlib.sha256(rb).hexdigest(),
              })

          publication_ok = all(bool(r["readback_ok"]) for r in publication_rows)
          publication = {
              "captured_at_utc": datetime.now(timezone.utc).strftime("%Y-%m-%dT%H:%M:%SZ"),
              "phase": "RC2.R2",
              "execution_id": exec_id,
              "artifact_rows": publication_rows,
              "overall_readback_ok": publication_ok,
          }
          pub_path = run_dir / "rc2_r2_publication_receipt.json"
          pub_data = (json.dumps(publication, indent=2, ensure_ascii=True) + "\n").encode("utf-8")
          pub_path.write_bytes(pub_data)
          pub_key = f"{prefix}rc2_r2_publication_receipt.json"
          s3.put_object(Bucket=bucket, Key=pub_key, Body=pub_data, ContentType="application/json")

          print(json.dumps({
              "runtime_cert_execution_id": exec_id,
              "overall_pass": overall_pass,
              "blocker_count": len(blockers),
              "next_gate": "READY_FOR_RC2_R5" if overall_pass else "HOLD_REMEDIATE",
              "durable_root": f"s3://{bucket}/{prefix}",
          }, ensure_ascii=True))

          if not publication_ok:
              print("RC2.R2 fail-closed: publication readback mismatch detected.")
              sys.exit(1)
          if not overall_pass:
              print("RC2.R2 fail-closed: capacity envelope gate is HOLD_REMEDIATE.")
              sys.exit(1)
          PY

      - name: RC0 fail-closed verdict gate
