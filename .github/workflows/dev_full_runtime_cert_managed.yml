              return list(cw.get_metric_statistics(**kwargs).get("Datapoints", []))

          run_dir = Path(os.environ["RUN_DIR"])
          selection = json.loads((run_dir / "g3a_s1_managed_runtime_path_selection.json").read_text(encoding="utf-8"))
