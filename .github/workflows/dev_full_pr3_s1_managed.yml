name: dev-full-pr3-s1-managed

on:
  workflow_dispatch:
    inputs:
      execution_mode:
        description: "steady_harness, materialize_runtime, or remediate_irsa_msk_auth"
        required: true
        default: "steady_harness"
        type: choice
        options:
          - steady_harness
          - materialize_runtime
          - remediate_irsa_msk_auth
      aws_region:
        description: "AWS region"
        required: true
        default: "eu-west-2"
        type: string
      aws_role_to_assume:
        description: "OIDC role ARN used by GitHub Actions"
        required: true
        type: string
      pr3_execution_id:
        description: "Strict PR3 execution id"
        required: true
        default: "pr3_20260306T021900Z"
        type: string
      platform_run_id:
        description: "Pinned platform run id for the pressure window"
        required: true
        default: "platform_20260223T184232Z"
        type: string
      scenario_run_id:
        description: "Pinned scenario run id for the pressure window"
        required: true
        default: "scenario_38753050f3b70c666e16f7552016b330"
        type: string
      evidence_bucket:
        description: "Evidence bucket for remote artifact backup"
        required: true
        default: "fraud-platform-dev-full-evidence"
        type: string
      ig_base_url:
        description: "IG base URL"
        required: true
        default: "https://ehwznd2uw7.execute-api.eu-west-2.amazonaws.com/v1"
        type: string
      ig_ingest_path:
        description: "IG ingest path"
        required: true
        default: "/ingest/push"
        type: string
      ig_api_key_ssm_path:
        description: "SSM path for the IG API key"
        required: true
        default: "/fraud-platform/dev_full/ig/api_key"
        type: string
      api_id:
        description: "API Gateway API id"
        required: true
        default: "ehwznd2uw7"
        type: string
      api_stage:
        description: "API Gateway stage"
        required: true
        default: "v1"
        type: string
      eks_cluster_name:
        description: "EKS cluster name"
        required: true
        default: "fraud-platform-dev-full"
        type: string
      eks_namespace:
        description: "EKS namespace for fallback jobs"
        required: true
        default: "fraud-platform-rtdl"
        type: string
      msk_cluster_arn:
        description: "Pinned MSK cluster ARN for runtime IAM remediation"
        required: true
        default: "arn:aws:kafka:eu-west-2:230372904534:cluster/fraud-platform-dev-full-msk/6d6d345b-fb39-4e7b-a245-53525b4648b6-s3"
        type: string
      worker_image_uri:
        description: "Worker image used by the managed fallback lane"
        required: true
        default: "230372904534.dkr.ecr.eu-west-2.amazonaws.com/fraud-platform-dev-full@sha256:49eb6cb0c5e33061fae4d1aaceeac2e44600adb5c4250436be9ac8395ed29cb2"
        type: string
      runtime_path_requested:
        description: "AUTO, MSF_MANAGED, or EKS_FLINK_OPERATOR"
        required: true
        default: "AUTO"
        type: choice
        options:
          - AUTO
          - MSF_MANAGED
          - EKS_FLINK_OPERATOR
      lane_count:
        description: "Number of remote pressure lanes"
        required: true
        default: "4"
        type: string
      target_steady_eps:
        description: "Total target steady EPS"
        required: true
        default: "3000"
        type: string
      duration_seconds:
        description: "Steady window duration in seconds"
        required: true
        default: "1800"
        type: string
      min_sample_events:
        description: "Required admitted events"
        required: true
        default: "5400000"
        type: string
      max_workers_per_lane:
        description: "Thread workers per lane"
        required: true
        default: "192"
        type: string
      retry_max_attempts:
        description: "Retry attempts per event"
        required: true
        default: "3"
        type: string
      retry_backoff_ms:
        description: "Retry backoff in milliseconds"
        required: true
        default: "200"
        type: string
      early_cutoff_seconds:
        description: "Fail-fast evaluation point in seconds"
        required: true
        default: "180"
        type: string
      early_cutoff_floor_ratio:
        description: "Minimum admitted EPS ratio required at the fail-fast check"
        required: true
        default: "0.70"
        type: string

permissions:
  contents: read
  id-token: write

concurrency:
  group: dev-full-pr3-s1-managed-${{ github.ref_name }}
  cancel-in-progress: false

jobs:
  remediate_pr3_irsa_msk_auth:
    name: Remediate PR3 IRSA MSK auth
    if: ${{ inputs.execution_mode == 'remediate_irsa_msk_auth' }}
    runs-on: ubuntu-latest
    env:
      ROLE_RTDL_NAME: fraud-platform-dev-full-irsa-rtdl
      ROLE_DECISION_NAME: fraud-platform-dev-full-irsa-decision-lane
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Reject static AWS credential posture
        shell: bash
        run: |
          set -euo pipefail
          if [[ -n "${AWS_ACCESS_KEY_ID:-}" || -n "${AWS_SECRET_ACCESS_KEY:-}" ]]; then
            echo "Static AWS credentials are forbidden; use OIDC role assumption."
            exit 1
          fi

      - name: Configure AWS credentials via OIDC
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-region: ${{ inputs.aws_region }}
          role-to-assume: ${{ inputs.aws_role_to_assume }}

      - name: Setup kubectl
        uses: azure/setup-kubectl@v4
        with:
          version: "latest"

      - name: Resolve remediation run directory
        id: remediation_meta
        shell: bash
        run: |
          set -euo pipefail
          RUN_DIR="runs/dev_substrate/dev_full/road_to_prod/run_control/${{ inputs.pr3_execution_id }}/irsa_msk_auth_remediation_$(date -u +'%Y%m%dT%H%M%SZ')"
          mkdir -p "${RUN_DIR}"
          echo "run_dir=${RUN_DIR}" >> "$GITHUB_OUTPUT"

      - name: Resolve live MSK policy document
        shell: bash
        env:
          RUN_DIR: ${{ steps.remediation_meta.outputs.run_dir }}
          MSK_CLUSTER_ARN: ${{ inputs.msk_cluster_arn }}
        run: |
          set -euo pipefail
          python - <<'PY'
          import json
          import os
          from pathlib import Path

          run_dir = Path(os.environ["RUN_DIR"])
          cluster_arn = str(os.environ["MSK_CLUSTER_ARN"]).strip()
          if "cluster/" not in cluster_arn:
              raise SystemExit("PINNED_MSK_CLUSTER_ARN_INVALID")
          cluster_suffix = cluster_arn.split("cluster/", 1)[1]
          cluster_name, cluster_uuid = cluster_suffix.split("/", 1)
          account = cluster_arn.split(":", 5)[4]
          region = os.environ["AWS_REGION"]

          policy = {
              "Version": "2012-10-17",
              "Statement": [
                  {
                      "Effect": "Allow",
                      "Action": [
                          "kafka-cluster:Connect",
                          "kafka-cluster:DescribeCluster",
                      ],
                      "Resource": cluster_arn,
                  },
                  {
                      "Effect": "Allow",
                      "Action": [
                          "kafka-cluster:DescribeTopic",
                          "kafka-cluster:ReadData",
                          "kafka-cluster:WriteData",
                      ],
                      "Resource": f"arn:aws:kafka:{region}:{account}:topic/{cluster_name}/{cluster_uuid}/*",
                  },
                  {
                      "Effect": "Allow",
                      "Action": [
                          "kafka-cluster:DescribeGroup",
                          "kafka-cluster:AlterGroup",
                      ],
                      "Resource": f"arn:aws:kafka:{region}:{account}:group/{cluster_name}/{cluster_uuid}/*",
                  },
              ],
          }
          (run_dir / "irsa_msk_data_plane_policy.json").write_text(
              json.dumps(policy, indent=2, ensure_ascii=True) + "\n",
              encoding="utf-8",
          )
          (run_dir / "irsa_msk_cluster_resolution.json").write_text(
              json.dumps(
                  {
                      "cluster_name": cluster_name,
                      "cluster_arn": cluster_arn,
                      "cluster_uuid": cluster_uuid,
                      "region": region,
                      "account": account,
                  },
                  indent=2,
                  ensure_ascii=True,
              )
              + "\n",
              encoding="utf-8",
          )
          PY

      - name: Capture pre-remediation IAM posture
        shell: bash
        env:
          RUN_DIR: ${{ steps.remediation_meta.outputs.run_dir }}
        run: |
          set -euo pipefail
          aws iam get-role-policy \
            --role-name "${ROLE_RTDL_NAME}" \
            --policy-name "${ROLE_RTDL_NAME}-ssm-read" \
            --output json > "${RUN_DIR}/irsa_rtdl_ssm_read_pre.json"
          aws iam get-role-policy \
            --role-name "${ROLE_DECISION_NAME}" \
            --policy-name "${ROLE_DECISION_NAME}-ssm-read" \
            --output json > "${RUN_DIR}/irsa_decision_lane_ssm_read_pre.json"
          aws iam list-role-policies \
            --role-name "${ROLE_RTDL_NAME}" \
            --output json > "${RUN_DIR}/irsa_rtdl_policy_list_pre.json"
          aws iam list-role-policies \
            --role-name "${ROLE_DECISION_NAME}" \
            --output json > "${RUN_DIR}/irsa_decision_lane_policy_list_pre.json"

      - name: Apply targeted IRSA MSK auth remediation
        shell: bash
        env:
          RUN_DIR: ${{ steps.remediation_meta.outputs.run_dir }}
        run: |
          set -euo pipefail
          aws iam put-role-policy \
            --role-name "${ROLE_RTDL_NAME}" \
            --policy-name "${ROLE_RTDL_NAME}-msk-data-plane" \
            --policy-document "file://${RUN_DIR}/irsa_msk_data_plane_policy.json"
          aws iam put-role-policy \
            --role-name "${ROLE_DECISION_NAME}" \
            --policy-name "${ROLE_DECISION_NAME}-msk-data-plane" \
            --policy-document "file://${RUN_DIR}/irsa_msk_data_plane_policy.json"

      - name: Configure kubeconfig
        shell: bash
        run: |
          set -euo pipefail
          aws eks update-kubeconfig \
            --region "${{ inputs.aws_region }}" \
            --name "${{ inputs.eks_cluster_name }}"

      - name: Restart affected PR3 runtime deployments
        shell: bash
        run: |
          set -euo pipefail
          kubectl rollout restart deployment/fp-pr3-ieg -n "${{ inputs.eks_namespace }}"
          kubectl rollout restart deployment/fp-pr3-ofp -n "${{ inputs.eks_namespace }}"
          kubectl rollout restart deployment/fp-pr3-df -n "${{ inputs.eks_namespace }}"
          kubectl rollout restart deployment/fp-pr3-al -n "${{ inputs.eks_namespace }}"
          kubectl rollout restart deployment/fp-pr3-dla -n "${{ inputs.eks_namespace }}"
          kubectl rollout restart deployment/fp-pr3-archive-writer -n "${{ inputs.eks_namespace }}"
          kubectl rollout status deployment/fp-pr3-ieg -n "${{ inputs.eks_namespace }}" --timeout=180s
          kubectl rollout status deployment/fp-pr3-ofp -n "${{ inputs.eks_namespace }}" --timeout=180s
          kubectl rollout status deployment/fp-pr3-df -n "${{ inputs.eks_namespace }}" --timeout=180s
          kubectl rollout status deployment/fp-pr3-al -n "${{ inputs.eks_namespace }}" --timeout=180s
          kubectl rollout status deployment/fp-pr3-dla -n "${{ inputs.eks_namespace }}" --timeout=180s
          kubectl rollout status deployment/fp-pr3-archive-writer -n "${{ inputs.eks_namespace }}" --timeout=180s
          sleep 30

      - name: Capture post-remediation posture and verify auth blockers cleared
        shell: bash
        env:
          RUN_DIR: ${{ steps.remediation_meta.outputs.run_dir }}
          PR3_EXECUTION_ID: ${{ inputs.pr3_execution_id }}
        run: |
          set -euo pipefail
          aws iam get-role-policy \
            --role-name "${ROLE_RTDL_NAME}" \
            --policy-name "${ROLE_RTDL_NAME}-msk-data-plane" \
            --output json > "${RUN_DIR}/irsa_rtdl_msk_data_plane_post.json"
          aws iam get-role-policy \
            --role-name "${ROLE_DECISION_NAME}" \
            --policy-name "${ROLE_DECISION_NAME}-msk-data-plane" \
            --output json > "${RUN_DIR}/irsa_decision_lane_msk_data_plane_post.json"
          kubectl logs deployment/fp-pr3-df -n "${{ inputs.eks_namespace }}" --tail=80 > "${RUN_DIR}/fp_pr3_df_logs_post.txt"
          kubectl logs deployment/fp-pr3-al -n "${{ inputs.eks_namespace }}" --tail=80 > "${RUN_DIR}/fp_pr3_al_logs_post.txt"
          kubectl logs deployment/fp-pr3-dla -n "${{ inputs.eks_namespace }}" --tail=80 > "${RUN_DIR}/fp_pr3_dla_logs_post.txt"
          python - <<'PY'
          import json
          import os
          from datetime import datetime, timezone
          from pathlib import Path

          run_dir = Path(os.environ["RUN_DIR"])
          execution_id = os.environ["PR3_EXECUTION_ID"]
          log_targets = {
              "df": run_dir / "fp_pr3_df_logs_post.txt",
              "al": run_dir / "fp_pr3_al_logs_post.txt",
              "dla": run_dir / "fp_pr3_dla_logs_post.txt",
          }
          blockers = []
          for lane, path in log_targets.items():
              text = path.read_text(encoding="utf-8") if path.exists() else ""
              if "SaslAuthenticationFailedError" in text or "Access denied" in text:
                  blockers.append(f"{lane.upper()}_MSK_AUTH_STILL_DENIED")

          summary = {
              "captured_at_utc": datetime.now(timezone.utc).strftime("%Y-%m-%dT%H:%M:%SZ"),
              "pr3_execution_id": execution_id,
              "remediation": "IRSA_MSK_DATA_PLANE",
              "roles": {
                  "rtdl": os.environ["ROLE_RTDL_NAME"],
                  "decision_lane": os.environ["ROLE_DECISION_NAME"],
              },
              "log_verification_targets": sorted(log_targets.keys()),
              "open_blockers": len(blockers),
              "blocker_ids": blockers,
              "overall_pass": not blockers,
          }
          manifest = {
              "captured_at_utc": summary["captured_at_utc"],
              "remediation": summary["remediation"],
              "artifacts": {
                  "rtdl_policy": str((run_dir / "irsa_rtdl_msk_data_plane_post.json").resolve()),
                  "decision_lane_policy": str((run_dir / "irsa_decision_lane_msk_data_plane_post.json").resolve()),
                  "df_logs": str((run_dir / "fp_pr3_df_logs_post.txt").resolve()),
                  "al_logs": str((run_dir / "fp_pr3_al_logs_post.txt").resolve()),
                  "dla_logs": str((run_dir / "fp_pr3_dla_logs_post.txt").resolve()),
              },
          }
          (run_dir / "g3a_runtime_irsa_msk_auth_summary.json").write_text(
              json.dumps(summary, indent=2, ensure_ascii=True) + "\n",
              encoding="utf-8",
          )
          (run_dir / "g3a_runtime_irsa_msk_auth_manifest.json").write_text(
              json.dumps(manifest, indent=2, ensure_ascii=True) + "\n",
              encoding="utf-8",
          )
          if blockers:
              raise SystemExit(1)
          PY

      - name: Upload workflow artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: pr3-irsa-msk-auth-remediation-${{ inputs.pr3_execution_id }}
          path: |
            ${{ steps.remediation_meta.outputs.run_dir }}/irsa_msk_cluster_resolution.json
            ${{ steps.remediation_meta.outputs.run_dir }}/irsa_msk_data_plane_policy.json
            ${{ steps.remediation_meta.outputs.run_dir }}/g3a_runtime_irsa_msk_auth_manifest.json
            ${{ steps.remediation_meta.outputs.run_dir }}/g3a_runtime_irsa_msk_auth_summary.json
            ${{ steps.remediation_meta.outputs.run_dir }}/fp_pr3_df_logs_post.txt
            ${{ steps.remediation_meta.outputs.run_dir }}/fp_pr3_al_logs_post.txt
            ${{ steps.remediation_meta.outputs.run_dir }}/fp_pr3_dla_logs_post.txt
          if-no-files-found: warn

  materialize_pr3_runtime:
    name: Materialize PR3 runtime on EKS
    if: ${{ inputs.execution_mode == 'materialize_runtime' }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Reject static AWS credential posture
        shell: bash
        run: |
          set -euo pipefail
          if [[ -n "${AWS_ACCESS_KEY_ID:-}" || -n "${AWS_SECRET_ACCESS_KEY:-}" ]]; then
            echo "Static AWS credentials are forbidden; use OIDC role assumption."
            exit 1
          fi

      - name: Configure AWS credentials via OIDC
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-region: ${{ inputs.aws_region }}
          role-to-assume: ${{ inputs.aws_role_to_assume }}

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Setup kubectl
        uses: azure/setup-kubectl@v4
        with:
          version: "latest"

      - name: Install runtime dependencies
        shell: bash
        run: |
          set -euo pipefail
          python -m pip install --upgrade pip
          python -m pip install boto3 botocore

      - name: Configure kubeconfig
        shell: bash
        run: |
          set -euo pipefail
          aws eks update-kubeconfig \
            --region "${{ inputs.aws_region }}" \
            --name "${{ inputs.eks_cluster_name }}"

      - name: Materialize runtime
        shell: bash
        run: |
          set -euo pipefail
          python scripts/dev_substrate/pr3_rtdl_materialize.py \
            --pr3-execution-id "${{ inputs.pr3_execution_id }}" \
            --platform-run-id "${{ inputs.platform_run_id }}" \
            --scenario-run-id "${{ inputs.scenario_run_id }}" \
            --region "${{ inputs.aws_region }}" \
            --namespace "${{ inputs.eks_namespace }}" \
            --ig-api-key-ssm-path "${{ inputs.ig_api_key_ssm_path }}" \
            --image-uri "${{ inputs.worker_image_uri }}"

      - name: Upload workflow artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: pr3-runtime-materialization-${{ inputs.pr3_execution_id }}
          path: |
            runs/dev_substrate/dev_full/road_to_prod/run_control/${{ inputs.pr3_execution_id }}/g3a_runtime_materialization_manifest.json
            runs/dev_substrate/dev_full/road_to_prod/run_control/${{ inputs.pr3_execution_id }}/g3a_runtime_materialization_summary.json
          if-no-files-found: warn

  run_pr3_s1_managed:
    name: Run PR3-S1 managed fallback pressure lane
    if: ${{ inputs.execution_mode == 'steady_harness' }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Reject static AWS credential posture
        shell: bash
        run: |
          set -euo pipefail
          if [[ -n "${AWS_ACCESS_KEY_ID:-}" || -n "${AWS_SECRET_ACCESS_KEY:-}" ]]; then
            echo "Static AWS credentials are forbidden; use OIDC role assumption."
            exit 1
          fi

      - name: Configure AWS credentials via OIDC
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-region: ${{ inputs.aws_region }}
          role-to-assume: ${{ inputs.aws_role_to_assume }}

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Setup kubectl
        uses: azure/setup-kubectl@v4
        with:
          version: "latest"

      - name: Install runtime dependencies
        shell: bash
        run: |
          set -euo pipefail
          python -m pip install --upgrade pip
          python -m pip install boto3 botocore

      - name: Resolve IG API key from SSM
        shell: bash
        env:
          SSM_IG_API_KEY_PATH: ${{ inputs.ig_api_key_ssm_path }}
        run: |
          set -euo pipefail
          IG_API_KEY="$(aws ssm get-parameter \
            --name "${SSM_IG_API_KEY_PATH}" \
            --with-decryption \
            --query 'Parameter.Value' \
            --output text)"
          if [[ -z "${IG_API_KEY}" || "${IG_API_KEY}" == "None" ]]; then
            echo "PR3-S1 fail-closed: unable to resolve IG API key from SSM."
            exit 1
          fi
          echo "::add-mask::${IG_API_KEY}"
          echo "IG_API_KEY=${IG_API_KEY}" >> "${GITHUB_ENV}"

      - name: Compute execution metadata
        id: meta
        shell: bash
        run: |
          set -euo pipefail
          EXEC_SAFE="$(echo "${{ inputs.pr3_execution_id }}" | tr '[:upper:]_' '[:lower:]-' | sed -E 's/[^a-z0-9-]//g' | cut -c1-24)"
          if [[ -z "${EXEC_SAFE}" ]]; then
            EXEC_SAFE="pr3-s1"
          fi
          RUN_DIR="runs/dev_substrate/dev_full/road_to_prod/run_control/${{ inputs.pr3_execution_id }}"
          mkdir -p "${RUN_DIR}"
          echo "exec_safe=${EXEC_SAFE}" >> "${GITHUB_OUTPUT}"
          echo "run_dir=${RUN_DIR}" >> "${GITHUB_OUTPUT}"

      - name: Resolve runtime path selection
        shell: bash
        env:
          AWS_REGION: ${{ inputs.aws_region }}
          PR3_EXECUTION_ID: ${{ inputs.pr3_execution_id }}
          RUN_DIR: ${{ steps.meta.outputs.run_dir }}
          RUNTIME_PATH_REQUESTED: ${{ inputs.runtime_path_requested }}
        run: |
          set -euo pipefail
          python - <<'PY'
          import json
          import os
          from datetime import datetime, timezone
          from pathlib import Path

          import boto3

          def now_utc() -> str:
              return datetime.now(timezone.utc).isoformat().replace("+00:00", "Z")

          region = os.environ["AWS_REGION"]
          requested = os.environ["RUNTIME_PATH_REQUESTED"].strip().upper()
          pr3_execution_id = os.environ["PR3_EXECUTION_ID"]
          run_dir = Path(os.environ["RUN_DIR"])
          run_dir.mkdir(parents=True, exist_ok=True)

          client = boto3.client("kinesisanalyticsv2", region_name=region)
          wsp_apps = []
          msf_probe_error = ""
          try:
              summaries = client.list_applications().get("ApplicationSummaries", [])
              wsp_apps = [
                  {
                      "application_name": str(item.get("ApplicationName", "")).strip(),
                      "application_status": str(item.get("ApplicationStatus", "")).strip(),
                  }
                  for item in summaries
                  if str(item.get("ApplicationName", "")).strip().startswith("fraud-platform-dev-full-wsp")
              ]
          except Exception as exc:
              msf_probe_error = f"{type(exc).__name__}:{exc}"

          selected = ""
          blockers = []
          decision_reason = ""

          if requested == "EKS_FLINK_OPERATOR":
              selected = "EKS_FLINK_OPERATOR"
              decision_reason = "USER_REQUESTED_FALLBACK_PATH"
          elif requested == "MSF_MANAGED":
              if msf_probe_error:
                  blockers.append(f"PR3.S1.MANAGED.B02_MSF_SURFACE_UNREADABLE:{msf_probe_error}")
                  decision_reason = "EXPLICIT_MSF_REQUEST_BUT_MSF_SURFACE_UNREADABLE"
              elif wsp_apps:
                  selected = "MSF_MANAGED"
                  blockers.append("PR3.S1.MANAGED.B04_MSF_PATH_UNIMPLEMENTED")
                  decision_reason = "WSP_MANAGED_APP_PRESENT_BUT_NO_CANONICAL_MSF_PRESSURE_IMPL_IN_REPO"
              else:
                  blockers.append("PR3.S1.MANAGED.B03_WSP_MANAGED_APP_MISSING")
                  decision_reason = "EXPLICIT_MSF_REQUEST_BUT_WSP_MANAGED_APP_MISSING"
          elif requested == "AUTO":
              if wsp_apps:
                  selected = "MSF_MANAGED"
                  blockers.append("PR3.S1.MANAGED.B04_MSF_PATH_UNIMPLEMENTED")
                  decision_reason = "AUTO_FOUND_WSP_MANAGED_APP_BUT_NO_CANONICAL_MSF_PRESSURE_IMPL_IN_REPO"
              else:
                  selected = "EKS_FLINK_OPERATOR"
                  decision_reason = "AUTO_SELECTED_FALLBACK_BECAUSE_WSP_MANAGED_APP_UNREADABLE_OR_MISSING"
          else:
              blockers.append(f"PR3.S1.MANAGED.B01_INVALID_RUNTIME_PATH_REQUEST:{requested}")

          payload = {
              "phase": "PR3",
              "state": "S1",
              "generated_at_utc": now_utc(),
              "generated_by": "github-actions",
              "version": "1.0.0",
              "execution_id": pr3_execution_id,
              "runtime_path_requested": requested,
              "runtime_path_active": selected,
              "live_wsp_managed_apps": wsp_apps,
              "msf_probe_error": msf_probe_error,
              "decision_reason": decision_reason,
              "overall_pass": len(blockers) == 0 and selected == "EKS_FLINK_OPERATOR",
              "blocker_ids": blockers,
          }

          out = run_dir / "g3a_s1_managed_runtime_path_selection.json"
          out.write_text(json.dumps(payload, indent=2, ensure_ascii=True) + "\n", encoding="utf-8")
          print(json.dumps(payload, indent=2))
          PY

      - name: Fail closed if runtime-path selection blocked
        shell: bash
        env:
          RUN_DIR: ${{ steps.meta.outputs.run_dir }}
        run: |
          set -euo pipefail
          python - <<'PY'
          import json
          import os
          import sys
          from pathlib import Path

          data = json.loads((Path(os.environ["RUN_DIR"]) / "g3a_s1_managed_runtime_path_selection.json").read_text(encoding="utf-8"))
          if not bool(data.get("overall_pass")):
              print(json.dumps(data, indent=2))
              sys.exit(1)
          PY

      - name: Configure kubeconfig for fallback path
        shell: bash
        run: |
          set -euo pipefail
          aws eks update-kubeconfig \
            --region "${{ inputs.aws_region }}" \
            --name "${{ inputs.eks_cluster_name }}"
      - name: Launch and monitor fallback pressure lanes
        shell: bash
        env:
          AWS_REGION: ${{ inputs.aws_region }}
          PR3_EXECUTION_ID: ${{ inputs.pr3_execution_id }}
          PLATFORM_RUN_ID: ${{ inputs.platform_run_id }}
          SCENARIO_RUN_ID: ${{ inputs.scenario_run_id }}
          RUN_DIR: ${{ steps.meta.outputs.run_dir }}
          EXEC_SAFE: ${{ steps.meta.outputs.exec_safe }}
          EKS_NAMESPACE: ${{ inputs.eks_namespace }}
          WORKER_IMAGE_URI: ${{ inputs.worker_image_uri }}
          IG_BASE_URL: ${{ inputs.ig_base_url }}
          IG_INGEST_PATH: ${{ inputs.ig_ingest_path }}
          IG_API_KEY: ${{ env.IG_API_KEY }}
          API_ID: ${{ inputs.api_id }}
          API_STAGE: ${{ inputs.api_stage }}
          LANE_COUNT: ${{ inputs.lane_count }}
          TARGET_STEADY_EPS: ${{ inputs.target_steady_eps }}
          DURATION_SECONDS: ${{ inputs.duration_seconds }}
          MIN_SAMPLE_EVENTS: ${{ inputs.min_sample_events }}
          MAX_WORKERS_PER_LANE: ${{ inputs.max_workers_per_lane }}
          REQUEST_TIMEOUT_SECONDS: "5"
          RETRY_MAX_ATTEMPTS: ${{ inputs.retry_max_attempts }}
          RETRY_BACKOFF_MS: ${{ inputs.retry_backoff_ms }}
          EARLY_CUTOFF_SECONDS: ${{ inputs.early_cutoff_seconds }}
          EARLY_CUTOFF_FLOOR_RATIO: ${{ inputs.early_cutoff_floor_ratio }}
        run: |
          set -euo pipefail
          python - <<'PY'
          import json
          import os
          import subprocess
          import textwrap
          import sys
          import time
          from datetime import datetime, timedelta, timezone
          from pathlib import Path

          import boto3
          from botocore.exceptions import BotoCoreError, ClientError

          def now_utc() -> str:
              return datetime.now(timezone.utc).isoformat().replace("+00:00", "Z")

          def parse_float(value, default=0.0):
              try:
                  return float(value)
              except (TypeError, ValueError):
                  return default

          def parse_int(value, default=0):
              try:
                  return int(float(value))
              except (TypeError, ValueError):
                  return default

          def dump_json(path: Path, payload: dict) -> None:
              path.parent.mkdir(parents=True, exist_ok=True)
              path.write_text(json.dumps(payload, indent=2, ensure_ascii=True) + "\n", encoding="utf-8")

          def run(cmd, stdin=None, check=True):
              proc = subprocess.run(cmd, input=stdin, text=True, capture_output=True, check=False)
              if check and proc.returncode != 0:
                  raise RuntimeError(f"command_failed:{' '.join(cmd)}\nstdout={proc.stdout}\nstderr={proc.stderr}")
              return proc.stdout

          def kubectl_json(args):
              out = run(["kubectl", *args, "-o", "json"])
              return json.loads(out) if out.strip() else {}

          def get_job_logs(namespace, job_name):
              try:
                  pods = kubectl_json(["get", "pods", "-n", namespace, "-l", f"job-name={job_name}"])
              except Exception:
                  return ""
              items = pods.get("items", []) if isinstance(pods, dict) else []
              if not items:
                  return ""
              pod_name = str(items[0].get("metadata", {}).get("name", "")).strip()
              if not pod_name:
                  return ""
              return run(["kubectl", "logs", "-n", namespace, pod_name], check=False)

          def parse_log_stream(text):
              latest_heartbeat = None
              summary = None
              for line in text.splitlines():
                  line = line.strip()
                  if not line:
                      continue
                  try:
                      payload = json.loads(line)
                  except json.JSONDecodeError:
                      continue
                  if isinstance(payload, dict) and isinstance(payload.get("heartbeat"), dict):
                      latest_heartbeat = payload["heartbeat"]
                  if isinstance(payload, dict) and isinstance(payload.get("summary"), dict):
                      summary = payload["summary"]
              return latest_heartbeat, summary

          def resolve_weighted_latency(latency_rows, count_rows):
              count_by_ts = {}
              for row in count_rows:
                  ts = row.get("Timestamp")
                  if ts is not None:
                      count_by_ts[str(ts)] = parse_float(row.get("Sum"), 0.0)
              p95_num = 0.0
              p99_num = 0.0
              weight_total = 0.0
              for row in latency_rows:
                  ts = row.get("Timestamp")
                  if ts is None:
                      continue
                  ext = row.get("ExtendedStatistics", {})
                  p95 = parse_float(ext.get("p95"), -1.0)
                  p99 = parse_float(ext.get("p99"), -1.0)
                  weight = count_by_ts.get(str(ts), 0.0)
                  if p95 < 0.0 or p99 < 0.0 or weight <= 0.0:
                      continue
                  p95_num += p95 * weight
                  p99_num += p99 * weight
                  weight_total += weight
              if weight_total > 0.0:
                  return p95_num / weight_total, p99_num / weight_total, "weighted_by_count"
              return -1.0, -1.0, "unavailable"

          def get_cloudwatch_metric(cw, metric_name, dims, start_time, end_time, period_seconds, statistics=None, extended_statistics=None):
              kwargs = {
                  "Namespace": "AWS/ApiGateway",
                  "MetricName": metric_name,
                  "Dimensions": dims,
                  "StartTime": start_time,
                  "EndTime": end_time,
                  "Period": period_seconds,
              }
              if statistics:
                  kwargs["Statistics"] = statistics
              if extended_statistics:
                  kwargs["ExtendedStatistics"] = extended_statistics
              return list(cw.get_metric_statistics(**kwargs).get("Datapoints", []))

          run_dir = Path(os.environ["RUN_DIR"])
          selection = json.loads((run_dir / "g3a_s1_managed_runtime_path_selection.json").read_text(encoding="utf-8"))
          runtime_path_active = str(selection.get("runtime_path_active", "")).strip()
          if runtime_path_active != "EKS_FLINK_OPERATOR":
              raise RuntimeError(f"unsupported_runtime_path:{runtime_path_active}")

          namespace = os.environ["EKS_NAMESPACE"]
          exec_safe = os.environ["EXEC_SAFE"]
          lane_count = max(1, parse_int(os.environ["LANE_COUNT"], 4))
          target_total_eps = max(1.0, parse_float(os.environ["TARGET_STEADY_EPS"], 3000.0))
          lane_target_eps = max(1.0, target_total_eps / lane_count)
          duration_seconds = max(60, parse_int(os.environ["DURATION_SECONDS"], 1800))
          min_sample_events = max(1, parse_int(os.environ["MIN_SAMPLE_EVENTS"], 5400000))
          early_cutoff_seconds = max(30, parse_int(os.environ["EARLY_CUTOFF_SECONDS"], 180))
          early_cutoff_floor_ratio = max(0.1, min(1.0, parse_float(os.environ["EARLY_CUTOFF_FLOOR_RATIO"], 0.7)))
          early_cutoff_floor_eps = target_total_eps * early_cutoff_floor_ratio
          max_workers = max(1, parse_int(os.environ["MAX_WORKERS_PER_LANE"], 192))
          req_timeout = max(1.0, parse_float(os.environ["REQUEST_TIMEOUT_SECONDS"], 5.0))
          retry_max_attempts = max(1, parse_int(os.environ["RETRY_MAX_ATTEMPTS"], 3))
          retry_backoff_ms = max(0.0, parse_float(os.environ["RETRY_BACKOFF_MS"], 200.0))
          worker_image = os.environ["WORKER_IMAGE_URI"]
          ig_url = os.environ["IG_BASE_URL"].rstrip("/") + (os.environ["IG_INGEST_PATH"] if os.environ["IG_INGEST_PATH"].startswith("/") else f"/{os.environ['IG_INGEST_PATH']}")
          ig_api_key = os.environ["IG_API_KEY"]

          worker_script = textwrap.dedent("""
              import json
              import math
              import os
              import time
              import urllib.error
              import urllib.request
              from concurrent.futures import FIRST_COMPLETED, ThreadPoolExecutor, wait
              from random import random
              
              def now_utc():
                  return time.strftime('%Y-%m-%dT%H:%M:%SZ', time.gmtime())
              
              target_rps = max(1.0, float(os.environ['TARGET_RPS']))
              duration_seconds = max(60, int(float(os.environ['DURATION_SECONDS'])))
              max_workers = max(1, int(float(os.environ['MAX_WORKERS'])))
              timeout_seconds = max(0.5, float(os.environ['REQUEST_TIMEOUT_SECONDS']))
              max_attempts = max(1, int(float(os.environ['RETRY_MAX_ATTEMPTS'])))
              backoff_ms = max(0.0, float(os.environ['RETRY_BACKOFF_MS']))
              heartbeat_seconds = max(10.0, float(os.environ.get('HEARTBEAT_SECONDS', '15')))
              ig_url = os.environ['IG_URL']
              api_key = os.environ['IG_API_KEY']
              platform_run_id = os.environ['PLATFORM_RUN_ID']
              scenario_run_id = os.environ['SCENARIO_RUN_ID']
              phase_id = os.environ.get('PHASE_ID', 'PR3-S1')
              lane_id = os.environ['LANE_ID']
              trace_seed = f"{lane_id}:{int(time.time())}"
              target_events = max(1, int(math.ceil(target_rps * duration_seconds)))
              worker_count = min(max_workers, target_events)
              headers = {'Content-Type': 'application/json', 'X-IG-Api-Key': api_key}
              dispatch_started = time.time()
              admitted = 0
              non_202 = 0
              failed = 0
              completed_events = 0
              status_counts = {}
              failure_samples = []
              last_heartbeat_at = dispatch_started
              
              def record_status(code: int):
                  key = str(code)
                  status_counts[key] = int(status_counts.get(key, 0)) + 1
              
              def emit_heartbeat(force: bool = False):
                  global last_heartbeat_at
                  now = time.time()
                  if not force and (now - last_heartbeat_at) < heartbeat_seconds:
                      return
                  elapsed = max(0.001, now - dispatch_started)
                  payload = {'heartbeat': {'lane_id': lane_id, 'generated_at_utc': now_utc(), 'elapsed_seconds': elapsed, 'completed_events': completed_events, 'admitted_events': admitted, 'non_202_events': non_202, 'observed_admitted_rps': admitted / elapsed, 'observed_attempted_rps': completed_events / elapsed, 'status_counts': status_counts}}
                  print(json.dumps(payload, ensure_ascii=True), flush=True)
                  last_heartbeat_at = now
              
              def send_once(idx: int):
                  event_id = f"pr3_s1_managed:{lane_id}:{idx}:{trace_seed}"
                  payload = {'platform_run_id': platform_run_id, 'scenario_run_id': scenario_run_id, 'phase_id': phase_id, 'event_class': 'pr3_s1_managed_speedup', 'event_id': event_id, 'runtime_lane': lane_id, 'trace_id': event_id}
                  body = json.dumps(payload, separators=(',', ':'), ensure_ascii=True).encode('utf-8')
                  req = urllib.request.Request(ig_url, data=body, method='POST', headers=headers)
                  reason = ''
                  status = 0
                  for attempt in range(1, max_attempts + 1):
                      try:
                          with urllib.request.urlopen(req, timeout=timeout_seconds) as resp:
                              status = int(resp.status)
                          if status == 202:
                              return status, reason
                          reason = f'status_{status}'
                          retryable = status == 429 or status >= 500
                          if not retryable or attempt >= max_attempts:
                              return status, reason
                      except urllib.error.HTTPError as exc:
                          status = int(exc.code)
                          reason = f'http_{status}'
                          retryable = status == 429 or status >= 500
                          if not retryable or attempt >= max_attempts:
                              return status, reason
                      except Exception as exc:
                          status = 599
                          reason = type(exc).__name__
                          if attempt >= max_attempts:
                              return status, reason
                      base = (backoff_ms / 1000.0) * (2 ** (attempt - 1))
                      time.sleep(base + min(0.05, random() * 0.05))
                  return status, reason
              
              def maybe_pace(idx: int):
                  target_epoch = dispatch_started + (idx / target_rps)
                  now = time.time()
                  if target_epoch > now:
                      time.sleep(min(0.01, target_epoch - now))
              
              next_idx = 0
              in_flight = set()
              with ThreadPoolExecutor(max_workers=worker_count) as pool:
                  while next_idx < target_events and len(in_flight) < worker_count:
                      maybe_pace(next_idx)
                      in_flight.add(pool.submit(send_once, next_idx))
                      next_idx += 1
                  while in_flight:
                      done, pending = wait(in_flight, return_when=FIRST_COMPLETED)
                      in_flight = pending
                      for fut in done:
                          status, reason = fut.result()
                          completed_events += 1
                          record_status(status)
                          if status == 202:
                              admitted += 1
                          else:
                              non_202 += 1
                              failed += 1
                              if len(failure_samples) < 12:
                                  failure_samples.append(reason or f'status_{status}')
                      emit_heartbeat(False)
                      while next_idx < target_events and len(in_flight) < worker_count:
                          maybe_pace(next_idx)
                          in_flight.add(pool.submit(send_once, next_idx))
                          next_idx += 1
              
              elapsed = max(0.001, time.time() - dispatch_started)
              emit_heartbeat(True)
              summary = {'lane_id': lane_id, 'generated_at_utc': now_utc(), 'target_rps': target_rps, 'duration_seconds': duration_seconds, 'target_events': target_events, 'attempted_events': target_events, 'completed_events': completed_events, 'admitted_events': admitted, 'non_202_events': non_202, 'failed_events': failed, 'status_counts': status_counts, 'failure_samples': failure_samples, 'observed_admitted_rps': admitted / elapsed, 'elapsed_seconds': elapsed, 'platform_run_id': platform_run_id, 'scenario_run_id': scenario_run_id, 'phase_id': phase_id}
              print(json.dumps({'summary': summary}, ensure_ascii=True), flush=True)
          """)
          worker_path = Path("/tmp/pr3_s1_worker.py")
          worker_path.write_text(worker_script.strip() + "\n", encoding="utf-8")
          configmap_name = f"pr3-s1-worker-{exec_safe}"
          run(["kubectl", "create", "namespace", namespace], check=False)
          cm_yaml = run(["kubectl", "create", "configmap", configmap_name, "-n", namespace, f"--from-file=pr3_s1_worker.py={worker_path}", "--dry-run=client", "-o", "yaml"])
          run(["kubectl", "apply", "-f", "-"], stdin=cm_yaml)

          lane_names = [f"pr3-s1-{exec_safe}-{idx:02d}" for idx in range(lane_count)]
          manifest = {
              "phase": "PR3",
              "state": "S1",
              "generated_at_utc": now_utc(),
              "generated_by": "github-actions",
              "version": "1.0.0",
              "execution_id": os.environ["PR3_EXECUTION_ID"],
              "runtime_path_active": runtime_path_active,
              "namespace": namespace,
              "configmap_name": configmap_name,
              "lane_count": lane_count,
              "lane_target_eps": lane_target_eps,
              "target_steady_eps": target_total_eps,
              "duration_seconds": duration_seconds,
              "lane_names": lane_names,
          }
          dump_json(run_dir / "g3a_s1_managed_dispatch_manifest.json", manifest)

          for lane_name in lane_names:
              yaml = textwrap.dedent(f"""
                  apiVersion: batch/v1
                  kind: Job
                  metadata:
                    name: {lane_name}
                    namespace: {namespace}
                    labels:
                      fp.phase: PR3
                      fp.state: S1
                      fp.runtime_path: EKS_FLINK_OPERATOR
                  spec:
                    ttlSecondsAfterFinished: 600
                    backoffLimit: 0
                    template:
                      metadata:
                        labels:
                          fp.phase: PR3
                          fp.state: S1
                          fp.runtime_path: EKS_FLINK_OPERATOR
                      spec:
                        restartPolicy: Never
                        containers:
                        - name: lane
                          image: {worker_image}
                          imagePullPolicy: IfNotPresent
                          command: ["/bin/sh", "-lc"]
                          args:
                          - python /opt/worker/pr3_s1_worker.py
                          env:
                          - name: TARGET_RPS
                            value: "{lane_target_eps}"
                          - name: DURATION_SECONDS
                            value: "{duration_seconds}"
                          - name: MAX_WORKERS
                            value: "{max_workers}"
                          - name: REQUEST_TIMEOUT_SECONDS
                            value: "{req_timeout}"
                          - name: RETRY_MAX_ATTEMPTS
                            value: "{retry_max_attempts}"
                          - name: RETRY_BACKOFF_MS
                            value: "{retry_backoff_ms}"
                          - name: HEARTBEAT_SECONDS
                            value: "15"
                          - name: IG_URL
                            value: "{ig_url}"
                          - name: IG_API_KEY
                            value: "{ig_api_key}"
                          - name: PLATFORM_RUN_ID
                            value: "{os.environ['PLATFORM_RUN_ID']}"
                          - name: SCENARIO_RUN_ID
                            value: "{os.environ['SCENARIO_RUN_ID']}"
                          - name: PHASE_ID
                            value: "PR3-S1"
                          - name: LANE_ID
                            value: "{lane_name}"
                          volumeMounts:
                          - name: worker-script
                            mountPath: /opt/worker
                        volumes:
                        - name: worker-script
                          configMap:
                            name: {configmap_name}
              """)
              run(["kubectl", "apply", "-f", "-"], stdin=yaml)

          dispatch_started = datetime.now(timezone.utc)
          last_heartbeats = {}
          lane_summaries = {}
          blockers = []
          timed_out = False
          early_cutoff = False
          monitor_timeout = time.time() + duration_seconds + 900

          while True:
              for lane_name in lane_names:
                  logs = get_job_logs(namespace, lane_name)
                  hb, summary = parse_log_stream(logs)
                  if hb:
                      last_heartbeats[lane_name] = hb
                  if summary:
                      lane_summaries[lane_name] = summary

              elapsed = max(0.001, (datetime.now(timezone.utc) - dispatch_started).total_seconds())
              heartbeat_coverage = len(last_heartbeats) / lane_count
              admitted = sum(parse_int(item.get("admitted_events"), 0) for item in lane_summaries.values())
              attempted = sum(parse_int(item.get("completed_events") or item.get("attempted_events"), 0) for item in lane_summaries.values())
              if not lane_summaries:
                  admitted = sum(parse_int(item.get("admitted_events"), 0) for item in last_heartbeats.values())
                  attempted = sum(parse_int(item.get("completed_events"), 0) for item in last_heartbeats.values())
              observed_admitted_eps = admitted / elapsed
              if elapsed >= early_cutoff_seconds and heartbeat_coverage >= 0.75 and observed_admitted_eps < early_cutoff_floor_eps:
                  blockers.append(f"PR3.S1.MANAGED.B12_EARLY_THROUGHPUT_SHORTFALL:observed={observed_admitted_eps:.3f}:floor={early_cutoff_floor_eps:.3f}")
                  early_cutoff = True
                  for lane_name in lane_names:
                      run(["kubectl", "delete", "job", lane_name, "-n", namespace, "--ignore-not-found=true"], check=False)
                  break
              if len(lane_summaries) == lane_count:
                  break
              if time.time() > monitor_timeout:
                  timed_out = True
                  blockers.append("PR3.S1.MANAGED.B13_MONITOR_TIMEOUT")
                  for lane_name in lane_names:
                      run(["kubectl", "delete", "job", lane_name, "-n", namespace, "--ignore-not-found=true"], check=False)
                  break
              time.sleep(15)

          dispatch_ended = datetime.now(timezone.utc)
          for lane_name in lane_names:
              logs = get_job_logs(namespace, lane_name)
              hb, summary = parse_log_stream(logs)
              if hb:
                  last_heartbeats[lane_name] = hb
              if summary:
                  lane_summaries[lane_name] = summary
              if lane_name not in lane_summaries:
                  blockers.append(f"PR3.S1.MANAGED.B14_LANE_SUMMARY_MISSING:{lane_name}")

          admitted_total = sum(parse_int(item.get("admitted_events"), 0) for item in lane_summaries.values())
          completed_total = sum(parse_int(item.get("completed_events") or item.get("attempted_events"), 0) for item in lane_summaries.values())
          non_202_total = sum(parse_int(item.get("non_202_events"), 0) for item in lane_summaries.values())
          window_seconds = max(1.0, (dispatch_ended - dispatch_started).total_seconds())
          observed_admitted_eps = admitted_total / window_seconds

          dims = [{"Name": "ApiId", "Value": os.environ["API_ID"]}, {"Name": "Stage", "Value": os.environ["API_STAGE"]}]
          cw = boto3.client("cloudwatch", region_name=os.environ["AWS_REGION"])
          latency_rows = []
          count_rows = []
          err4_rows = []
          err5_rows = []
          try:
              latency_rows = get_cloudwatch_metric(cw, "Latency", dims, dispatch_started - timedelta(minutes=1), dispatch_ended + timedelta(minutes=1), 60, extended_statistics=["p95", "p99"])
              count_rows = get_cloudwatch_metric(cw, "Count", dims, dispatch_started - timedelta(minutes=1), dispatch_ended + timedelta(minutes=1), 60, statistics=["Sum"])
              err4_rows = get_cloudwatch_metric(cw, "4xx", dims, dispatch_started - timedelta(minutes=1), dispatch_ended + timedelta(minutes=1), 60, statistics=["Sum"])
              err5_rows = get_cloudwatch_metric(cw, "5xx", dims, dispatch_started - timedelta(minutes=1), dispatch_ended + timedelta(minutes=1), 60, statistics=["Sum"])
          except (BotoCoreError, ClientError) as exc:
              blockers.append(f"PR3.S1.MANAGED.B15_CLOUDWATCH_UNREADABLE:{type(exc).__name__}")

          total_count = sum(parse_float(item.get("Sum"), 0.0) for item in count_rows)
          err4_total = sum(parse_float(item.get("Sum"), 0.0) for item in err4_rows)
          err5_total = sum(parse_float(item.get("Sum"), 0.0) for item in err5_rows)
          error_rate_pct = ((err4_total + err5_total) / total_count * 100.0) if total_count > 0 else 100.0
          latency_p95_ms, latency_p99_ms, latency_method = resolve_weighted_latency(latency_rows, count_rows)
          if latency_p95_ms < 0.0 or latency_p99_ms < 0.0:
              blockers.append("PR3.S1.MANAGED.B16_LATENCY_MISSING")
          if admitted_total < min_sample_events:
              blockers.append(f"PR3.S1.MANAGED.B17_SAMPLE_MINIMA_SHORTFALL:observed={admitted_total}:required={min_sample_events}")
          dispatch_summary = {
              "phase": "PR3",
              "state": "S1",
              "generated_at_utc": now_utc(),
              "generated_by": "github-actions",
              "version": "1.0.0",
              "execution_id": os.environ["PR3_EXECUTION_ID"],
              "runtime_path_active": runtime_path_active,
              "dispatch_window": {
                  "start_utc": dispatch_started.isoformat().replace("+00:00", "Z"),
                  "end_utc": dispatch_ended.isoformat().replace("+00:00", "Z"),
                  "duration_seconds": window_seconds,
              },
              "targets": {
                  "target_steady_eps": target_total_eps,
                  "lane_target_eps": lane_target_eps,
                  "lane_count": lane_count,
                  "min_sample_events": min_sample_events,
                  "early_cutoff_seconds": early_cutoff_seconds,
                  "early_cutoff_floor_eps": early_cutoff_floor_eps,
              },
              "aggregate": {
                  "admitted_events": admitted_total,
                  "completed_events": completed_total,
                  "non_202_events": non_202_total,
                  "observed_admitted_eps": observed_admitted_eps,
                  "heartbeat_coverage": len(last_heartbeats) / lane_count,
              },
              "lane_summaries": lane_summaries,
              "early_cutoff_triggered": early_cutoff,
              "monitor_timed_out": timed_out,
              "blocker_ids": sorted(set(blockers)),
              "overall_pass": len(blockers) == 0,
          }
          dump_json(run_dir / "g3a_s1_managed_dispatch_summary.json", dispatch_summary)

          evidence_payload = {
              "phase": "PR3",
              "state": "S1",
              "generated_at_utc": now_utc(),
              "generated_by": "github-actions",
              "version": "1.0.0",
              "execution_id": os.environ["PR3_EXECUTION_ID"],
              "evidence_mode": "MANAGED_EKS_FALLBACK_PRESSURE_WINDOW",
              "measurement_surface": "IG_ADMITTED_EVENTS_PER_SEC",
              "window": {
                  "start_utc": dispatch_started.isoformat().replace("+00:00", "Z"),
                  "end_utc": dispatch_ended.isoformat().replace("+00:00", "Z"),
                  "duration_seconds": window_seconds,
              },
              "sample_size_events": admitted_total,
              "observed_events_per_second": observed_admitted_eps,
              "throughput_derivation": "managed_lane_202_admissions_per_second",
              "error_rate_pct_observed": error_rate_pct,
              "decision_latency_ms_p95": latency_p95_ms if latency_p95_ms >= 0 else None,
              "decision_latency_ms_p99": latency_p99_ms if latency_p99_ms >= 0 else None,
              "latency_derivation_method": latency_method,
              "cloudwatch_aggregation": {
                  "period_seconds": 60,
                  "api_id": os.environ["API_ID"],
                  "stage": os.environ["API_STAGE"],
                  "count_sum": total_count,
                  "4xx_sum": err4_total,
                  "5xx_sum": err5_total,
                  "latency_datapoints": len(latency_rows),
              },
              "managed_lane_aggregation": {
                  "lane_count": lane_count,
                  "lane_target_eps": lane_target_eps,
                  "admitted_events": admitted_total,
                  "completed_events": completed_total,
                  "non_202_events": non_202_total,
              },
              "overall_pass": len(blockers) == 0,
              "source_notes": [
                  "runtime_path_active=EKS_FLINK_OPERATOR",
                  "throughput_derived_from_direct_202_admissions",
                  "latency_and_error_derived_from_AWS/ApiGateway_metrics",
              ],
          }
          evidence_summary = {
              "phase": "PR3",
              "state": "S1",
              "generated_at_utc": now_utc(),
              "generated_by": "github-actions",
              "version": "1.0.0",
              "execution_id": os.environ["PR3_EXECUTION_ID"],
              "verdict": "FRESH_EVIDENCE_READY" if len(blockers) == 0 else "HOLD_REMEDIATE",
              "blocker_count": len(sorted(set(blockers))),
              "blockers": sorted(set(blockers)),
              "evidence_ref": f"runs/dev_substrate/dev_full/road_to_prod/run_control/{os.environ['PR3_EXECUTION_ID']}/g3a_steady_evidence_managed.json",
          }
          dump_json(run_dir / "g3a_steady_evidence_managed.json", evidence_payload)
          dump_json(run_dir / "g3a_steady_evidence_managed_summary.json", evidence_summary)

          print(json.dumps({"dispatch_summary": dispatch_summary, "evidence_summary": evidence_summary}, indent=2))
          if blockers:
              sys.exit(1)
          PY

      - name: Upload remote artifact backup to S3
        if: always()
        shell: bash
        run: |
          set -euo pipefail
          aws s3 cp "${{ steps.meta.outputs.run_dir }}/g3a_s1_managed_runtime_path_selection.json" "s3://${{ inputs.evidence_bucket }}/evidence/dev_full/run_control/${{ inputs.pr3_execution_id }}/road_to_prod/pr3_s1_managed/g3a_s1_managed_runtime_path_selection.json" || true
          aws s3 cp "${{ steps.meta.outputs.run_dir }}/g3a_s1_managed_dispatch_manifest.json" "s3://${{ inputs.evidence_bucket }}/evidence/dev_full/run_control/${{ inputs.pr3_execution_id }}/road_to_prod/pr3_s1_managed/g3a_s1_managed_dispatch_manifest.json" || true
          aws s3 cp "${{ steps.meta.outputs.run_dir }}/g3a_s1_managed_dispatch_summary.json" "s3://${{ inputs.evidence_bucket }}/evidence/dev_full/run_control/${{ inputs.pr3_execution_id }}/road_to_prod/pr3_s1_managed/g3a_s1_managed_dispatch_summary.json" || true
          aws s3 cp "${{ steps.meta.outputs.run_dir }}/g3a_steady_evidence_managed.json" "s3://${{ inputs.evidence_bucket }}/evidence/dev_full/run_control/${{ inputs.pr3_execution_id }}/road_to_prod/pr3_s1_managed/g3a_steady_evidence_managed.json" || true
          aws s3 cp "${{ steps.meta.outputs.run_dir }}/g3a_steady_evidence_managed_summary.json" "s3://${{ inputs.evidence_bucket }}/evidence/dev_full/run_control/${{ inputs.pr3_execution_id }}/road_to_prod/pr3_s1_managed/g3a_steady_evidence_managed_summary.json" || true

      - name: Cleanup fallback resources
        if: always()
        shell: bash
        run: |
          set -euo pipefail
          kubectl delete jobs -n "${{ inputs.eks_namespace }}" -l fp.phase=PR3,fp.state=S1 --ignore-not-found=true || true
          kubectl delete configmap "pr3-s1-worker-${{ steps.meta.outputs.exec_safe }}" -n "${{ inputs.eks_namespace }}" --ignore-not-found=true || true

      - name: Upload workflow artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: pr3-s1-managed-${{ inputs.pr3_execution_id }}
          path: |
            ${{ steps.meta.outputs.run_dir }}/g3a_s1_managed_runtime_path_selection.json
            ${{ steps.meta.outputs.run_dir }}/g3a_s1_managed_dispatch_manifest.json
            ${{ steps.meta.outputs.run_dir }}/g3a_s1_managed_dispatch_summary.json
            ${{ steps.meta.outputs.run_dir }}/g3a_steady_evidence_managed.json
            ${{ steps.meta.outputs.run_dir }}/g3a_steady_evidence_managed_summary.json
          if-no-files-found: warn
