name: dev-full-pr3-s3-recovery

on:
  workflow_dispatch:
    inputs:
      aws_region:
        description: "AWS region"
        required: true
        default: "eu-west-2"
        type: string
      aws_role_to_assume:
        description: "OIDC role ARN used by GitHub Actions"
        required: true
        type: string
      pr3_execution_id:
        description: "Strict PR3 execution id"
        required: true
        default: "pr3_20260306T021900Z"
        type: string
      evidence_bucket:
        description: "Evidence bucket"
        required: true
        default: "fraud-platform-dev-full-evidence"
        type: string
      eks_cluster_name:
        description: "EKS cluster name"
        required: true
        default: "fraud-platform-dev-full"
        type: string
      prestress_lane_count:
        description: "Burst prestress lane count"
        required: true
        default: "32"
        type: string
      prestress_target_burst_eps:
        description: "Prestress burst EPS target"
        required: true
        default: "6000"
        type: string
      prestress_target_request_rate_eps:
        description: "Prestress generator setpoint EPS"
        required: true
        default: "6060"
        type: string
      prestress_duration_seconds:
        description: "Prestress burst duration seconds"
        required: true
        default: "300"
        type: string
      prestress_warmup_seconds:
        description: "Prestress burst warmup seconds"
        required: true
        default: "90"
        type: string
      prestress_stream_speedup:
        description: "Prestress replay speedup"
        required: true
        default: "180"
        type: string
      prestress_ig_push_concurrency:
        description: "Prestress per-lane IG concurrency"
        required: true
        default: "16"
        type: string
      prestress_output_concurrency:
        description: "Prestress output concurrency"
        required: true
        default: "4"
        type: string
      prestress_http_pool_maxsize:
        description: "Prestress HTTP pool size"
        required: true
        default: "1024"
        type: string
      recovery_lane_count:
        description: "Recovery steady lane count"
        required: true
        default: "40"
        type: string
      recovery_target_steady_eps:
        description: "Recovery steady EPS target"
        required: true
        default: "3000"
        type: string
      recovery_target_request_rate_eps:
        description: "Recovery generator setpoint EPS"
        required: true
        default: "3030"
        type: string
      recovery_duration_seconds:
        description: "Recovery steady duration seconds"
        required: true
        default: "180"
        type: string
      recovery_stream_speedup:
        description: "Recovery replay speedup"
        required: true
        default: "51.2"
        type: string
      recovery_ig_push_concurrency:
        description: "Recovery per-lane IG concurrency"
        required: true
        default: "4"
        type: string
      recovery_output_concurrency:
        description: "Recovery output concurrency"
        required: true
        default: "4"
        type: string
      recovery_http_pool_maxsize:
        description: "Recovery HTTP pool size"
        required: true
        default: "512"
        type: string

permissions:
  contents: read
  id-token: write

concurrency:
  group: dev-full-pr3-s3-recovery-${{ github.ref_name }}
  cancel-in-progress: false

jobs:
  run_pr3_s3_recovery:
    runs-on: ubuntu-latest
    env:
      EKS_NAMESPACE: fraud-platform-rtdl
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Reject static AWS credential posture
        shell: bash
        run: |
          set -euo pipefail
          if [[ -n "${AWS_ACCESS_KEY_ID:-}" || -n "${AWS_SECRET_ACCESS_KEY:-}" ]]; then
            echo "Static AWS credentials are forbidden; use OIDC role assumption."
            exit 1
          fi

      - name: Configure AWS credentials via OIDC
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-region: ${{ inputs.aws_region }}
          role-to-assume: ${{ inputs.aws_role_to_assume }}

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Setup kubectl
        uses: azure/setup-kubectl@v4
        with:
          version: "latest"

      - name: Install runtime dependencies
        shell: bash
        run: |
          set -euo pipefail
          python -m pip install --upgrade pip
          python -m pip install boto3 botocore "psycopg[binary]" pyyaml

      - name: Compute execution metadata
        id: meta
        shell: bash
        run: |
          set -euo pipefail
          RUN_DIR="runs/dev_substrate/dev_full/road_to_prod/run_control/${{ inputs.pr3_execution_id }}"
          mkdir -p "${RUN_DIR}"
          readarray -t RUN_METADATA < <(python - <<'PY'
          from datetime import datetime, timezone
          import uuid
          base = datetime.now(timezone.utc).replace(microsecond=0)
          print(base.strftime("platform_%Y%m%dT%H%M%SZ"))
          print(uuid.uuid4().hex)
          print(base.strftime("%Y%m%dT%H%M%SZ"))
          PY
          )
          ACTIVE_RUN_ID="${RUN_METADATA[0]}"
          ACTIVE_SCENARIO_RUN_ID="${RUN_METADATA[1]}"
          CHECKPOINT_ATTEMPT_ID="${RUN_METADATA[2]}"
          echo "run_dir=${RUN_DIR}" >> "$GITHUB_OUTPUT"
          echo "active_platform_run_id=${ACTIVE_RUN_ID}" >> "$GITHUB_OUTPUT"
          echo "active_scenario_run_id=${ACTIVE_SCENARIO_RUN_ID}" >> "$GITHUB_OUTPUT"
          echo "wsp_checkpoint_attempt_id=${CHECKPOINT_ATTEMPT_ID}" >> "$GITHUB_OUTPUT"

      - name: Hydrate PR3 upstream evidence from S3
        shell: bash
        env:
          EVIDENCE_BUCKET: ${{ inputs.evidence_bucket }}
          PR3_EXECUTION_ID: ${{ inputs.pr3_execution_id }}
          RUN_DIR: ${{ steps.meta.outputs.run_dir }}
        run: |
          set -euo pipefail
          for name in \
            pr3_s0_execution_receipt.json \
            g3a_run_charter.active.json \
            g3a_measurement_surface_map.json \
            pr3_s2_execution_receipt.json; do
            aws s3 cp \
              "s3://${EVIDENCE_BUCKET}/evidence/dev_full/run_control/${PR3_EXECUTION_ID}/${name}" \
              "${RUN_DIR}/${name}" \
              --no-progress
          done

      - name: Validate strict upstream boundary
        id: upstream
        shell: bash
        run: |
          set -euo pipefail
          python - <<'PY'
          import json
          import os
          from pathlib import Path
          path = Path("runs/dev_substrate/dev_full/road_to_prod/run_control/${{ inputs.pr3_execution_id }}/pr3_s2_execution_receipt.json")
          payload = json.loads(path.read_text(encoding="utf-8"))
          if payload.get("verdict") != "PR3_S2_READY" or int(payload.get("open_blockers", 1)) != 0:
              raise SystemExit(f"PR3-S3 strict upstream invalid: {payload.get('verdict')} blockers={payload.get('open_blockers')}")
          platform_run_id = str(payload.get("platform_run_id") or "").strip()
          if not platform_run_id:
              raise SystemExit("PR3-S3 strict upstream missing platform_run_id in PR3-S2 receipt.")
          with open(os.environ["GITHUB_OUTPUT"], "a", encoding="utf-8") as fh:
              fh.write(f"upstream_platform_run_id={platform_run_id}\n")
          PY

      - name: Configure kubeconfig
        id: kubeconfig
        shell: bash
        run: |
          set -euo pipefail
          aws eks update-kubeconfig \
            --region "${{ inputs.aws_region }}" \
            --name "${{ inputs.eks_cluster_name }}"

      - name: Materialize fresh S3 runtime identity on EKS
        shell: bash
        run: |
          set -euo pipefail
          python scripts/dev_substrate/pr3_rtdl_materialize.py \
            --pr3-execution-id "${{ inputs.pr3_execution_id }}" \
            --platform-run-id "${{ steps.meta.outputs.active_platform_run_id }}" \
            --scenario-run-id "${{ steps.meta.outputs.active_scenario_run_id }}" \
            --region "${{ inputs.aws_region }}" \
            --namespace "${{ env.EKS_NAMESPACE }}"

      - name: Verify runtime deployments ready
        shell: bash
        run: |
          set -euo pipefail
          for deployment in fp-pr3-csfb fp-pr3-ieg fp-pr3-ofp fp-pr3-dl fp-pr3-df fp-pr3-al fp-pr3-dla fp-pr3-archive-writer; do
            kubectl rollout status "deployment/${deployment}" -n "${{ env.EKS_NAMESPACE }}" --timeout=240s
          done

      - name: Compute quota-aware WSP packing
        id: packing
        shell: bash
        env:
          AWS_REGION: ${{ inputs.aws_region }}
          RUN_DIR: ${{ steps.meta.outputs.run_dir }}
          PRESTRESS_LANE_COUNT: ${{ inputs.prestress_lane_count }}
          RECOVERY_LANE_COUNT: ${{ inputs.recovery_lane_count }}
        run: |
          set -euo pipefail
          python - <<'PY'
          from datetime import datetime, timezone
          import json
          import os
          from pathlib import Path

          import boto3

          region = os.environ["AWS_REGION"]
          run_dir = Path(os.environ["RUN_DIR"])
          prestress_lane_count = max(1, int(os.environ["PRESTRESS_LANE_COUNT"]))
          requested_recovery_lane_count = max(1, int(os.environ["RECOVERY_LANE_COUNT"]))
          recovery_lane_count = prestress_lane_count
          cpu_memory_pairs = {
              256: 1024,
              512: 1024,
              1024: 2048,
          }
          segment_reserve_cpu_units = {
              "prestress": 0,
              "recovery": 1024,
          }

          ecs = boto3.client("ecs", region_name=region)
          sq = boto3.client("service-quotas", region_name=region)

          quota = sq.get_service_quota(ServiceCode="fargate", QuotaCode="L-3032A538")["Quota"]
          quota_vcpu = float(quota["Value"])
          quota_cpu_units = int(quota_vcpu * 1024)

          cluster_arns = ecs.list_clusters().get("clusterArns", [])
          task_cpu_cache = {}
          total_running_cpu_units = 0
          running_tasks = []
          for cluster_arn in cluster_arns:
              cluster_name = cluster_arn.rsplit("/", 1)[-1]
              task_arns = ecs.list_tasks(cluster=cluster_arn, desiredStatus="RUNNING").get("taskArns", [])
              if not task_arns:
                  continue
              described = ecs.describe_tasks(cluster=cluster_arn, tasks=task_arns).get("tasks", [])
              for task in described:
                  task_def_arn = str(task.get("taskDefinitionArn") or "").strip()
                  if not task_def_arn:
                      continue
                  if task_def_arn not in task_cpu_cache:
                      task_def = ecs.describe_task_definition(taskDefinition=task_def_arn)["taskDefinition"]
                      task_cpu_cache[task_def_arn] = int(str(task_def.get("cpu") or "0") or "0")
                  cpu_units = int(task_cpu_cache[task_def_arn])
                  total_running_cpu_units += cpu_units
                  running_tasks.append(
                      {
                          "cluster": cluster_name,
                          "task_definition": task_def_arn.rsplit("/", 1)[-1],
                          "task_arn": str(task.get("taskArn") or "").rsplit("/", 1)[-1],
                          "cpu_units": cpu_units,
                          "cpu_vcpu": cpu_units / 1024.0,
                      }
                  )

          available_cpu_units = quota_cpu_units - total_running_cpu_units
          if available_cpu_units < 0:
              available_cpu_units = 0

          def choose_shape(*, lane_count: int, segment_label: str) -> tuple[int, int, int]:
              reserve_cpu_units = max(0, int(segment_reserve_cpu_units.get(segment_label, 0)))
              usable_cpu_units = max(0, available_cpu_units - reserve_cpu_units)
              selected_cpu = None
              for cpu_units in sorted(cpu_memory_pairs.keys(), reverse=True):
                  required_cpu_units = lane_count * cpu_units
                  if required_cpu_units <= usable_cpu_units:
                      selected_cpu = cpu_units
                      break
              if selected_cpu is None:
                  raise SystemExit(
                      "PR3.S3.PACK.B01_FARGATE_HEADROOM_INSUFFICIENT:"
                      f"segment={segment_label}:available_cpu_units={available_cpu_units}:"
                      f"reserve_cpu_units={reserve_cpu_units}:usable_cpu_units={usable_cpu_units}:"
                      f"lane_count={lane_count}:"
                      f"minimum_required_cpu_units={lane_count * min(cpu_memory_pairs.keys())}"
                  )
              return selected_cpu, cpu_memory_pairs[selected_cpu], usable_cpu_units

          prestress_cpu, prestress_memory, prestress_usable_cpu_units = choose_shape(
              lane_count=prestress_lane_count,
              segment_label="prestress",
          )
          recovery_cpu, recovery_memory, recovery_usable_cpu_units = choose_shape(
              lane_count=recovery_lane_count,
              segment_label="recovery",
          )

          summary = {
              "generated_at_utc": datetime.now(timezone.utc).isoformat().replace("+00:00", "Z"),
              "quota_code": "L-3032A538",
              "quota_vcpu": quota_vcpu,
              "quota_cpu_units": quota_cpu_units,
              "available_cpu_units": available_cpu_units,
              "running_cpu_units": total_running_cpu_units,
              "running_tasks": running_tasks,
              "selected_shapes": {
                  "prestress": {
                      "lane_count": prestress_lane_count,
                      "reserve_cpu_units": segment_reserve_cpu_units["prestress"],
                      "usable_cpu_units": prestress_usable_cpu_units,
                      "task_cpu_units": prestress_cpu,
                      "task_memory_mib": prestress_memory,
                      "total_cpu_units": prestress_lane_count * prestress_cpu,
                  },
                  "recovery": {
                      "requested_lane_count": requested_recovery_lane_count,
                      "lane_count": recovery_lane_count,
                      "reserve_cpu_units": segment_reserve_cpu_units["recovery"],
                      "usable_cpu_units": recovery_usable_cpu_units,
                      "task_cpu_units": recovery_cpu,
                      "task_memory_mib": recovery_memory,
                      "total_cpu_units": recovery_lane_count * recovery_cpu,
                  },
              },
          }
          out_path = run_dir / "g3a_s3_wsp_packing_summary.json"
          out_path.parent.mkdir(parents=True, exist_ok=True)
          out_path.write_text(json.dumps(summary, indent=2) + "\n", encoding="utf-8")
          with open(os.environ["GITHUB_OUTPUT"], "a", encoding="utf-8") as fh:
              fh.write(f"prestress_task_cpu={prestress_cpu}\n")
              fh.write(f"prestress_task_memory={prestress_memory}\n")
              fh.write(f"recovery_task_cpu={recovery_cpu}\n")
              fh.write(f"recovery_task_memory={recovery_memory}\n")
          PY

      - name: Warm-gate runtime before prestress
        shell: bash
        run: |
          set -euo pipefail
          python scripts/dev_substrate/pr3_runtime_warm_gate.py \
            --pr3-execution-id "${{ inputs.pr3_execution_id }}" \
            --state-id S3 \
            --namespace "${{ env.EKS_NAMESPACE }}" \
            --platform-run-id "${{ steps.meta.outputs.active_platform_run_id }}" \
            --profile-path "/runtime-profile/dev_full.yaml" \
            --settle-seconds 30

      - name: Run prestress burst
        shell: bash
        run: |
          set -euo pipefail
          python scripts/dev_substrate/pr3_wsp_replay_dispatch.py \
            --pr3-execution-id "${{ inputs.pr3_execution_id }}" \
            --state-id S3 \
            --window-label burst_prestress \
            --artifact-prefix g3a_s3_prestress \
            --blocker-prefix PR3.S3.PRESTRESS \
            --region "${{ inputs.aws_region }}" \
            --platform-run-id "${{ steps.meta.outputs.active_platform_run_id }}" \
            --scenario-run-id "${{ steps.meta.outputs.active_scenario_run_id }}" \
            --checkpoint-attempt-id "${{ steps.meta.outputs.wsp_checkpoint_attempt_id }}" \
            --lane-count "${{ inputs.prestress_lane_count }}" \
            --expected-window-eps "${{ inputs.prestress_target_burst_eps }}" \
            --target-request-rate-eps "${{ inputs.prestress_target_request_rate_eps }}" \
            --duration-seconds "${{ inputs.prestress_duration_seconds }}" \
            --warmup-seconds "${{ inputs.prestress_warmup_seconds }}" \
            --early-cutoff-seconds 120 \
            --early-cutoff-floor-ratio 0.70 \
            --stream-speedup "${{ inputs.prestress_stream_speedup }}" \
            --output-concurrency "${{ inputs.prestress_output_concurrency }}" \
            --ig-push-concurrency "${{ inputs.prestress_ig_push_concurrency }}" \
            --http-pool-maxsize "${{ inputs.prestress_http_pool_maxsize }}" \
            --target-burst-seconds 0.50 \
            --target-initial-tokens 0.50 \
            --task-cpu "${{ steps.packing.outputs.prestress_task_cpu }}" \
            --task-memory "${{ steps.packing.outputs.prestress_task_memory }}" \
            --max-latency-p95-ms 350 \
            --max-latency-p99-ms 700 \
            --skip-runtime-identity-probe

      - name: Capture post-prestress snapshot
        shell: bash
        run: |
          set -euo pipefail
          python scripts/dev_substrate/pr3_runtime_surface_snapshot.py \
            --pr3-execution-id "${{ inputs.pr3_execution_id }}" \
            --state-id S3 \
            --snapshot-label prestress_post \
            --namespace "${{ env.EKS_NAMESPACE }}" \
            --platform-run-id "${{ steps.meta.outputs.active_platform_run_id }}"

      - name: Run recovery steady with live sampling
        shell: bash
        env:
          PR3_EXECUTION_ID: ${{ inputs.pr3_execution_id }}
          ACTIVE_PLATFORM_RUN_ID: ${{ steps.meta.outputs.active_platform_run_id }}
          ACTIVE_SCENARIO_RUN_ID: ${{ steps.meta.outputs.active_scenario_run_id }}
          WSP_CHECKPOINT_ATTEMPT_ID: ${{ steps.meta.outputs.wsp_checkpoint_attempt_id }}
          AWS_REGION: ${{ inputs.aws_region }}
          EKS_NAMESPACE: ${{ env.EKS_NAMESPACE }}
        run: |
          set -euo pipefail
          python scripts/dev_substrate/pr3_wsp_replay_dispatch.py \
            --pr3-execution-id "${PR3_EXECUTION_ID}" \
            --state-id S3 \
            --window-label recovery \
            --artifact-prefix g3a_s3_recovery \
            --blocker-prefix PR3.S3.RECOVERY \
            --region "${AWS_REGION}" \
            --platform-run-id "${ACTIVE_PLATFORM_RUN_ID}" \
            --scenario-run-id "${ACTIVE_SCENARIO_RUN_ID}" \
            --checkpoint-attempt-id "${WSP_CHECKPOINT_ATTEMPT_ID}" \
            --lane-count "${{ inputs.prestress_lane_count }}" \
            --expected-window-eps "${{ inputs.recovery_target_steady_eps }}" \
            --target-request-rate-eps "${{ inputs.recovery_target_request_rate_eps }}" \
            --duration-seconds "${{ inputs.recovery_duration_seconds }}" \
            --warmup-seconds 0 \
            --early-cutoff-seconds 120 \
            --early-cutoff-floor-ratio 0.70 \
            --stream-speedup "${{ inputs.recovery_stream_speedup }}" \
            --output-concurrency "${{ inputs.recovery_output_concurrency }}" \
            --ig-push-concurrency "${{ inputs.recovery_ig_push_concurrency }}" \
            --http-pool-maxsize "${{ inputs.recovery_http_pool_maxsize }}" \
            --target-burst-seconds 0.25 \
            --target-initial-tokens 0.25 \
            --task-cpu "${{ steps.packing.outputs.recovery_task_cpu }}" \
            --task-memory "${{ steps.packing.outputs.recovery_task_memory }}" \
            --max-latency-p95-ms 350 \
            --max-latency-p99-ms 700 \
            --skip-runtime-identity-probe &
          RECOVERY_PID=$!
          SAMPLE_INDEX=1
          sleep 15
          while kill -0 "${RECOVERY_PID}" 2>/dev/null; do
            python scripts/dev_substrate/pr3_runtime_surface_snapshot.py \
              --pr3-execution-id "${PR3_EXECUTION_ID}" \
              --state-id S3 \
              --snapshot-label "during_${SAMPLE_INDEX}" \
              --namespace "${EKS_NAMESPACE}" \
              --platform-run-id "${ACTIVE_PLATFORM_RUN_ID}" || true
            SAMPLE_INDEX=$((SAMPLE_INDEX + 1))
            sleep 30
          done
          wait "${RECOVERY_PID}"

      - name: Capture post-recovery snapshot
        if: ${{ always() && steps.kubeconfig.outcome == 'success' }}
        shell: bash
        run: |
          set -euo pipefail
          python scripts/dev_substrate/pr3_runtime_surface_snapshot.py \
            --pr3-execution-id "${{ inputs.pr3_execution_id }}" \
            --state-id S3 \
            --snapshot-label post \
            --namespace "${{ env.EKS_NAMESPACE }}" \
            --platform-run-id "${{ steps.meta.outputs.active_platform_run_id }}"

      - name: Build PR3-S3 recovery rollup
        shell: bash
        run: |
          set -euo pipefail
          python scripts/dev_substrate/pr3_s3_rollup.py \
            --pr3-execution-id "${{ inputs.pr3_execution_id }}" \
            --state-id S3 \
            --region "${{ inputs.aws_region }}" \
            --expected-burst-eps "${{ inputs.prestress_target_burst_eps }}" \
            --expected-steady-eps "${{ inputs.recovery_target_steady_eps }}" \
            --recovery-bound-seconds 180 \
            --max-error-rate-ratio 0.002 \
            --max-4xx-ratio 0.002 \
            --max-5xx-ratio 0.0 \
            --max-latency-p95-ms 350 \
            --max-latency-p99-ms 700 \
            --max-lag-p99-seconds 5.0 \
            --max-checkpoint-p99-seconds 30.0

      - name: Upload remote artifact backup to S3
        if: always()
        shell: bash
        run: |
          set -euo pipefail
          aws s3 sync "${{ steps.meta.outputs.run_dir }}/" "s3://${{ inputs.evidence_bucket }}/evidence/dev_full/run_control/${{ inputs.pr3_execution_id }}/" --no-progress || true

      - name: Upload workflow artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: pr3-s3-recovery-${{ inputs.pr3_execution_id }}
          path: |
            ${{ steps.meta.outputs.run_dir }}/g3a_s3_prestress_wsp_runtime_manifest.json
            ${{ steps.meta.outputs.run_dir }}/g3a_s3_prestress_wsp_runtime_summary.json
            ${{ steps.meta.outputs.run_dir }}/g3a_s3_recovery_wsp_runtime_manifest.json
            ${{ steps.meta.outputs.run_dir }}/g3a_s3_recovery_wsp_runtime_summary.json
            ${{ steps.meta.outputs.run_dir }}/g3a_s3_component_snapshot_*.json
            ${{ steps.meta.outputs.run_dir }}/g3a_scorecard_recovery.json
            ${{ steps.meta.outputs.run_dir }}/g3a_recovery_timeline.json
            ${{ steps.meta.outputs.run_dir }}/g3a_recovery_bound_report.json
            ${{ steps.meta.outputs.run_dir }}/pr3_s3_execution_receipt.json
          if-no-files-found: warn
